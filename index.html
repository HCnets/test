      let drawerAssets = null;
      function getDrawerAssets() {
        if (drawerAssets) return drawerAssets;
        const oc = document.createElement("canvas");
        oc.width = 256;
        oc.height = 256;
        const octx = oc.getContext("2d");
        const g = octx.createLinearGradient(0, 0, 256, 256);
        g.addColorStop(0, "#3a2417");
        g.addColorStop(0.45, "#2b1a10");
        g.addColorStop(1, "#4a2d1e");
        octx.fillStyle = g;
        octx.fillRect(0, 0, 256, 256);
        octx.globalAlpha = 0.55;
        octx.strokeStyle = "rgba(255,214,170,0.16)";
        octx.lineWidth = 2;
        for (let y = 0; y < 256; y += 10) {
          octx.beginPath();
          const a = y * 0.11;
          octx.moveTo(0, y + Math.sin(a) * 2);
          for (let x = 0; x <= 256; x += 16) {
            octx.lineTo(x, y + Math.sin(a + x * 0.07) * 2);
          }
          octx.stroke();
        }
        octx.globalAlpha = 0.18;
        for (let i = 0; i < 4200; i++) {
          const x = Math.random() * 256;
          const y = Math.random() * 256;
          const v = 40 + Math.random() * 50;
          octx.fillStyle = `rgba(${v},${v * 0.72},${v * 0.55},0.16)`;
          octx.fillRect(x, y, 1, 1);
        }
        octx.globalAlpha = 1;
        const wood = ctx.createPattern(oc, "repeat");
        drawerAssets = { wood };
        return drawerAssets;
      }

      let audio = null;
      function audioInit() {
        if (audio) return audio;
        const A = window.AudioContext || window.webkitAudioContext;
        if (!A) return null;
        const ac = new A();
        const master = ac.createGain();
        const comp = ac.createDynamicsCompressor();
        comp.threshold.value = -18;
        comp.knee.value = 18;
        comp.ratio.value = 6;
        comp.attack.value = 0.004;
        comp.release.value = 0.18;
        const limiter = ac.createDynamicsCompressor();
        limiter.threshold.value = -6;
        limiter.knee.value = 0;
        limiter.ratio.value = 20;
        limiter.attack.value = 0.002;
        limiter.release.value = 0.12;
        const musicBus = ac.createGain();
        const sfxBus = ac.createGain();
        const typeBus = ac.createGain();
        const hp = ac.createBiquadFilter();
        hp.type = "highpass";
        hp.frequency.value = 30;
        master.connect(comp);
        comp.connect(limiter);
        limiter.connect(hp);
        hp.connect(ac.destination);
        musicBus.connect(master);
        sfxBus.connect(master);
        typeBus.connect(master);
        master.gain.value = 0.9;
        audio = { ac, master, musicBus, sfxBus, typeBus, bgm: null };
        audioApplyVolumes();
        return audio;
      }

      function audioApplyVolumes() {
        if (!audio) return;
        const mv = clamp((state.settings.musicVol ?? 55) / 100, 0, 1);
        const sv = clamp((state.settings.sfxVol ?? 55) / 100, 0, 1);
        const tv = clamp((state.settings.typeVol ?? 28) / 100, 0, 1);
        audio.musicBus.gain.value = mv * 0.9;
        audio.sfxBus.gain.value = sv * 0.9;
        audio.typeBus.gain.value = tv * 0.6;
      }

      function rampParam(p, v, t, k) {
        try {
          p.cancelScheduledValues(t);
          p.setValueAtTime(p.value, t);
          p.linearRampToValueAtTime(v, t + (k || 0.12));
        } catch {}
      }

      function mkNoise(ac, dur) {
        const sr = ac.sampleRate;
        const n = Math.max(1, Math.floor(sr * dur));
        const b = ac.createBuffer(1, n, sr);
        const d = b.getChannelData(0);
        let x = 0;
        for (let i = 0; i < n; i++) {
          x = x * 0.975 + (Math.random() * 2 - 1) * 0.025;
          d[i] = x;
        }
        const s = ac.createBufferSource();
        s.buffer = b;
        return s;
      }

      function mkReverbLite(ac) {
        const inGain = ac.createGain();
        const d1 = ac.createDelay(0.6);
        const d2 = ac.createDelay(0.6);
        d1.delayTime.value = 0.18;
        d2.delayTime.value = 0.27;
        const fb1 = ac.createGain();
        const fb2 = ac.createGain();
        fb1.gain.value = 0.22;
        fb2.gain.value = 0.18;
        const lp = ac.createBiquadFilter();
        lp.type = "lowpass";
        lp.frequency.value = 1600;
        const outGain = ac.createGain();
        outGain.gain.value = 0.22;
        inGain.connect(d1);
        inGain.connect(d2);
        d1.connect(lp);
        d2.connect(lp);
        lp.connect(outGain);
        lp.connect(fb1);
        fb1.connect(d1);
        lp.connect(fb2);
        fb2.connect(d2);
        return { input: inGain, output: outGain };
      }

      function mkMusic(ac, key) {
        const out = ac.createGain();
        out.gain.value = 0;
        const hp = ac.createBiquadFilter();
        hp.type = "highpass";
        hp.frequency.value = key === "C" ? 70 : 40;
        const lp = ac.createBiquadFilter();
        lp.type = "lowpass";
        lp.frequency.value = key === "C" ? 2600 : 2200;
        const rev = mkReverbLite(ac);
        out.connect(hp);
        hp.connect(lp);
        lp.connect(audio.musicBus);
        lp.connect(rev.input);
        rev.output.connect(audio.musicBus);

        const bpm = key === "C" ? 104 : key === "final" ? 96 : 88;
        const beat = 60 / bpm;
        const seq = {
          hub: { root: 60, prog: [0, 7, 5, 9], lead: [0, 2, 4, 7, 9, 7, 4, 2] },
          A: { root: 62, prog: [0, 5, 7, 9], lead: [0, 2, 4, 2, 7, 4, 2, 0] },
          B: { root: 64, prog: [0, 9, 5, 7], lead: [0, 2, 5, 7, 9, 7, 5, 2] },
          C: { root: 57, prog: [0, 7, 10, 5], lead: [0, 3, 5, 7, 10, 7, 5, 3] },
          final: { root: 59, prog: [0, 5, 7, 12], lead: [0, 2, 4, 7, 12, 7, 4, 2] },
          vote: { root: 61, prog: [0, 7, 3, 10], lead: [0, 3, 7, 10, 7, 3, 0, 3] },
        };
        const s = seq[key] || seq.hub;
        const st = {
          key,
          out,
          beat,
          root: s.root,
          prog: s.prog,
          lead: s.lead,
          step: 0,
          nextAt: ac.currentTime + 0.03,
          stopAt: 0,
          killed: false,
        };

        const schedule = () => {
          if (st.killed) return;
          const nowT = ac.currentTime;
          const look = 0.14;
          while (st.nextAt < nowT + look) {
            const bar = Math.floor(st.step / 16);
            const beatIdx = st.step % 16;
            const chord = s.prog[bar % s.prog.length];
            const rootMidi = s.root + chord;
            const t = st.nextAt;

            if (beatIdx % 4 === 0) {
              musicPad(ac, out, t, rootMidi);
            }
            if (beatIdx % 2 === 0) {
              const li = s.lead[(st.step / 2) % s.lead.length];
              musicPluck(ac, out, t + 0.002, rootMidi + li + 12);
            }
            if (beatIdx === 8 && key !== "A") {
              musicTick(ac, out, t + 0.001, key === "C" ? 1200 : 900);
            }

            st.step += 1;
            st.nextAt += st.beat / 4;
          }
          if (st.stopAt && ac.currentTime >= st.stopAt) {
            st.killed = true;
            try {
              out.disconnect();
            } catch {}
            return;
          }
          setTimeout(schedule, 38);
        };
        schedule();
        return st;
      }

      function midiHz(n) {
        return 440 * Math.pow(2, (n - 69) / 12);
      }

      function musicPad(ac, out, t, rootMidi) {
        const g = ac.createGain();
        g.gain.value = 0;
        const f = ac.createBiquadFilter();
        f.type = "lowpass";
        f.frequency.value = 1800;
        const o1 = ac.createOscillator();
        const o2 = ac.createOscillator();
        o1.type = "triangle";
        o2.type = "sine";
        o1.frequency.value = midiHz(rootMidi);
        o2.frequency.value = midiHz(rootMidi + 7);
        o1.detune.value = -6;
        o2.detune.value = 4;
        o1.connect(f);
        o2.connect(f);
        f.connect(g);
        g.connect(out);
        rampParam(g.gain, 0.045, t, 0.08);
        rampParam(g.gain, 0.0001, t + 0.44, 0.28);
        o1.start(t);
        o2.start(t);
        o1.stop(t + 0.9);
        o2.stop(t + 0.9);
      }

      function musicPluck(ac, out, t, midi) {
        const o = ac.createOscillator();
        const g = ac.createGain();
        const bp = ac.createBiquadFilter();
        bp.type = "bandpass";
        bp.frequency.value = 900;
        bp.Q.value = 0.8;
        o.type = "sine";
        o.frequency.value = midiHz(midi);
        g.gain.value = 0;
        o.connect(bp);
        bp.connect(g);
        g.connect(out);
        rampParam(g.gain, 0.06, t, 0.01);
        rampParam(g.gain, 0.0001, t + 0.14, 0.12);
        o.start(t);
        o.stop(t + 0.22);
      }

      function musicTick(ac, out, t, f0) {
        const n = mkNoise(ac, 0.06);
        const bp = ac.createBiquadFilter();
        bp.type = "bandpass";
        bp.frequency.value = f0;
        bp.Q.value = 6;
        const g = ac.createGain();
        g.gain.value = 0;
        n.connect(bp);
        bp.connect(g);
        g.connect(out);
        rampParam(g.gain, 0.03, t, 0.005);
        rampParam(g.gain, 0.0001, t + 0.05, 0.045);
        n.start(t);
        n.stop(t + 0.08);
      }
      function audioBgm(kind) {
        if (!state.settings.audioOn) return;
        const a = audioInit();
        if (!a) return;
        a.ac.resume();
        audioApplyVolumes();

        const key = kind === "A" || kind === "B" || kind === "C" ? kind : kind === "final" ? "final" : kind === "vote" ? "vote" : "hub";
        const t = a.ac.currentTime;
        if (a.bgm && a.bgm.out) {
          try {
            rampParam(a.bgm.out.gain, 0.0001, t, 1.0);
            a.bgm.stopAt = t + 1.2;
          } catch {}
        }
        const next = mkMusic(a.ac, key);
        next.out.connect(a.musicBus);
        rampParam(next.out.gain, 0.10, t, 0.8);
        a.bgm = next;
      }
      function audioSfx(type) {
        if (!state.settings.audioOn) return;
        const a = audioInit();
        if (!a) return;
        const t = a.ac.currentTime;
        audioApplyVolumes();

        const outBus = type === "type" ? a.typeBus : a.sfxBus;

        if (type === "type") {
          const n = mkNoise(a.ac, 0.03);
          const bp = a.ac.createBiquadFilter();
          bp.type = "bandpass";
          bp.frequency.value = 1400;
          bp.Q.value = 10;
          const g = a.ac.createGain();
          g.gain.value = 0;
          n.connect(bp);
          bp.connect(g);
          g.connect(outBus);
          rampParam(g.gain, 0.05, t, 0.004);
          rampParam(g.gain, 0.0001, t + 0.028, 0.02);
          n.start(t);
          n.stop(t + 0.05);
          return;
        }

        if (type === "click" || type === "ui") {
          const n = mkNoise(a.ac, 0.06);
          const hp2 = a.ac.createBiquadFilter();
          hp2.type = "highpass";
          hp2.frequency.value = 600;
          const g = a.ac.createGain();
          g.gain.value = 0;
          n.connect(hp2);
          hp2.connect(g);
          g.connect(outBus);
          rampParam(g.gain, 0.06, t, 0.004);
          rampParam(g.gain, 0.0001, t + 0.05, 0.04);
          n.start(t);
          n.stop(t + 0.08);
          return;
        }

        if (type === "stamp" || type === "shutter") {
          const n = mkNoise(a.ac, 0.18);
          const bp = a.ac.createBiquadFilter();
          bp.type = "bandpass";
          bp.frequency.value = type === "shutter" ? 2200 : 1200;
          bp.Q.value = type === "shutter" ? 12 : 8;
          const g = a.ac.createGain();
          g.gain.value = 0;
          n.connect(bp);
          bp.connect(g);
          g.connect(outBus);
          rampParam(g.gain, type === "shutter" ? 0.12 : 0.10, t, 0.006);
          rampParam(g.gain, 0.0001, t + 0.14, 0.10);
          n.start(t);
          n.stop(t + 0.22);
          return;
        }

        if (type === "hoof") {
          const o = a.ac.createOscillator();
          const g = a.ac.createGain();
          const lp = a.ac.createBiquadFilter();
          lp.type = "lowpass";
          lp.frequency.value = 260;
          o.type = "sine";
          o.frequency.setValueAtTime(110, t);
          o.frequency.exponentialRampToValueAtTime(62, t + 0.12);
          g.gain.value = 0;
          o.connect(lp);
          lp.connect(g);
          g.connect(outBus);
          rampParam(g.gain, 0.18, t, 0.004);
          rampParam(g.gain, 0.0001, t + 0.16, 0.12);
          o.start(t);
          o.stop(t + 0.22);
          return;
        }

        if (type === "crown") {
          const o = a.ac.createOscillator();
          const g = a.ac.createGain();
          o.type = "triangle";
          o.frequency.setValueAtTime(660, t);
          o.frequency.exponentialRampToValueAtTime(990, t + 0.10);
          g.gain.value = 0;
          o.connect(g);
          g.connect(outBus);
          rampParam(g.gain, 0.14, t, 0.006);
          rampParam(g.gain, 0.0001, t + 0.20, 0.16);
          o.start(t);
          o.stop(t + 0.26);
          return;
        }

        const o = a.ac.createOscillator();
        const g = a.ac.createGain();
        o.type = "sine";
        o.frequency.setValueAtTime(320, t);
        g.gain.value = 0;
        o.connect(g);
        g.connect(outBus);
        rampParam(g.gain, 0.10, t, 0.006);
        rampParam(g.gain, 0.0001, t + 0.12, 0.10);
        o.start(t);
        o.stop(t + 0.18);
      }

      let bc = null;
      function bcInit() {
        if (bc) return bc;
        if (!("BroadcastChannel" in window)) return null;
        bc = new BroadcastChannel(VOTE_CHANNEL);
        bc.onmessage = (ev) => {
          const m = ev.data;
          if (!m || !m.type) return;
          if (m.type === "vote_open") onVoteOpen(m.vote);
          if (m.type === "vote_cast") onVoteCast(m.voteId, m.option);
          if (m.type === "vote_result") onVoteResult(m.voteId, m.winner);
        };
        return bc;
      }

      function openVote(reason) {

      function onVoteCast(voteId, option) {

      function onVoteResult(voteId, winner) {

      function castVote(option) {
        const v = state.flow.vote;
        if (!v || v.voted) return;
        v.voted = true;
        v.counts[option] = (v.counts[option] || 0) + 1;
        state.achievements = state.achievements || { unlocked: {}, stats: {} };
        state.achievements.stats = state.achievements.stats || {};
        state.achievements.stats.votes = (state.achievements.stats.votes || 0) + 1;
        unlockAchievement("ach_vote");
        bcInit()?.postMessage({ type: "vote_cast", voteId: v.id, option });
        saveState();
      }
      function finalizeVote() {
        const v = state.flow.vote;
        if (!v || v.winner !== undefined) return;
        if (!bcInit()) {
          const seed = hash32(v.id + "|crowd|" + String(state.settings.mood) + "|" + String(state.mirrorFracture) + "|" + String(state.stats.headwindCharge));
          const r = mulberry32(seed);
          const crowd = 7 + (seed % 9);
          const bias = v.topic === "交付还是发疯" ? 0.5 + (state.mirrorFracture - 4) * 0.06 : v.topic === "寄出还是塞回" ? 0.5 + (state.stats.headwindCharge - 2) * 0.06 : 0.5 + (state.settings.mood - 50) * 0.004;
          let c0 = 0;
          let c1 = 0;
          for (let i = 0; i < crowd; i++) {
            if (r() < clamp(bias, 0.2, 0.8)) c0++;
            else c1++;
          }
          v.counts[0] += c0;
          v.counts[1] += c1;
        }
        const base = hash32(v.id + "|" + String(v.counts[0]) + "|" + String(v.counts[1]));
        const winner = v.counts[0] === v.counts[1] ? (base & 1) : v.counts[0] > v.counts[1] ? 0 : 1;
        v.winner = winner;
        bcInit()?.postMessage({ type: "vote_result", voteId: v.id, winner });
        applyVoteOutcome(v.topic, winner);
        audioSfx("crown");
        saveState();
      }
      function applyVoteOutcome(topic, winner) {

            state.settings.mood = clamp((state.settings.mood || 55) + 6, 0, 100);

          if (winner === 0) state.stats.headwindCharge = clamp(state.stats.headwindCharge + 1, 0, 9);
          else state.mirrorFracture = clamp(state.mirrorFracture + 1, 0, 9);

      function puzzleDef(id) {
        for (let i = 0; i < PUZZLE_LEVELS.length; i++) if (PUZZLE_LEVELS[i].id === id) return PUZZLE_LEVELS[i];
        return PUZZLE_LEVELS[0];
      }

      function startPuzzle(id) {
        const def = puzzleDef(id);
        state.puzzle = state.puzzle || { unlocked: { p1: true }, progress: {}, stats: {} };
        state.puzzle.stats = state.puzzle.stats || {};
        state.puzzle.stats[id] = state.puzzle.stats[id] || { plays: 0, clears: 0, totalTimeMs: 0, hintClicks: 0 };
        state.puzzle.stats[id].plays += 1;
        const cam = def.graph.cam || { x: 1, y: 0.6, zoom: 1 };
        state.flow.puzzle = {
          id,
          phase: "intro",
          introAt: now(),
          firstTap: 0,
          showPanel: false,
          rot: 0,
          lift: 0,
          key: {},
          player: "s",
          moving: null,
          cam: { x: cam.x, y: cam.y, zoom: cam.zoom, tx: cam.x, ty: cam.y, tz: cam.zoom },
          hintAt: 0,
          hints: 0,
          startedAt: 0,
          solvedAt: 0,
        };
        state.flow.scene = "puzzle";
        saveState();
        audioBgm("final");
      }

      function gotoHub() {
        state.flow.scene = "hub";
        state.flow.run = null;
        state.flow.vote = null;
        saveState();
        closeKeyboard();
        audioBgm("hub");
      }
      function nextTurnFromHub() {
        ensureRun(state.flow.mode);
        const run = state.flow.run;
        const step = run.step;
        let moduleId = "A";
        if (step === 1 && run.forcedModule) {
          moduleId = run.forcedModule;
          run.forcedModule = null;
        } else if (step === 2) moduleId = "C";
        else if (step === 3) moduleId = "A";
        else if (step === 4) moduleId = "B";
        else moduleId = ["A", "B", "C"][Math.floor(Math.random() * 3)];
        openTurn(moduleId);
      }
      function openTurn(moduleId) {
        const run = state.flow.run;
        run.turnStartAt = now();
        run.current = { moduleId, phase: "input", input: "", sugar: "三分糖", leaveText: "", bMode: "say", scroll: 0, turn: null, result: null, vnLines: null, vnCursor: 0 };
        state.flow.scene = "turn";
        saveState();
        audioBgm(moduleId);
      }

      function addTitle(t) {
        state.titles = state.titles || [];
        if (!state.titles.includes(t)) state.titles.push(t);
      }

      function achIsUnlocked(id) {
        return !!(state.achievements && state.achievements.unlocked && state.achievements.unlocked[id]);
      }
      function unlockAchievement(id) {
        state.achievements = state.achievements || { unlocked: {}, stats: {} };
        state.achievements.unlocked = state.achievements.unlocked || {};
        if (state.achievements.unlocked[id]) return false;
        state.achievements.unlocked[id] = { ts: now() };
        const def = ACHIEVEMENTS.find((x) => x.id === id);
        if (def && def.reward) {
          if (def.reward.hongdou) state.shards.hongdou += def.reward.hongdou;
          if (def.reward.sugar) state.shards.sugar += def.reward.sugar;
          if (def.reward.hoofprint) state.shards.hoofprint += def.reward.hoofprint;
        }
        toast(`成就解锁：${def ? def.name : id}`);
        audioSfx("crown");
        return true;
      }

      function chapterDef(id) {
        for (let i = 0; i < CHAPTER_DEFS.length; i++) if (CHAPTER_DEFS[i].id === id) return CHAPTER_DEFS[i];
        return CHAPTER_DEFS[0];
      }

      function startChapterById(id, flags) {
        const def = chapterDef(id);
        state.flow.chapter = {
          id: def.id,
          title: def.title,
          phase: "run1",
          runIndex: 1,
          openedAt: now(),
          unlocked: { N0: true, N1: true },
          bossAnswer: "",
          endings: {},
          flags: { a: 0, b: 0, c: 0, ...((flags && typeof flags === "object") ? flags : {}) },
        };
        state.flow.mode = "chapter";
        state.stats.lastChapterId = def.id;
        state.stats.lastChapterStartAt = now();
        saveState();
        audioBgm(def.bgmKey);
        startRun("chapter");
      }

      function finalizeChapterEnding(ch) {
        const def = chapterDef(ch.id || "ch_core");
        const started = state.stats.lastChapterStartAt || ch.openedAt || now();
        const dur = now() - started;
        state.achievements = state.achievements || { unlocked: {}, stats: {} };
        state.achievements.stats = state.achievements.stats || {};
        const best = state.achievements.stats.speedrunBest || 0;
        if (!best || dur < best) state.achievements.stats.speedrunBest = dur;
        if (dur > 0 && dur < 9 * 60 * 1000) unlockAchievement("ach_speed");

        const f = state.mirrorFracture;
        let ending = "";
        if (def.id === "ch3") {
          const echoN = (state.echoPool || []).length;
          if (f >= 7) ending = "ch3_island";
          else if ((ch.flags && ch.flags.storyEcho === 1) && echoN >= 4 && state.stats.aEchoGain >= 1) ending = "ch3_echo";
          else ending = "ch3_warm";
          unlockAchievement("ach_ch3");
        } else if (def.id === "ch4") {
          const last = (ch.flags && ch.flags.bLast) || "";
          if (last === "A") ending = "ch4_send";
          else if (last === "B") ending = f >= 7 ? "ch4_mirror" : "ch4_putback";
          else if (last === "C") ending = "ch4_burn";
          else ending = "ch4_letter";
          unlockAchievement("ach_ch4");
        } else if (def.id === "ch5") {
          if (state.titles.includes("逆风王")) ending = "ch5_king";
          else if (state.stats.mileage >= 8 && state.stats.fuel > 0) ending = "ch5_escape";
          else ending = "ch5_return";
          unlockAchievement("ach_ch5");
        } else {
          ending = Object.keys(ch.endings || {}).length >= 3 ? "ch_core_win" : "ch_core";
        }

        if (ending) unlockEnding(ending);
        state.achievements.stats.chaptersCleared = (state.achievements.stats.chaptersCleared || 0) + 1;
        state.achievements.stats.chapterDone = state.achievements.stats.chapterDone || {};
        state.achievements.stats.chapterDone[def.id] = { ts: now(), ending };
        saveState();
        return ending;
      }
      function unlockEnding(key) {
        state.endings = state.endings || {};
        state.endings[key] = 1;
        const ch = state.flow.chapter;
        if (state.flow.mode === "chapter" && ch) {
          ch.endings = ch.endings || {};
          ch.endings[key] = 1;
        }
        const total = Object.keys(state.endings || {}).length;
        state.achievements = state.achievements || { unlocked: {}, stats: {} };
        state.achievements.stats = state.achievements.stats || {};
        state.achievements.stats.endings = total;
        if (total >= 9) unlockAchievement("ach_collect");
      }
      function unlockNode(id) {
        const ch = state.flow.chapter;
        if (!ch) return;
        ch.unlocked = ch.unlocked || {};
        ch.unlocked[id] = true;
      }
      function calcScore(moduleId) {
        const f = state.mirrorFracture;
        if (moduleId === "A") {
          const healValue = clamp(100 - moodVector().anxiety + state.shards.sugar * 2, 0, 120);
          return { name: "谷雨处方评分", value: Math.round(healValue + state.stats.aEchoGain * 12 - f * 6) };
        }
        if (moduleId === "B") {
          const ch = state.flow.chapter;
          const uniq = state.flow.mode === "chapter" && ch ? Object.keys(ch.endings || {}).length : Object.keys(state.endings || {}).length;
          return { name: "意难平指数", value: Math.round(uniq * 18 + state.shards.hongdou * 6 + clamp(state.stats.bConsecutivePutBack * 8, 0, 40)) };
        }
        return { name: "爽感分", value: Math.round(state.stats.mileage * 18 + state.stats.headwindCharge * 10 + (state.titles.includes("逆风王") ? 35 : 0) - f * 6) };
      }
      function calcWinHint(moduleId) {
        if (moduleId === "A") return state.stats.aRunSugar >= 3 && state.mirrorFracture <= 3 ? "治愈胜利" : "继续收集糖度";
        if (moduleId === "B") {
          const ch = state.flow.chapter;
          const n = state.flow.mode === "chapter" && ch ? Object.keys(ch.endings || {}).length : Object.keys(state.endings || {}).length;
          return n >= 3 ? "回信胜利" : "继续收集结局";
        }
        return state.stats.mileage >= 5 && state.stats.fuel > 0 ? "逃亡胜利" : "继续冲里程";
      }

      function finishTurnChoice(choiceId) {
        const run = state.flow.run;
        const cur = run.current;
        const turn = cur.turn;
        if (!turn) return;
        run.res = run.res || { ink: 2, heat: 0, focus: 2 };
        const res = run.res;
        const vid = (turn.variant && turn.variant.id) || "";

        if (cur.ugcId) {
          const it = (state.ugc.items || []).find((x) => x.id === cur.ugcId);
          const tcost = now() - (state.flow.ugcPlay ? state.flow.ugcPlay.startAt : now());
          if (it) {
            it.totalTime = (it.totalTime || 0) + tcost;
            if (choiceId === "A" || choiceId === "C") {
              it.finishes = (it.finishes || 0) + 1;
              if (choiceId === "C") it.shares = (it.shares || 0) + 1;
              const rs = it.rewards || [];
              for (let i = 0; i < rs.length; i++) {
                if (rs[i] === "hongdou") state.shards.hongdou += 1;
                if (rs[i] === "sugar") state.shards.sugar += 1;
                if (rs[i] === "hoofprint") state.shards.hoofprint += 1;
              }
              audioSfx(choiceId === "C" ? "shutter" : "stamp");
            } else {
              it.penalty = (it.penalty || 0) + 1;
              state.mirrorFracture = clamp(state.mirrorFracture + 1, 0, 9);
            }
            ugcRank(it);
          }
          pushHistory(turn);
          run.turns.push({ moduleId: "UGC", choiceId, seed: turn.shareCard.seed, ts: now() });
          state.stats.lastSeed = turn.shareCard.seed;
          cur.phase = "result";
          cur.result = { share: turn.shareCard, score: calcScore("A"), hint: "UGC结算" };
          state.flow.ugcPlay = null;
          saveState();
          return;
        }

        if (turn.moduleId === "A") {
          if (choiceId === "A") {
            state.shards.sugar += cur.sugar === "五分糖" ? 2 : 1;
            state.mirrorFracture = clamp(state.mirrorFracture - 1, 0, 9);
            state.stats.aRunSugar += 1;
            state.stats.aNoHalfPriceStreak = 0;
            state.stats.headwindCharge = clamp(state.stats.headwindCharge + 1, 0, 9);
            const leave = (cur.leaveText || "").trim();
            if (leave) {
              addEcho(leave, cur.sugar, turn.shareCard.seed);
              state.stats.aEchoGain += 1;
            }
            audioSfx("stamp");
          } else if (choiceId === "C") {
            const r = mulberry32(hash32(turn.shareCard.seed + "|rush|" + String(state.mirrorFracture)));
            const drift = r() < 0.55 ? -1 : 1;
            state.shards.sugar += 2;
            state.mirrorFracture = clamp(state.mirrorFracture + drift, 0, 9);
            res.heat = clamp((res.heat || 0) + 1, 0, 6);
            state.stats.aRunSugar += 1;
            state.stats.aNoHalfPriceStreak = 0;
            audioSfx("shutter");
          } else {
            state.mirrorFracture = clamp(state.mirrorFracture + 1, 0, 9);
            state.stats.aNoHalfPriceStreak += 1;
          }
          if (vid === "A_balance") {
            if (cur.sugar === "无糖") state.mirrorFracture = clamp(state.mirrorFracture + 1, 0, 9);
            if (cur.sugar === "五分糖") state.mirrorFracture = clamp(state.mirrorFracture - 1, 0, 9);
          }
          if (vid === "A_memory" && (cur.leaveText || "").trim() && (choiceId === "A" || choiceId === "C")) {
            state.shards.sugar += 1;
            res.heat = clamp((res.heat || 0) + 1, 0, 6);
          }
          if (state.flow.mode === "chapter" && state.flow.chapter) {
            const ch = state.flow.chapter;
            ch.flags = ch.flags || { a: 0, b: 0, c: 0 };
            ch.flags.a += choiceId === "A" ? 2 : 1;
          }
          drawerMeta("A").seen = true;
          gainDrawerXp("A", choiceId === "B" ? 1 : 2);
        }

        if (turn.moduleId === "B") {
          const tone = turn.style === "glitch" ? "glitch" : turn.style === "calm" ? "warm" : "calm";
          if (choiceId === "A") {
            const inkBoost = vid === "B_stamp" && (res.ink || 0) > 0;
            if (inkBoost) res.ink -= 1;
            state.shards.hongdou += inkBoost ? 2 : 1;
            state.mirrorFracture = clamp(state.mirrorFracture - (inkBoost ? 2 : 1), 0, 9);
            state.stats.headwindCharge = clamp(state.stats.headwindCharge + 2, 0, 9);
            state.stats.bConsecutivePutBack = 0;
            audioSfx("stamp");
            unlockEnding(`send_${tone}`);
          } else if (choiceId === "B") {
            state.mirrorFracture = clamp(state.mirrorFracture + 1, 0, 9);
            state.stats.bConsecutivePutBack += 1;
            unlockEnding(`putback_${tone}`);
          } else {
            state.mirrorFracture = clamp(state.mirrorFracture - 1, 0, 9);
            state.stats.bConsecutivePutBack = 0;
            unlockEnding(`burn_${tone}`);
          }
          unlockNode("N4");
          if (state.stats.bConsecutivePutBack >= 3 && state.mirrorFracture >= 7) {
            state.flow.scene = "mirrorEgg";
            unlockNode("X1");
            unlockAchievement("ach_mirror");
            saveState();
            return;
          }
          if (state.flow.mode === "chapter" && state.flow.chapter) {
            const ch = state.flow.chapter;
            ch.flags = ch.flags || { a: 0, b: 0, c: 0 };
            ch.flags.b += choiceId === "A" ? 2 : choiceId === "B" ? 1 : 3;
            ch.flags.bLast = choiceId;
          }
          drawerMeta("B").seen = true;
          gainDrawerXp("B", choiceId === "B" ? 1 : 2);
        }

        if (turn.moduleId === "C") {
          if (choiceId === "A") {
            state.shards.hoofprint += 1;
            state.stats.mileage += 1;
            state.stats.fuel = clamp(state.stats.fuel - 1, 0, 9);
            state.stats.cFailStreak = 0;
            audioSfx("hoof");
            unlockNode("N3");
          } else if (choiceId === "C") {
            state.stats.fuel = clamp(state.stats.fuel + 2, 0, 9);
            res.focus = clamp((res.focus || 0) + 1, 0, 6);
            audioSfx("stamp");
          } else {
            const r = mulberry32(hash32(turn.shareCard.seed + "|king|" + String(state.stats.headwindCharge) + "|" + String(state.shards.hoofprint)));
            let base = 0.3 + state.stats.headwindCharge * 0.08 + state.shards.hoofprint * 0.02 - state.mirrorFracture * 0.02;
            if (vid === "C_drift" && (res.focus || 0) > 0) {
              res.focus -= 1;
              base += 0.10;
            }
            const ok = r() < clamp(base, 0.22, 0.78);
            if (ok) {
              audioSfx("crown");
              addTitle("逆风王");
              unlockAchievement("ach_king");
              state.stats.headwindCharge = clamp(state.stats.headwindCharge + 1, 0, 9);
              state.stats.cFailStreak = 0;
              unlockNode("N8");
            } else {
              state.stats.cFailStreak += 1;
              state.mirrorFracture = clamp(state.mirrorFracture + 1, 0, 9);
            }
          }
          if (state.flow.mode === "chapter" && state.flow.chapter) {
            const ch = state.flow.chapter;
            ch.flags = ch.flags || { a: 0, b: 0, c: 0 };
            ch.flags.c += choiceId === "A" ? 1 : 2;
          }
          drawerMeta("C").seen = true;
          gainDrawerXp("C", choiceId === "A" ? 2 : 2);
        }

        if (turn.objective && turn.objective.ok) {
          if (turn.objective.id === "obj_leave" && (choiceId === "A" || choiceId === "C")) state.shards.sugar += 1;
          if (turn.objective.id === "obj_5" && choiceId === "A") state.shards.hongdou += 1;
          if (turn.objective.id === "obj_theme" && choiceId === "A") state.shards.hoofprint += 1;
        }

        pushHistory(turn);
        run.usedTopics[turn.topic] = true;
        run.turns.push({ moduleId: turn.moduleId, choiceId, seed: turn.shareCard.seed, ts: now() });
        if (state.flow.mode === "chapter" && state.flow.chapter) {
          const ch = state.flow.chapter;
          ch.used = ch.used || { A: false, B: false, C: false };
          ch.used[turn.moduleId] = true;
          if (ch.used.A && ch.used.B && ch.used.C) unlockAchievement("ach_combo");
        }
        state.stats.lastSeed = turn.shareCard.seed;

        const failC = state.mirrorFracture >= 9 || state.stats.cFailStreak >= 2;
        if (failC) {
          state.flow.scene = "fail";
          saveState();
          return;
        }
        const failA = state.mirrorFracture >= 8 && state.stats.aNoHalfPriceStreak >= 2;
        if (failA) {
          state.flow.scene = "aFail";
          saveState();
          return;
        }

        cur.phase = "result";
        cur.result = { share: turn.shareCard, score: calcScore(turn.moduleId), hint: calcWinHint(turn.moduleId) };
        if (turn.moduleId === "A" && state.stats.aRunSugar >= 3 && state.mirrorFracture <= 3) unlockAchievement("ach_heal");
        saveState();
      }

      function proceedAfterResult() {
        const run = state.flow.run;
        if (!run) {
          gotoHub();
          return;
        }
        if (run.mode === "ugc") {
          state.flow.run = null;
          state.flow.scene = "ugcFeed";
          saveState();
          return;
        }
        run.step += 1;
        if (run.step > 5) {
          state.flow.run = null;
          if (state.flow.mode === "chapter") {
            const ch = state.flow.chapter;
            if (ch && ch.phase === "run1") {
              ch.phase = "vote";
              saveState();
              openVote("chapter");
              return;
            }
            if (ch && ch.phase === "vote") {
              ch.phase = "run2";
              saveState();
              startRun("chapter");
              return;
            }
            if (ch && ch.phase === "run2") {
              ch.phase = "boss";
              state.flow.scene = "boss";
              saveState();
              return;
            }
          }
          state.flow.scene = "runSummary";
          state.flow.lastShare = makeRunShare();
          saveState();
          return;
        }
        nextTurnFromHub();
      }

      function makeRunShare() {
        const t = getWeekTheme(now());
        const quote = pick(MIRROR_LINES);
        const seed = seedFrom(["run", dayKey(now()), String(state.mirrorFracture), String(state.stats.headwindCharge), String(state.stats.mileage)]);
        return { headline: "深夜结算大卡", quote: quote.length > 18 ? quote.slice(0, 18) : quote, tags: [t.key, `裂纹${state.mirrorFracture}`, `红豆${state.shards.hongdou}`, `糖度${state.shards.sugar}`, `蹄印${state.shards.hoofprint}`], seed };
      }
      function shareText(card) {
        const tags = (card.tags || []).map((x) => "#" + x).join(" ");
        return `《${card.headline}》\n${card.quote}\n${tags}\nseed:${card.seed}`;
      }
      function copyText(text) {
        const t = String(text);
        const p = navigator.clipboard && navigator.clipboard.writeText ? navigator.clipboard.writeText(t) : null;
        if (p && typeof p.then === "function") {
          p.then(() => toast("已复制"), () => copyFallback(t));
          return;
        }
        copyFallback(t);
      }
      function copyFallback(text) {
        kb.value = text;
        kb.focus();
        kb.select();
        try {
          document.execCommand("copy");
          toast("已复制");
        } catch {
          toast("复制失败");
        }
        closeKeyboard();
      }

      function ugcRank(it) {
        const plays = Math.max(1, it.plays || 0);
        const finishRate = (it.finishes || 0) / plays;
        const shareRate = (it.shares || 0) / plays;
        const likeRate = (it.likes || 0) / plays;
        const replayRate = (it.replays || 0) / plays;
        const avgTime = (it.totalTime || 0) / plays;
        const avgTimeN = clamp(avgTime / 90000, 0, 1);
        const penalty = clamp((it.penalty || 0) / 10, 0, 1);
        const crashRate = clamp((it.crashes || 0) / plays, 0, 1);
        const dupRate = clamp(it.dupRate || 0, 0, 1);
        const base = 0.35 * finishRate + 0.25 * shareRate + 0.2 * likeRate + 0.1 * replayRate + 0.1 * avgTimeN;
        it.finishRate = finishRate;
        it.shareRate = shareRate;

      function ugcExport(it) {

        const b = btoa(unescape(encodeURIComponent(raw))).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");

      function ugcImport(text) {
        const t = (text || "").trim();
        if (!t.startsWith("UGC1:")) return null;
        const b = t.slice(5).replace(/-/g, "+").replace(/_/g, "/");
        const pad = b.length % 4 ? "=".repeat(4 - (b.length % 4)) : "";
        const raw = decodeURIComponent(escape(atob(b + pad)));
        const obj = safeParse(raw, null);
        if (!obj || (obj.v !== 1 && obj.v !== 2)) return null;
        const it = ugcDefaultDraft();
        it.id = obj.id || it.id;
        it.tpl = obj.tpl || it.tpl;

        it.opening = obj.opening || it.opening;
        it.twist = obj.twist || it.twist;

        it.gate = obj.gate || it.gate;
        it.gateValue = typeof obj.gateValue === "number" ? obj.gateValue : it.gateValue;
        it.choiceCount = obj.choiceCount === 3 ? 3 : 2;

        it.bgm = obj.bgm || it.bgm;

      function puzzleNode(def, id) {
        const ns = def.graph.nodes;
        for (let i = 0; i < ns.length; i++) if (ns[i].id === id) return ns[i];
        return ns[0];
      }

      function puzzleEdgeActive(def, rt, e, rot, lift, key) {
        if (e.rot && !e.rot.includes(rot)) return false;
        if (typeof e.lift === "number" && e.lift !== lift) return false;
        if (e.gate && !(key && key[e.gate])) return false;
        return true;
      }

      function puzzleAdj(def, rot, lift, key) {
        const m = {};
        const es = def.graph.edges;
        for (let i = 0; i < es.length; i++) {
          const e = es[i];
          if (!puzzleEdgeActive(def, null, e, rot, lift, key)) continue;
          m[e.a] = m[e.a] || [];
          m[e.b] = m[e.b] || [];
          m[e.a].push({ to: e.b, illusion: !!e.illusion });
          m[e.b].push({ to: e.a, illusion: !!e.illusion });
        }
        return m;
      }

      function isoProject(x, y, z, rot) {
        let xx = x;
        let yy = y;
        if (rot === 1) {
          xx = y;
          yy = -x;
        } else if (rot === 2) {
          xx = -x;
          yy = -y;
        } else if (rot === 3) {
          xx = -y;
          yy = x;
        }
        const sx = (xx - yy) * 0.866;
        const sy = (xx + yy) * 0.5 - z * 0.9;
        return { sx, sy };
      }

      function drawPuzzle() {

        const cam = rt.cam;
        cam.x = lerp(cam.x, cam.tx, 0.08);
        cam.y = lerp(cam.y, cam.ty, 0.08);
        cam.zoom = lerp(cam.zoom, cam.tz, 0.08);

        const centerX = x0 + innerW * 0.50;
        const centerY = y0 + innerH * 0.52;
        const unit = Math.min(innerW, innerH) * 0.16 * cam.zoom;

        ctx.font = `12px ${fontMono}`;
        const seed = state.stats.lastSeed ? `seed:${state.stats.lastSeed}` : "seed:—";
        const tw = ctx.measureText(seed).width;
        ctx.fillStyle = "rgba(255,255,255,0.55)";
        const maxW = Math.max(90, aw * 0.40);
        let seedText = seed;
        if (tw > maxW) {
          const keep = Math.max(6, Math.floor((maxW / tw) * seed.length));
          seedText = seed.slice(0, 6) + "…" + seed.slice(Math.max(6, seed.length - keep));
        }
        const tw2 = ctx.measureText(seedText).width;
        ctx.fillText(seedText, right - tw2, y0 + 44);
        hot("copySeed", right - tw2 - 8, y0 + 28, tw2 + 16, 26, () => {
          if (state.stats.lastSeed) copyText(`seed:${state.stats.lastSeed}`);
          else toast("暂无seed");
        }, () => {
          state.flow.scene = "help";
          saveState();
        });
        if (state.settings.showFps || state.settings.perfMode) {
          const fpsText = `${Math.round(perf.fps)}fps`;
          ctx.fillStyle = state.settings.perfMode ? "rgba(34,211,238,0.75)" : "rgba(255,255,255,0.55)";
          ctx.font = `12px ${fontMono}`;
          const ftw = ctx.measureText(fpsText).width;
          ctx.fillText(fpsText, right - ftw, y0 + 22);
        }
        hot("topTitle", pad, y0, aw - pad * 2, h, () => {
          state.flow.scene = "help";
          saveState();
        });
      }

      function drawHub() {
        const pad = 14;
        const top = insetTop;
        const w = aw - pad * 2;
        const h = ah - top - insetBottom;
        const x = pad + 14;
        const innerW = w - 28;

        state.flow.drawer = state.flow.drawer || { focus: -1, stage: "idle", t0: 0, dur: 650, moduleId: "A", talk: null, bgKey: "desk_rain", bgFrom: "desk_rain", bgT0: 0 };
        const d = state.flow.drawer;
        const t = now();
        const p = d.stage === "opening" ? easeOutBack((t - d.t0) / d.dur) : d.stage === "closing" ? 1 - easeOutCubic((t - d.t0) / d.dur) : d.stage === "open" ? 1 : 0;
        if (d.stage === "opening" && t - d.t0 >= d.dur) {
          d.stage = "open";
          d.talk = null;
          d.bgFrom = d.bgKey;
          d.bgT0 = t;
          saveState();
        }
        if (d.stage === "closing" && t - d.t0 >= d.dur) {
          d.stage = "idle";
          d.focus = -1;
          d.talk = null;
          saveState();
        }

        rrPath(pad, top, w, h, 18);
        ctx.fillStyle = "rgba(255,255,255,0.03)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.10)";
        ctx.stroke();

        drawDrawerBg(d, pad, top, w, h);

        if (d.stage === "idle") {
          ctx.fillStyle = "rgba(255,255,255,0.82)";
          ctx.font = `800 ${Math.round(14 * uiScale)}px ${fontSans}`;
          ctx.fillText("23:59 的赛博抽屉", x, top + 30);
          ctx.fillStyle = "rgba(255,255,255,0.62)";
          ctx.font = `${Math.round(12 * uiScale)}px ${fontSans}`;
          const hint = "点击抽屉抽出 · 单手友好 · 进入后可Run/Chapter/UGC";
          ctx.fillText(hint, x, top + 52);
          hot("hubHint", x - 6, top + 38, innerW, 22, () => {
            state.flow.scene = "help";
            saveState();
          });
        }

        const trayH = Math.min(560, h - 210);
        const trayY = top + 74;
        const dw = Math.min(innerW, 520);
        const dx = x + (innerW - dw) / 2;
        const dh = Math.floor(trayH / 3) - 12;
        const gap = 16;

        const items = [
          { moduleId: "A", title: "猫的地下酒吧", tag: "治愈/回流" },
          { moduleId: "B", title: "未寄出的信", tag: "叙事/分支" },
          { moduleId: "C", title: "工位逃亡录", tag: "爽感/挑战" },
        ];

        for (let i = 0; i < 3; i++) {
          const r = { x: dx, y: trayY + i * (dh + gap), w: dw, h: dh };
          const isFocus = d.focus === i;
          const z = d.stage === "idle" ? 0 : isFocus ? lerp(0, 0.30, p) : lerp(0, -0.10, p);
          const blur = d.stage !== "idle" && !isFocus ? 0.16 : 0;
          drawDrawerCard(r, z, blur, items[i], isFocus);
          if (d.stage === "idle") {
            hot(`drawerPick${i}`, r.x, r.y, r.w, r.h, () => {
              if (navigator.vibrate) navigator.vibrate(16);
              addRipple(r.x + r.w * 0.78, r.y + r.h * 0.52, "rgba(34,211,238,0.20)");
              d.focus = i;
              d.stage = "opening";
              d.t0 = now();
              d.dur = 650;
              d.moduleId = items[i].moduleId;
              d.bgFrom = d.bgKey;
              d.bgKey = items[i].moduleId === "A" ? "bar" : items[i].moduleId === "B" ? "letter" : "road";
              d.bgT0 = now();
              saveState();
              audioBgm(items[i].moduleId);
            });
          }
        }

        if (d.stage === "idle") {
          const quickY = trayY + trayH + 18;
          btn("drawerChapter", dx, quickY, dw, 56, "章节剧情（15min+）", "primary", () => startChapter());
          btn("drawerPuzzle", dx, quickY + 70, dw, 56, "解谜关卡（镜面建筑）", "primary", () => {
            startPuzzle("p1");
          });
          btn("drawerUGC", dx, quickY + 140, dw, 56, "UGC创意工坊", "ghost", () => {
            state.flow.scene = "ugcFeed";
            state.flow.ugcDraft = ugcDefaultDraft();
            saveState();
          });
          btn("drawerTree", dx, quickY + 210, dw, 56, "章节树/收藏册", "ghost", () => {
            state.flow.scene = "chapterTree";
            saveState();
          });
          btn("drawerSettings", dx, quickY + 280, dw, 56, "设置", "ghost", () => {
            state.flow.scene = "settings";
            saveState();
          });
          btn("drawerAch", dx, quickY + 350, dw, 56, "成就", "ghost", () => {
            state.flow.scene = "achievements";
            saveState();
          });
        }

        if (d.stage !== "idle") {
          ctx.fillStyle = "rgba(0,0,0,0.55)";
          ctx.fillRect(0, 0, aw, ah);
          hot("hubMask", 0, 0, aw, ah, () => {}, () => {});
        }
        if (d.stage === "open") drawDrawerOpenOverlay(d, pad, top, w, h);
      }

      function drawDrawerBg(d, pad, top, w, h) {
        const t = now();
        const mix = clamp((t - (d.bgT0 || t)) / 600, 0, 1);
        const a = drawerBgColors(d.bgFrom || d.bgKey);
        const b = drawerBgColors(d.bgKey);
        const g = ctx.createLinearGradient(0, top, 0, top + h);
        g.addColorStop(0, mixColor(a[0], b[0], mix));
        g.addColorStop(0.42, mixColor(a[1], b[1], mix));
        g.addColorStop(0.72, mixColor(a[2], b[2], mix));
        g.addColorStop(1, mixColor(a[3], b[3], mix));
        rrPath(pad, top, w, h, 18);
        ctx.fillStyle = g;
        ctx.fill();
        const n = state.settings.perfMode ? 14 : 26;
        for (let i = 0; i < n; i++) {
          const r = 28 + (i % 7) * 10;
          const x = pad + 24 + ((i * 67 + (t / 18) * 0.8) % (w - 48));
          const y = top + 40 + (((i * 109 + (t / 30) * 0.6) % (h - 80)) | 0);
          const gg = ctx.createRadialGradient(x, y, 0, x, y, r);
          gg.addColorStop(0, "rgba(255,255,255,0.045)");
          gg.addColorStop(1, "rgba(255,255,255,0)");
          ctx.fillStyle = gg;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fill();
        }

        drawStoryMirror3D(pad, top, w, h);
      }

      function drawStoryMirror3D(pad, top, w, h) {
        const mx = clamp((ui.mx - (pad + 14)) / Math.max(1, w - 28), 0, 1);
        const my = clamp((ui.my - (top + 14)) / Math.max(1, h - 28), 0, 1);
        const tx = (mx - 0.5) * 2;
        const ty = (my - 0.5) * 2;
        const cx = pad + w * 0.82;
        const cy = top + h * 0.30;
        const ww = Math.min(220, w * 0.34);
        const hh = ww * 1.25;
        const tilt = 10;
        const dx = tx * tilt;
        const dy = ty * tilt;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate((tx * 0.08 - ty * 0.04));
        const x = -ww / 2;
        const y = -hh / 2;
        rrPath(x, y, ww, hh, 18);
        ctx.fillStyle = "rgba(0,0,0,0.18)";
        ctx.shadowColor = "rgba(0,0,0,0.45)";
        ctx.shadowBlur = state.settings.perfMode ? 16 : 26;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = "rgba(255,255,255,0.14)";
        ctx.stroke();
        rrPath(x + 10, y + 10, ww - 20, hh - 20, 14);
        const g = ctx.createLinearGradient(x, y, x + ww, y + hh);
        g.addColorStop(0, "rgba(34,211,238,0.10)");
        g.addColorStop(0.5, "rgba(255,255,255,0.04)");
        g.addColorStop(1, "rgba(139,92,246,0.10)");
        ctx.fillStyle = g;
        ctx.fill();

        ctx.save();
        ctx.globalCompositeOperation = "screen";
        const hl = ctx.createLinearGradient(x + dx, y + dy, x + ww + dx, y + hh + dy);
        hl.addColorStop(0, "rgba(255,255,255,0)");
        hl.addColorStop(0.5, "rgba(255,255,255,0.16)");
        hl.addColorStop(1, "rgba(255,255,255,0)");
        rrPath(x + 10, y + 10, ww - 20, hh - 20, 14);
        ctx.fillStyle = hl;
        ctx.fill();
        ctx.restore();

        ctx.fillStyle = "rgba(255,255,255,0.62)";
        ctx.font = `800 ${Math.round(12 * uiScale)}px ${fontSans}`;
        const t = "镜面";
        const tw = ctx.measureText(t).width;
        ctx.fillText(t, -tw / 2, hh / 2 + 18);
        ctx.restore();
      }

      function drawerBgColors(key) {
        if (key === "bar") return ["#06121a", "#0b1d24", "#0b0f1c", "#07090f"];
        if (key === "letter") return ["#17120a", "#1b1420", "#0b0f1c", "#07090f"];
        if (key === "road") return ["#0b0a18", "#121a30", "#1a0f2a", "#07090f"];
        if (key === "mirror_council") return ["#04050a", "#121a30", "#1a0f2a", "#07090f"];
        return ["#07090f", "#0c1020", "#07121a", "#0b0f1c"];
      }

      function drawDrawerCard(r, z, blur, it, isFocus) {
        const a = getDrawerAssets();
        const s = 1 + z;
        const cx = r.x + r.w / 2;
        const cy = r.y + r.h / 2;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.scale(s, s);
        ctx.translate(-cx, -cy);

        ctx.save();
        ctx.shadowColor = isFocus ? "rgba(0,0,0,0.55)" : "rgba(0,0,0,0.38)";
        ctx.shadowBlur = 22 + z * 44;
        rrPath(r.x, r.y, r.w, r.h, 18);
        ctx.fillStyle = a.wood;
        ctx.fill();
        ctx.restore();

        const g = ctx.createLinearGradient(r.x, r.y, r.x + r.w, r.y + r.h);
        g.addColorStop(0, "rgba(255,255,255,0.08)");
        g.addColorStop(0.35, "rgba(255,255,255,0.02)");
        g.addColorStop(1, "rgba(0,0,0,0.12)");
        rrPath(r.x, r.y, r.w, r.h, 18);
        ctx.fillStyle = g;
        ctx.fill();

        ctx.strokeStyle = isFocus ? "rgba(255,255,255,0.34)" : "rgba(255,255,255,0.20)";
        ctx.lineWidth = 1;
        rrPath(r.x, r.y, r.w, r.h, 18);
        ctx.stroke();
        ctx.save();
        ctx.globalAlpha = 0.55;
        ctx.shadowColor = "rgba(255,255,255,0.26)";
        ctx.shadowBlur = 18;
        ctx.strokeStyle = "rgba(255,255,255,0.18)";
        rrPath(r.x + 1, r.y + 1, r.w - 2, r.h - 2, 18);
        ctx.stroke();
        ctx.restore();

        const hx = r.x + r.w * 0.08;
        const hy = r.y + r.h * 0.52;
        const hw = r.w * 0.16;
        const hh = 22;
        const hg = ctx.createLinearGradient(hx, hy, hx + hw, hy);
        hg.addColorStop(0, "rgba(255,255,255,0.18)");
        hg.addColorStop(0.5, "rgba(255,255,255,0.55)");
        hg.addColorStop(1, "rgba(0,0,0,0.25)");
        rrPath(hx, hy - hh / 2, hw, hh, 999);
        ctx.fillStyle = hg;
        ctx.fill();
        ctx.strokeStyle = "rgba(0,0,0,0.22)";
        ctx.stroke();

        ctx.fillStyle = "rgba(255,255,255,0.90)";
        ctx.font = `900 18px ${fontSans}`;
        ctx.fillText(`抽屉${it.moduleId}`, r.x + r.w * 0.30, r.y + r.h * 0.44);
        ctx.fillStyle = "rgba(255,255,255,0.82)";
        ctx.font = `700 16px ${fontSans}`;
        ctx.fillText(it.title, r.x + r.w * 0.30, r.y + r.h * 0.70);
        ctx.fillStyle = "rgba(255,255,255,0.55)";
        ctx.font = `12px ${fontSans}`;
        ctx.fillText(it.tag, r.x + r.w * 0.30, r.y + r.h * 0.86);

        if (blur > 0) {
          rrPath(r.x, r.y, r.w, r.h, 18);
          ctx.fillStyle = `rgba(0,0,0,${0.10 + blur})`;
          ctx.fill();
        }

        ctx.restore();
      }

      function drawerTalkFor(moduleId) {
        if (moduleId === "A") return { char: "猫", id: "cat", lines: ["来都来了，先坐下。", "给我一句烦恼，我给你一张处方签。", "第二杯半价不是优惠，是借口。"], options: ["开一局", "连玩Run", "返回"] };
        if (moduleId === "B") return { char: "同桌", id: "classmate", lines: ["你那封信，还没寄出吧。", "你可以写一句当年没说出口的话。", "也可以用五字改命。"], options: ["开一局", "连玩Run", "返回"] };
        return { char: "导演", id: "director", lines: ["上马。", "把PPT踩成山海。", "你只需要说一句发疯指令。"], options: ["开一局", "连玩Run", "返回"] };
      }

      function drawDrawerOpenOverlay(d, pad, top, w, h) {
        const t = now();
        const x = pad + 14;
        const innerW = w - 28;
        const innerH = h - 28;
        const ox = x;
        const oy = top + 14;

        rrPath(ox, oy, innerW, innerH, 18);
        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.fill();

        const boxW = Math.min(innerW, 640);
        const boxX = ox + (innerW - boxW) / 2;
        const boxH = Math.min(innerH, 520);
        const boxY = oy + (innerH - boxH) / 2;

        const it = { moduleId: d.moduleId, title: d.moduleId === "A" ? "猫的地下酒吧" : d.moduleId === "B" ? "未寄出的信" : "工位逃亡录", tag: "" };
        drawDrawerCard({ x: boxX, y: boxY, w: boxW, h: boxH }, 0.30, 0, it, true);

        if (!d.talk) {
          const tt = drawerTalkFor(d.moduleId);
          d.talk = { id: d.moduleId, idx: 0, shown: 0, done: false, char: tt.char, charId: tt.id, lines: tt.lines, options: tt.options, lastAt: t };
          saveState();
        }
        const talk = d.talk;
        const dt = clamp((t - (talk.lastAt || t)) / 1000, 0, 0.05);
        talk.lastAt = t;
        const speed = clamp(state.settings.vnTextSpeed || 40, 10, 120);
        if (!talk.done) {
          const prev = Math.floor(talk.shown);
          talk.shown = clamp(talk.shown + dt * speed, 0, talk.lines[talk.idx].length);
          const next = Math.floor(talk.shown);
          if (state.settings.vnTypeSfx && next > prev && next % 2 === 0) audioSfx("type");
          talk.done = talk.shown >= talk.lines[talk.idx].length - 0.001;
        }

        const portraitW = boxW * 0.60;
        const portraitH = boxH * 0.58;
        const px = boxX + 18;
        const py = boxY + 22;
        const vn = { charId: talk.charId, charEmotion: "calm", charInT: 1, done: talk.done, shown: talk.shown, lineText: talk.lines[talk.idx] };
        drawVNPortrait2_5D(vn, px, py, portraitW, portraitH);

        const dialogY = boxY + boxH - 220;
        rrPath(boxX + 18, dialogY, boxW - 36, 188, 22);
        ctx.fillStyle = "rgba(0,0,0,0.45)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.60)";
        ctx.stroke();
        ctx.save();
        ctx.globalAlpha = 0.38;
        ctx.shadowColor = "rgba(255,255,255,0.22)";
        ctx.shadowBlur = 18;
        ctx.strokeStyle = "rgba(255,255,255,0.18)";
        rrPath(boxX + 18, dialogY, boxW - 36, 188, 22);
        ctx.stroke();
        ctx.restore();
        ctx.font = `800 18px ${fontSans}`;
        ctx.fillStyle = "rgba(255,255,255,0.92)";
        ctx.strokeStyle = "rgba(0,0,0,0.55)";
        ctx.lineWidth = 4;
        ctx.strokeText(talk.char, boxX + 36, dialogY + 40);
        ctx.fillText(talk.char, boxX + 36, dialogY + 40);
        ctx.font = `${Math.round(28 * uiScale)}px ${fontSans}`;
        const show = talk.lines[talk.idx].slice(0, Math.floor(talk.shown));
        wrapTextStroke(show, boxX + 36, dialogY + 88, boxW - 72, Math.round(46 * uiScale), "#f3f3f3", "#2a2a2a");
        ctx.lineWidth = 1;

        hot("drawerNextLine", boxX + 18, dialogY, boxW - 36, 188, () => {
          if (!talk.done) {
            talk.shown = talk.lines[talk.idx].length;
            talk.done = true;
            return;
          }
          if (talk.idx < talk.lines.length - 1) {
            talk.idx += 1;
            talk.shown = 0;
            talk.done = false;
            return;
          }
        });

        const doneAll = talk.idx >= talk.lines.length - 1 && talk.done;
        if (doneAll) {
          const bw = (boxW - 36 - 28) / 3;
          const by = boxY + boxH + 12;
          btn("drawerPlayFast", boxX + 18, by, bw, 56, "开一局", "primary", () => {
            d.stage = "closing";
            d.t0 = now();
            d.dur = 520;
            saveState();
            startRun("fast", d.moduleId);
          });
          btn("drawerPlayRun", boxX + 18 + bw + 14, by, bw, 56, "连玩Run", "ghost", () => {
            d.stage = "closing";
            d.t0 = now();
            d.dur = 520;
            saveState();
            startRun("run", d.moduleId);
          });
          btn("drawerClose", boxX + 18 + (bw + 14) * 2, by, bw, 56, "返回", "ghost", () => {
            d.stage = "closing";
            d.t0 = now();
            d.dur = 520;
            saveState();
          });
        } else {
          btn("drawerSkip", boxX + 18, boxY + boxH + 12, boxW - 36, 56, "跳到选择", "ghost", () => {
            talk.idx = talk.lines.length - 1;
            talk.shown = talk.lines[talk.idx].length;
            talk.done = true;
          });
        }
      }

      function vnFindChapter(id) {
        for (let i = 0; i < VN_CHAPTERS.length; i++) if (VN_CHAPTERS[i].chapterId === id) return VN_CHAPTERS[i];
        return null;
      }

      function vnBuildLabels(cmds) {
        const map = {};
        for (let i = 0; i < cmds.length; i++) {
          const c = cmds[i];
          if (c && c.op === "label" && c.name) map[c.name] = i;
        }
        return map;
      }

      function startVNChapter(chapterId) {
        const ch = vnFindChapter(chapterId);
        if (!ch) {
          toast("章节不存在");
          return;
        }
        const cmds = Array.isArray(ch.cmds) ? ch.cmds : [];
        state.flow.vn = {
          chapterId: ch.chapterId,
          title: ch.title || ch.chapterId,
          cmds,
          labels: vnBuildLabels(cmds),
          vars: {},
          ip: 0,
          bgKey: "",
          bgFrom: "",
          bgFadeT: 1,
          charId: "mirror",
          charEmotion: "calm",
          charInT: 0,
          lineChar: "",
          lineEmotion: "calm",
          lineText: "",
          shown: 0,
          done: true,
          options: null,
          pickLock: false,
          history: [],
          hideBox: !!state.settings.vnHideBox,
          speed: clamp(state.settings.vnTextSpeed || 40, 10, 120),
          auto: !!state.settings.vnAuto,
          fast: false,
          lastAt: now(),
          nextAutoAt: 0,
          fxSeed: hash32(String(now()) + "|vn|" + chapterId),
          fx: [],
          histScroll: 0,
        };
        state.flow.scene = "vnPlayer";
        saveState();
        vnPrimeFx(state.flow.vn);
        vnRunUntilText(state.flow.vn);
      }

      function vnPrimeFx(vn) {
        vn.fx = vn.fx || [];
        vn.fx.length = 0;
        const n = 42;
        for (let i = 0; i < n; i++) {
          const r = mulberry32((vn.fxSeed + i * 97) >>> 0);
          vn.fx.push({
            x: r(),
            y: r(),
            z: r(),
            s: 0.35 + r() * 0.85,
            v: 0.06 + r() * 0.20,
            a: 0.12 + r() * 0.22,
            t: r() * Math.PI * 2,
            kind: r() < 0.6 ? "bokeh" : "petal",
          });
        }
      }

      function vnRunUntilText(vn) {
        for (let guard = 0; guard < 2000; guard++) {
          const c = vn.cmds[vn.ip];
          if (!c) {
            vn.done = true;
            vn.lineChar = "";
            vn.lineText = "";
            vn.options = null;
            vn.pickLock = false;
            break;
          }
          if (c.op === "label") {
            vn.ip += 1;
            continue;
          }
          if (c.op === "bg") {
            vn.bgFrom = vn.bgKey || c.key || "";
            vn.bgKey = c.key || "";
            vn.bgFadeT = 0;
            vn.ip += 1;
            continue;
          }
          if (c.op === "set") {
            vn.vars = vn.vars || {};
            vn.vars[c.key] = c.value;
            vn.ip += 1;
            continue;

          ctx.quadraticCurveTo(-10, 2, -8, -6);

          ctx.strokeRect(-10, -12, 20, 24);
          ctx.beginPath();
          ctx.moveTo(-8, -4);
          ctx.lineTo(8, -4);
          ctx.moveTo(-8, 2);
          ctx.lineTo(8, 2);
          ctx.moveTo(-8, 8);
          ctx.lineTo(5, 8);
          ctx.stroke();
        } else if (id === "ach_ch5") {

          ctx.moveTo(-12, 8);
          ctx.lineTo(-2, -10);
          ctx.lineTo(10, 8);

        } else if (id === "ach_mirror") {

          ctx.lineTo(10, 2);
          ctx.moveTo(-6, 8);

            ctx.stroke();
          }
        } else if (id === "ach_speed") {
          ctx.beginPath();
          ctx.arc(0, 0, 12, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(0, -8);
          ctx.moveTo(0, 0);
          ctx.lineTo(7, 3);

          ctx.lineTo(12, -6);

          ctx.moveTo(0, -10);
