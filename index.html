        for (let i = 0; i < list.length; i++) {
          const a = list[i];
          const on = !!unlocked[a.id];
          rrPath(x, y, innerW, 66, 16);
          ctx.fillStyle = on ? "rgba(255,255,255,0.06)" : "rgba(0,0,0,0.18)";
          ctx.fill();
          const tier = a.tier || "bronze";
          const tierC = tier === "platinum" ? "rgba(255,214,170,0.55)" : tier === "gold" ? "rgba(250,204,21,0.50)" : tier === "silver" ? "rgba(200,240,255,0.40)" : "rgba(255,255,255,0.18)";
          ctx.strokeStyle = on ? tierC : "rgba(255,255,255,0.10)";
          ctx.stroke();
          drawAchIcon(a.id, x + 16, y + 12, 42, on);
          ctx.fillStyle = on ? "rgba(255,255,255,0.92)" : "rgba(255,255,255,0.62)";
          ctx.font = `800 13px ${fontSans}`;
          ctx.fillText(on ? a.name : "???", x + 70, y + 28);
          ctx.fillStyle = "rgba(255,255,255,0.52)";
          ctx.font = `12px ${fontSans}`;
          const tzh = tier === "platinum" ? "铂" : tier === "gold" ? "金" : tier === "silver" ? "银" : "铜";
          ctx.fillText(tzh, x + innerW - 24, y + 28);
          ctx.fillStyle = "rgba(255,255,255,0.56)";
          ctx.font = `12px ${fontSans}`;
          ctx.fillText(on ? a.desc : "未解锁", x + 70, y + 48);
          y += 76;
        }
        ctx.restore();

        btn("achBack", x, top + h - 74, innerW, 56, "返回", "primary", () => {
          state.flow.scene = "hub";
          saveState();
        });
      }

      function drawAchIcon(id, x, y, s, on) {
        rrPath(x, y, s, s, 12);
        ctx.fillStyle = on ? "rgba(34,211,238,0.10)" : "rgba(255,255,255,0.05)";
        ctx.fill();
        ctx.strokeStyle = on ? "rgba(34,211,238,0.55)" : "rgba(255,255,255,0.10)";
        ctx.stroke();
        ctx.save();
        ctx.translate(x + s / 2, y + s / 2);
        ctx.lineWidth = 2;
        const c = on ? "rgba(255,255,255,0.85)" : "rgba(255,255,255,0.35)";
        ctx.strokeStyle = c;
        ctx.fillStyle = c;
        if (id === "ach_ch3") {
          ctx.beginPath();
          ctx.arc(0, 2, 10, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-8, -6);
          ctx.quadraticCurveTo(-2, -14, 4, -6);
          ctx.quadraticCurveTo(10, 2, 0, 12);
          ctx.quadraticCurveTo(-10, 2, -8, -6);
          ctx.stroke();
        } else if (id === "ach_ch4") {
          ctx.strokeRect(-10, -12, 20, 24);
          ctx.beginPath();
          ctx.moveTo(-8, -4);
          ctx.lineTo(8, -4);
          ctx.moveTo(-8, 2);
          ctx.lineTo(8, 2);
          ctx.moveTo(-8, 8);
          ctx.lineTo(5, 8);
          ctx.stroke();
        } else if (id === "ach_ch5") {
          ctx.beginPath();
          ctx.moveTo(-12, 8);
          ctx.lineTo(-2, -10);
          ctx.lineTo(10, 8);
          ctx.closePath();
          ctx.stroke();
        } else if (id === "ach_mirror") {
          ctx.beginPath();
          ctx.arc(0, 0, 12, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-10, -2);
          ctx.lineTo(10, 2);
          ctx.moveTo(-6, 8);
          ctx.lineTo(6, -8);
          ctx.stroke();
        } else if (id === "ach_combo") {
          for (let i = 0; i < 3; i++) {
            rrPath(-14 + i * 10, -8, 12, 16, 4);
            ctx.stroke();
          }
        } else if (id === "ach_speed") {
          ctx.beginPath();
          ctx.arc(0, 0, 12, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(0, -8);
          ctx.moveTo(0, 0);
          ctx.lineTo(7, 3);
          ctx.stroke();
        } else if (id === "ach_collect") {
          for (let r = 0; r < 3; r++) {
            for (let c2 = 0; c2 < 3; c2++) {
              rrPath(-14 + c2 * 10, -14 + r * 10, 8, 8, 2);
              ctx.stroke();
            }
          }
        } else if (id === "ach_vote") {
          ctx.beginPath();
          ctx.moveTo(-12, -6);
          ctx.lineTo(12, -6);
          ctx.lineTo(8, 10);
          ctx.lineTo(-8, 10);
          ctx.closePath();
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-4, -2);
          ctx.lineTo(4, 6);
          ctx.stroke();
        } else if (id === "ach_ugc") {
          ctx.beginPath();
          ctx.arc(0, 0, 10, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-10, 0);
          ctx.lineTo(10, 0);
          ctx.moveTo(0, -10);
          ctx.lineTo(0, 10);
          ctx.stroke();
        } else if (id === "ach_king") {
          ctx.beginPath();
          ctx.moveTo(-12, 8);
          ctx.lineTo(-6, -8);
          ctx.lineTo(0, 0);
          ctx.lineTo(6, -8);
          ctx.lineTo(12, 8);
          ctx.closePath();
          ctx.stroke();
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, 10, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawVNPortrait2_5D(vn, x, y, w, h) {
        const t = now() / 1000;
        const ease = 1 - Math.pow(1 - vn.charInT, 3);
        const breath = 1 + Math.sin(t * 2.1) * 0.012;
        const s = (0.95 + ease * 0.05) * breath;
        const cx = x + w * 0.42;
        const cy = y + h * 0.58;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.scale(s, s);
        const sway = Math.sin(t * 1.3) * 6;
        ctx.translate(sway, 0);
        const gx = -w * 0.42;
        const gy = -h * 0.58;
        rrPath(gx, gy, w, h, 26);
        ctx.fillStyle = "rgba(0,0,0,0.18)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.10)";
        ctx.stroke();
        const id = vn.charId || "mirror";
        if (id === "cat") drawVNCharCat(gx, gy, w, h, vn);
        else if (id === "classmate") drawVNCharClassmate(gx, gy, w, h, vn);
        else if (id === "director") drawVNCharDirector(gx, gy, w, h, vn);
        else drawVNCharMirror(gx, gy, w, h, vn);
        ctx.restore();
      }

      function vnBlink01(seed) {
        const t = now() / 1000;
        const p = (t + seed) % 4.6;
        if (p < 0.10) return 1 - p / 0.10;
        if (p < 0.18) return (p - 0.10) / 0.08;
        return 0;
      }

      function vnMouth01(vn) {
        if (!vn || vn.done) return 0;
        const t = now() / 1000;
        return 0.2 + (Math.sin(t * 18) * 0.5 + 0.5) * 0.8;
      }

      function drawVNCharCat(x, y, w, h, vn) {
        const blink = vnBlink01(0.3);
        const mouth = vnMouth01(vn);
        const cx = x + w * 0.50;
        const cy = y + h * 0.52;
        ctx.fillStyle = "rgba(255,255,255,0.80)";
        ctx.beginPath();
        ctx.arc(cx, cy, 84, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(cx - 64, cy - 60);
        ctx.lineTo(cx - 120, cy - 128);
        ctx.lineTo(cx - 34, cy - 98);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(cx + 64, cy - 60);
        ctx.lineTo(cx + 120, cy - 128);
        ctx.lineTo(cx + 34, cy - 98);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "rgba(0,0,0,0.55)";
        const ey = cy - 16;
        const eh = 10 * (1 - blink);
        rrPath(cx - 44, ey, 18, Math.max(2, eh), 6);
        ctx.fill();
        rrPath(cx + 26, ey, 18, Math.max(2, eh), 6);
        ctx.fill();
        ctx.fillStyle = "rgba(0,0,0,0.40)";
        rrPath(cx - 10, cy + 18, 20, 8 + mouth * 10, 6);
        ctx.fill();
      }

      function drawVNCharClassmate(x, y, w, h, vn) {
        const blink = vnBlink01(1.1);
        const mouth = vnMouth01(vn);
        const cx = x + w * 0.52;
        const cy = y + h * 0.54;
        const g = ctx.createRadialGradient(cx, cy - 40, 0, cx, cy, 180);
        g.addColorStop(0, "rgba(250,204,21,0.22)");
        g.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(cx, cy, 180, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,0.78)";
        ctx.beginPath();
        ctx.arc(cx, cy, 82, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "rgba(0,0,0,0.55)";
        const ey = cy - 18;
        const eh = 9 * (1 - blink);
        rrPath(cx - 44, ey, 18, Math.max(2, eh), 6);
        ctx.fill();
        rrPath(cx + 26, ey, 18, Math.max(2, eh), 6);
        ctx.fill();
        ctx.fillStyle = "rgba(0,0,0,0.40)";
        rrPath(cx - 10, cy + 20, 20, 6 + mouth * 8, 6);
        ctx.fill();
      }

      function drawVNCharDirector(x, y, w, h, vn) {
        const mouth = vnMouth01(vn);
        const cx = x + w * 0.52;
        const cy = y + h * 0.54;
        ctx.strokeStyle = "rgba(139,92,246,0.65)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(cx, cy, 92, 0, Math.PI * 2);
        ctx.stroke();
        ctx.strokeStyle = "rgba(255,255,255,0.18)";
        ctx.lineWidth = 2;
        for (let i = 0; i < 9; i++) {
          ctx.beginPath();
          const a = (i / 9) * Math.PI * 2 + (now() / 1000) * 0.25;
          ctx.moveTo(cx, cy);
          ctx.lineTo(cx + Math.cos(a) * (80 + i), cy + Math.sin(a) * (80 + i));
          ctx.stroke();
        }
        ctx.fillStyle = "rgba(255,255,255,0.22)";
        rrPath(cx - 20, cy + 22, 40, 8 + mouth * 10, 6);
        ctx.fill();
        ctx.lineWidth = 1;
      }

      function drawVNCharMirror(x, y, w, h, vn) {
        const t = now() / 1000;
        const cx = x + w * 0.54;
        const cy = y + h * 0.54;
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 200);
        g.addColorStop(0, "rgba(34,211,238,0.18)");
        g.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(cx, cy, 200, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = vn.charEmotion === "glitch" ? "rgba(255,255,255,0.22)" : "rgba(255,255,255,0.14)";
        ctx.lineWidth = 2;
        for (let i = 0; i < 6; i++) {
          ctx.beginPath();
          const r = 58 + i * 12;
          const a0 = t * (0.35 + i * 0.05);
          ctx.arc(cx, cy, r, a0, a0 + Math.PI * 1.6);
          ctx.stroke();
        }
        ctx.lineWidth = 1;
      }

      function startRun(mode, fixedModule) {
        state.flow.mode = mode;
        ensureRun(mode);
        if (fixedModule) {
          openTurn(fixedModule);
          return;
        }
        nextTurnFromHub();
      }

      function drawTurn() {
        const pad = 14;
        const top = insetTop;
        const w = aw - pad * 2;
        const h = ah - top - insetBottom;
        rrPath(pad, top, w, h, 18);
        ctx.fillStyle = "rgba(255,255,255,0.04)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.12)";
        ctx.stroke();

        const run = state.flow.run;
        const cur = run.current;
        const moduleId = cur.moduleId;
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.font = `700 13px ${fontSans}`;
        const modeTag = state.flow.mode === "vn" ? "Gal" : state.flow.mode === "chapter" ? "Chapter" : state.flow.mode === "run" ? "Run" : state.flow.mode === "ugc" ? "UGC" : "Fast";
        ctx.fillText(`${modeTag} · Turn ${run.step}/5 · ${moduleId === "A" ? "猫的地下酒吧" : moduleId === "B" ? "未寄出的信" : "工位逃亡录"}`, pad + 14, top + 24);
        ctx.fillStyle = "rgba(255,255,255,0.62)";
        ctx.font = `12px ${fontSans}`;
        const leftMs = clamp(run.turnLimitMs - (now() - run.turnStartAt), 0, run.turnLimitMs);
        ctx.fillText(`倒计时 ${Math.ceil(leftMs / 1000)}s  逆风充能 ${state.stats.headwindCharge}  里程 ${state.stats.mileage}  燃料 ${state.stats.fuel}`, pad + 14, top + 44);
        if (leftMs <= 0 && cur.phase === "mode") {
          finishTurnMode(cur, false);
        }
        if (leftMs <= 0 && cur.phase === "input") {
          cur.input = cur.input || "";
          cur.turn = buildTurn(moduleId, cur.input, { sugar: cur.sugar, bMode: cur.bMode, leaveText: cur.leaveText });
          run.current.phase = "story";
          cur.vnLines = null;
          cur.vnCursor = 0;
          saveState();
          if (cur.turn.voice) speak(cur.turn.voice);
        }

        if (cur.phase === "mode") {
          drawTurnMode(cur, pad, top, w, h);
        } else if (cur.phase === "input") {
          drawTurnInput(cur, pad, top, w, h);
        } else if (cur.phase === "story") {
          if (state.flow.mode === "vn") drawTurnStoryVN(cur, pad, top, w, h);
          else drawTurnStory(cur, pad, top, w, h);
        } else if (cur.phase === "result") {
          drawTurnResult(cur, pad, top, w, h);
        }
      }

      function initTurnMode(cur) {
        const t = now();
        const part = vn2DayPart();
        state.stats.modeTutorSeen = state.stats.modeTutorSeen || { A: 0, B: 0, C: 0 };
        state.stats.modeLast = state.stats.modeLast || { A: { best: 0, calm: 0, tol: 0.12, ts: 0 }, B: { len: 0, sealed: 0, ts: 0 }, C: { hit: 0, lane: 1, drift: 0, ts: 0 } };
        if (cur.moduleId === "A") {
          cur.mode = "pulse";
          const last = state.stats.modeLast.A || { best: 0, tol: 0.12 };
          const baseTol = last.best <= 2 ? 0.16 : last.best >= 8 ? 0.10 : clamp(last.tol || 0.12, 0.08, 0.20);
          const variants = [
            { id: "metro", name: "地铁呼吸", bpm: part === "morning" ? 78 : 84, tol: baseTol },
            { id: "deadline", name: "DDL倒计时", bpm: part === "night" ? 92 : 88, tol: clamp(baseTol - 0.01, 0.08, 0.20) },
            { id: "quiet", name: "静音模式", bpm: 72, tol: clamp(baseTol + 0.02, 0.10, 0.22) },
          ];
          const v = variants[hash32(String(t) + "|A|" + String(state.mirrorFracture)) % variants.length];
          cur.modeState = {
            t0: t,
            startedAt: 0,
            durMs: 22000,
            bpm: v.bpm,
            variant: v,
            phase: 0,
            tol: v.tol,
            streak: 0,
            best: 0,
            calm: 0,
            breathHoldUntil: 0,
            didTutorial: 0,
          };
          track("mode_start", { module: "A", mode: "pulse", v: v.id });
        } else if (cur.moduleId === "B") {
          cur.mode = "cutup";
          const seed = hash32(String(t) + "|cutup|" + String(state.mirrorFracture) + "|" + part);
          const r = mulberry32(seed);
          const pool0 =
            part === "night"
              ? ["我", "不", "想", "再", "装", "没事", "算了", "其实", "好累", "撤回", "已读", "未读", "别回头", "允许", "失眠", "边界", "电量", "抱歉", "别问", "算了吧"]
              : ["我", "想", "说", "清楚", "不是", "你的", "错", "谢谢", "对不起", "再见", "不打扰", "允许", "边界", "尊重", "今天", "明天", "慢一点", "就这样", "撤回", "被看见"];
          const theme = getWeekTheme(now()).key || "";
          const pool = pool0.concat(theme ? [theme] : []);
          const words = [];
          for (let i = 0; i < 10; i++) words.push(pool[(r() * pool.length) | 0]);
          cur.modeState = { t0: t, startedAt: 0, durMs: 26000, seed, words, picked: [], invert: {}, sealed: 0, didTutorial: 0 };
          track("mode_start", { module: "B", mode: "cutup", part });
        } else {
          cur.mode = "lane";
          const last = state.stats.modeLast.C || { hit: 0 };
          const baseSpeed = last.hit >= 2 ? 0.016 : last.hit === 0 ? 0.020 : 0.018;
          cur.modeState = { t0: t, startedAt: 0, durMs: 24000, lane: 1, pos: 0, speed: baseSpeed, hit: 0, focusSpend: 0, didTutorial: 0, variant: part };
          track("mode_start", { module: "C", mode: "lane", part });
        }
      }

      function finishTurnMode(cur, ok) {
        const ms = cur.modeState || {};
        if (!ms || ms.done) return;
        ms.done = 1;
        const moduleId = cur.moduleId;
        const run = state.flow.run;
        run.res = run.res || { ink: 2, heat: 0, focus: 2 };
        state.stats.modeLast = state.stats.modeLast || { A: { best: 0, calm: 0, tol: 0.12, ts: 0 }, B: { len: 0, sealed: 0, ts: 0 }, C: { hit: 0, lane: 1, drift: 0, ts: 0 } };
        if (moduleId === "A") {
          const s = ms.streak || 0;
          const calm = ms.calm || 0;
          cur.sugar = s >= 6 ? "五分糖" : s >= 3 ? "三分糖" : "无糖";
          cur.input = s >= 6 ? "我还在呼吸" : s >= 3 ? "我可以慢一点" : "我需要停一下";
          cur.leaveText = cur.input;
          state.shards.sugar += calm >= 3 ? 2 : 1;
          run.res.heat = clamp((run.res.heat || 0) + (ok ? 1 : 0), 0, 6);
          state.stats.modeLast.A = { best: Math.max(ms.best || 0, s), calm, tol: ms.tol || 0.12, ts: now() };
          track(ok ? "mode_end" : "mode_fail", { module: "A", streak: s, calm, durMs: now() - ms.t0 });
        } else if (moduleId === "B") {
          const picked = (ms.picked || []).slice(0, 5);
          const parts = [];
          for (let i = 0; i < picked.length; i++) {
            const w = picked[i];
            const inv = ms.invert && ms.invert[i] ? "不" : "";
            parts.push(inv + w);
          }
          const line = parts.join("").slice(0, 10) || "我没说出口";
          cur.bMode = "edit5";
          cur.input = line;
          state.shards.hongdou += ok ? 2 : 1;
          run.res.ink = clamp((run.res.ink || 0) + (ok ? 1 : 0), 0, 6);
          state.stats.modeLast.B = { len: line.length, sealed: ms.sealed ? 1 : 0, ts: now() };
          track(ok ? "mode_end" : "mode_fail", { module: "B", len: line.length, durMs: now() - ms.t0 });
        } else {
          const lane = ms.lane || 1;
          const hit = ms.hit || 0;
          const s = hit === 0 ? "我决定不回头" : hit <= 1 ? "我还在路上" : "我需要帮助";
          cur.input = s;
          state.shards.hoofprint += hit === 0 && ok ? 2 : 1;
          run.res.focus = clamp((run.res.focus || 0) + (hit === 0 ? 1 : 0), 0, 6);
          state.stats.modeLast.C = { hit, lane, drift: ms.focusSpend || 0, ts: now() };
          track(ok ? "mode_end" : "mode_fail", { module: "C", lane, hit, durMs: now() - ms.t0 });
        }

        cur.turn = buildTurn(moduleId, cur.input, { sugar: cur.sugar, bMode: cur.bMode, leaveText: cur.leaveText });
        cur.phase = "story";
        cur.vnLines = null;
        cur.vnCursor = 0;
        saveState();
        if (cur.turn && cur.turn.voice) speak(cur.turn.voice);
      }

      function drawTurnMode(cur, pad, top, w, h) {
        if (!cur.modeState) initTurnMode(cur);
        const ms = cur.modeState;
        const x = pad + 14;
        const y = top + 60;
        const innerW = w - 28;
        const innerH = h - 140;
        rrPath(x, y, innerW, innerH, 16);
        ctx.fillStyle = "rgba(0,0,0,0.12)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.10)";
        ctx.stroke();

        if (cur.moduleId === "A") drawModePulse(cur, x, y, innerW, innerH);
        else if (cur.moduleId === "B") drawModeCutup(cur, x, y, innerW, innerH);
        else drawModeLane(cur, x, y, innerW, innerH);

        btn("modeSkip", x, top + h - 74, innerW, 56, "跳过玩法（直接进入剧情）", "ghost", () => finishTurnMode(cur, false));
      }

      function drawModePulse(cur, x, y, w, h) {
        const ms = cur.modeState;
        const t = now();
        if (!ms.startedAt) {
          const cardW = Math.min(w - 28, 520);
          const cardH = 240;
          const cx = x + (w - cardW) / 2;
          const cy = y + (h - cardH) / 2;
          rrPath(x, y, w, h, 16);
          ctx.fillStyle = "rgba(0,0,0,0.40)";
          ctx.fill();
          rrPath(cx, cy, cardW, cardH, 18);
          ctx.fillStyle = "rgba(0,0,0,0.52)";
          ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,0.14)";
          ctx.stroke();
          ctx.fillStyle = "rgba(255,255,255,0.92)";
          ctx.font = `900 ${Math.round(16 * uiScale)}px ${fontSans}`;
          ctx.fillText(`A｜呼吸校准 · ${ms.variant && ms.variant.name ? ms.variant.name : ""}`, cx + 14, cy + 32);
          ctx.fillStyle = "rgba(255,255,255,0.72)";
          ctx.font = `${Math.round(12 * uiScale)}px ${fontSans}`;
          wrapText("点击跟上脉冲获得连击。\n左右滑动调整容错（更易/更难）。\n长按屏息1秒，给自己一点空隙。", cx + 14, cy + 62, cardW - 28, Math.round(18 * uiScale), "rgba(255,255,255,0.72)");
          btn("pulseStart", cx + 14, cy + cardH - 70, cardW - 28, 56, "开始", "primary", () => {
            ms.startedAt = now();
            ms.t0 = ms.startedAt;
            state.stats.modeTutorSeen.A = 1;
            saveState();
          });
          return;
        }
        const pAll = clamp((t - ms.startedAt) / ms.durMs, 0, 1);
        if (pAll >= 1) {
          finishTurnMode(cur, true);
          return;
        }
        rrPath(x, y, w, h, 16);
        ctx.save();
        ctx.clip();
        const bgKey = "corridor";
        drawDrawerBg({ bgKey, bgFrom: bgKey, bgT0: t }, x - 14, y - 60, w + 28, h + 140);
        drawHorrorFX(0.18 + state.mirrorFracture * 0.02, "pulse|" + String(ms.startedAt));
        ctx.restore();

        const cx = x + w * 0.5;
        const cy = y + h * 0.52;
        const r = Math.min(w, h) * 0.22;
        const beat = 60 / clamp(ms.bpm || 84, 56, 120);
        const tt = ms.breathHoldUntil && t < ms.breathHoldUntil ? ms.holdPhaseAt || ms.phaseAt || 0 : (t - ms.startedAt) / 1000;
        const ph = (tt / beat) % 1;
        ms.phaseAt = ph;
        const ring = 0.55 + 0.45 * Math.sin(ph * Math.PI * 2);
        const glow = 0.10 + 0.22 * Math.max(0, ring);

        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, r * (0.92 + 0.06 * ring), 0, Math.PI * 2);
        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.fill();
        ctx.strokeStyle = `rgba(255,255,255,${0.14 + glow})`;
        ctx.lineWidth = Math.max(2, Math.round(4 * uiScale));
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(cx, cy, r * (1.18 + 0.10 * ring), 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(250,204,21,${0.08 + glow * 0.8})`;
        ctx.lineWidth = Math.max(2, Math.round(3 * uiScale));
        ctx.stroke();
        ctx.restore();

        ctx.fillStyle = "rgba(255,255,255,0.90)";
        ctx.font = `900 ${Math.round(16 * uiScale)}px ${fontSans}`;
        ctx.fillText("呼吸校准", x + 14, y + 28);
        ctx.fillStyle = "rgba(255,255,255,0.70)";
        ctx.font = `${Math.round(12 * uiScale)}px ${fontSans}`;
        ctx.fillText("点击跟上脉冲；左右滑动调整“容错”；长按屏息1秒", x + 14, y + 52);
        ctx.fillStyle = "rgba(255,255,255,0.62)";
        ctx.fillText(`连击 ${ms.streak || 0}  最佳 ${ms.best || 0}  容错 ${(ms.tol * 100) | 0}%`, x + 14, y + 76);

        const left = Math.max(0, ms.durMs - (t - ms.t0));
        ctx.fillStyle = "rgba(255,255,255,0.62)";
        ctx.fillText(`剩余 ${(left / 1000).toFixed(0)}s`, x + w - 92, y + 28);

        hot2(
          "modeA_area",
          x,
          y,
          w,
          h,
          "whisper",
          "light",
          () => {
            const dx = ui.mx - ui.downX;
            if (ui.moved && Math.abs(dx) > 60) {
              ms.tol = clamp(ms.tol + (dx > 0 ? 0.02 : -0.02), 0.06, 0.22);
              track("mode_action", { module: "A", a: "tol", tol: ms.tol });
              saveState();
              return;
            }
            const dist = Math.min(ph, 1 - ph);
            const ok = dist <= ms.tol;
            if (ok) {
              ms.streak = (ms.streak || 0) + 1;
              ms.best = Math.max(ms.best || 0, ms.streak);
              ms.calm = (ms.calm || 0) + 1;
              addRipple(ui.mx, ui.my, "rgba(250,204,21,0.18)");
              track("mode_action", { module: "A", a: "tap_ok", streak: ms.streak });
            } else {
              ms.streak = 0;
              addRipple(ui.mx, ui.my, "rgba(255,77,109,0.16)");
              track("mode_action", { module: "A", a: "tap_miss" });
            }
            saveState();
          },
          () => {
            ms.breathHoldUntil = now() + 1100;
            ms.holdPhaseAt = ms.phaseAt || 0;
            ms.calm = (ms.calm || 0) + 1;
            track("mode_action", { module: "A", a: "hold" });
            saveState();
          }
        );
      }

      function drawModeCutup(cur, x, y, w, h) {
        const ms = cur.modeState;
        const t = now();
        if (!ms.startedAt) {
          const cardW = Math.min(w - 28, 520);
          const cardH = 240;
          const cx = x + (w - cardW) / 2;
          const cy = y + (h - cardH) / 2;
          rrPath(x, y, w, h, 16);
          ctx.fillStyle = "rgba(0,0,0,0.40)";
          ctx.fill();
          rrPath(cx, cy, cardW, cardH, 18);
          ctx.fillStyle = "rgba(0,0,0,0.52)";
          ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,0.14)";
          ctx.stroke();
          ctx.fillStyle = "rgba(255,255,255,0.92)";
          ctx.font = `900 ${Math.round(16 * uiScale)}px ${fontSans}`;
          ctx.fillText("B｜剪贴室", cx + 14, cy + 32);
          ctx.fillStyle = "rgba(255,255,255,0.72)";
          ctx.font = `${Math.round(12 * uiScale)}px ${fontSans}`;
          wrapText("点词片拼一句（3~5词）。\n点槽位可移除词。\n长按槽位可在词前加“不”。\n封蜡提交后进入剧情。", cx + 14, cy + 62, cardW - 28, Math.round(18 * uiScale), "rgba(255,255,255,0.72)");
          btn("cutupStart", cx + 14, cy + cardH - 70, cardW - 28, 56, "开始", "primary", () => {
            ms.startedAt = now();
            ms.t0 = ms.startedAt;
            state.stats.modeTutorSeen.B = 1;
            saveState();
          });
          return;
        }
        const pAll = clamp((t - ms.startedAt) / ms.durMs, 0, 1);
        if (pAll >= 1) {
          finishTurnMode(cur, (ms.picked || []).length >= 3);
          return;
        }

        rrPath(x, y, w, h, 16);
        ctx.save();
        ctx.clip();
        const bgKey = "letter";
        drawDrawerBg({ bgKey, bgFrom: bgKey, bgT0: t }, x - 14, y - 60, w + 28, h + 140);
        drawHorrorFX(0.10 + state.mirrorFracture * 0.02, "cutup|" + String(ms.startedAt || ms.seed || 0));
        ctx.restore();

        ctx.fillStyle = "rgba(255,255,255,0.90)";
        ctx.font = `900 ${Math.round(16 * uiScale)}px ${fontSans}`;
        ctx.fillText("剪贴室", x + 14, y + 28);
        ctx.fillStyle = "rgba(255,255,255,0.70)";
        ctx.font = `${Math.round(12 * uiScale)}px ${fontSans}`;
        ctx.fillText("点词片拼一句；长按槽位加“不”；封蜡后进入剧情", x + 14, y + 52);

        const lineY = y + 74;
        rrPath(x + 14, lineY, w - 28, 64, 16);
        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.12)";
        ctx.stroke();

        const slots = 5;
        const gap = 10;
        const sw = (w - 28 - (slots + 1) * gap) / slots;
        for (let i = 0; i < slots; i++) {
          const sx = x + 14 + gap + i * (sw + gap);
          const sy = lineY + 14;
          rrPath(sx, sy, sw, 36, 12);
          ctx.fillStyle = "rgba(255,255,255,0.06)";
          ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,0.10)";
          ctx.stroke();
          const w0 = (ms.picked || [])[i];
          const inv = ms.invert && ms.invert[i] ? "不" : "";
          if (w0) {
            ctx.fillStyle = "rgba(255,255,255,0.88)";
            ctx.font = `800 ${Math.round(14 * uiScale)}px ${fontSans}`;
            const txt = inv + w0;
            const tw = ctx.measureText(txt).width;
            ctx.fillText(txt, sx + (sw - tw) / 2, sy + 24);
          }
          hot2(
            `cutSlot_${i}`,
            sx,
            sy,
            sw,
            36,
            "whisper",
            "light",
            () => {
              if ((ms.picked || []).length > i) {
                ms.picked.splice(i, 1);
                delete ms.invert[i];
                track("mode_action", { module: "B", a: "remove", idx: i });
                saveState();
              }
            },
            () => {
              ms.invert = ms.invert || {};
              ms.invert[i] = ms.invert[i] ? 0 : 1;
              track("mode_action", { module: "B", a: "invert", idx: i, v: ms.invert[i] ? 1 : 0 });
              saveState();
            }
          );
        }

        const listY = lineY + 84;
        const cols = 2;
        const bw = (w - 28 - 14) / cols;
        const bh = 46;
        for (let i = 0; i < (ms.words || []).length; i++) {
          const wx = x + 14 + (i % cols) * (bw + 14);
          const wy = listY + Math.floor(i / cols) * (bh + 10);
          rrPath(wx, wy, bw, bh, 14);
          ctx.fillStyle = "rgba(255,255,255,0.06)";
          ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,0.10)";
          ctx.stroke();
          ctx.fillStyle = "rgba(255,255,255,0.88)";
          ctx.font = `800 ${Math.round(14 * uiScale)}px ${fontSans}`;
          const txt = ms.words[i];
          const tw = ctx.measureText(txt).width;
          ctx.fillText(txt, wx + (bw - tw) / 2, wy + 30);
          hot2(
            `cutWord_${i}`,
            wx,
            wy,
            bw,
            bh,
            "ui",
            "light",
            () => {
              ms.picked = ms.picked || [];
              if (ms.picked.length >= 5) return;
              ms.picked.push(ms.words[i]);
              track("mode_action", { module: "B", a: "pick", w: ms.words[i], n: ms.picked.length });
              saveState();
            },
            null
          );
        }

        btn("cutUndo", x + 14, y + h - 62, (w - 28 - 14) / 2, 48, "撤回", "ghost", () => {
          ms.picked = ms.picked || [];
          if (ms.picked.length) ms.picked.pop();
          track("mode_action", { module: "B", a: "undo" });
          saveState();
        });
        btn("cutSeal", x + 28 + (w - 28 - 14) / 2, y + h - 62, (w - 28 - 14) / 2, 48, "封蜡", "primary", () => {
          if ((ms.picked || []).length < 3) return toast("至少拼 3 个词");
          ms.sealed = 1;
          track("mode_action", { module: "B", a: "seal" });
          finishTurnMode(cur, true);
        });
      }

      function drawModeLane(cur, x, y, w, h) {
        const ms = cur.modeState;
        const t = now();
        if (!ms.startedAt) {
          const cardW = Math.min(w - 28, 520);
          const cardH = 240;
          const cx = x + (w - cardW) / 2;
          const cy = y + (h - cardH) / 2;
          rrPath(x, y, w, h, 16);
          ctx.fillStyle = "rgba(0,0,0,0.40)";
          ctx.fill();
          rrPath(cx, cy, cardW, cardH, 18);
          ctx.fillStyle = "rgba(0,0,0,0.52)";
          ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,0.14)";
          ctx.stroke();
          ctx.fillStyle = "rgba(255,255,255,0.92)";
          ctx.font = `900 ${Math.round(16 * uiScale)}px ${fontSans}`;
          ctx.fillText("C｜逆风走廊", cx + 14, cy + 32);
          ctx.fillStyle = "rgba(255,255,255,0.72)";
          ctx.font = `${Math.round(12 * uiScale)}px ${fontSans}`;
          wrapText("左右滑动换道躲障碍。\n漂移：消耗专注获得短暂无敌。\n长按刹车：降低速度，但奖励更少倾向。", cx + 14, cy + 62, cardW - 28, Math.round(18 * uiScale), "rgba(255,255,255,0.72)");
          btn("laneStart", cx + 14, cy + cardH - 70, cardW - 28, 56, "开始", "primary", () => {
            ms.startedAt = now();
            ms.t0 = ms.startedAt;
            ms.lastAt = ms.startedAt;
            ms.pos = 0;
            ms.obs = null;
            state.stats.modeTutorSeen.C = 1;
            saveState();
          });
          return;
        }
        if (!ms.lastAt) ms.lastAt = t;
        const dt = clamp((t - ms.lastAt) / 1000, 0, 0.05);
        ms.lastAt = t;
        const pAll = clamp((t - ms.startedAt) / ms.durMs, 0, 1);
        if (pAll >= 1) {
          finishTurnMode(cur, (ms.hit || 0) <= 1);
          return;
        }

        rrPath(x, y, w, h, 16);
        ctx.save();
        ctx.clip();
        const bgKey = "corridor";
        drawDrawerBg({ bgKey, bgFrom: bgKey, bgT0: t }, x - 14, y - 60, w + 28, h + 140);
        drawHorrorFX(0.16 + state.mirrorFracture * 0.02, "lane|" + String(ms.startedAt));
        ctx.restore();

        ms.pos = (ms.pos || 0) + dt * (ms.speed || 0.018);
        if (!ms.obs) {
          const seed = hash32(String(ms.startedAt) + "|lane|" + String(state.mirrorFracture));
          const r = mulberry32(seed);
          ms.obs = [];
          for (let i = 0; i < 7; i++) ms.obs.push({ at: 0.12 + i * 0.12 + r() * 0.04, lane: (r() * 3) | 0, hit: 0 });
        }

        ctx.fillStyle = "rgba(255,255,255,0.90)";
        ctx.font = `900 ${Math.round(16 * uiScale)}px ${fontSans}`;
        ctx.fillText("逆风走廊", x + 14, y + 28);
        ctx.fillStyle = "rgba(255,255,255,0.70)";
        ctx.font = `${Math.round(12 * uiScale)}px ${fontSans}`;
        ctx.fillText("左右滑动换道；点“漂移”消耗专注免伤一次；长按刹车", x + 14, y + 52);

        const trackX = x + 14;
        const trackY = y + 74;
        const trackW = w - 28;
        const trackH = h - 150;
        rrPath(trackX, trackY, trackW, trackH, 18);
        ctx.fillStyle = "rgba(0,0,0,0.18)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.10)";
        ctx.stroke();

        const lanes = 3;
        for (let i = 1; i < lanes; i++) {
          const lx = trackX + (trackW * i) / lanes;
          ctx.strokeStyle = "rgba(255,255,255,0.10)";
          ctx.beginPath();
          ctx.moveTo(lx, trackY + 10);
          ctx.lineTo(lx, trackY + trackH - 10);
          ctx.stroke();
        }

        const inv = ms.invUntil && t < ms.invUntil;
        for (let i = 0; i < ms.obs.length; i++) {
          const o = ms.obs[i];
          const dy = (o.at - ms.pos) * trackH * 2.6;
          const oy = trackY + trackH - 30 - dy;
          if (oy < trackY - 40) continue;
          const lane = o.lane;
          const ox = trackX + (lane + 0.5) * (trackW / lanes);
          rrPath(ox - 18, oy - 12, 36, 24, 10);
          ctx.fillStyle = o.hit ? "rgba(255,255,255,0.08)" : "rgba(255,77,109,0.24)";
          ctx.fill();
          ctx.strokeStyle = o.hit ? "rgba(255,255,255,0.10)" : "rgba(255,77,109,0.28)";
          ctx.stroke();
        }

        const px = trackX + (ms.lane + 0.5) * (trackW / lanes);
        const py = trackY + trackH - 56;
        ctx.beginPath();
        ctx.arc(px, py, 16, 0, Math.PI * 2);
        ctx.fillStyle = inv ? "rgba(34,211,238,0.32)" : "rgba(250,204,21,0.20)";
        ctx.fill();
        ctx.strokeStyle = inv ? "rgba(34,211,238,0.55)" : "rgba(250,204,21,0.48)";
        ctx.lineWidth = Math.max(2, Math.round(3 * uiScale));
        ctx.stroke();

        for (let i = 0; i < ms.obs.length; i++) {
          const o = ms.obs[i];
          if (o.hit) continue;
          if (Math.abs(o.at - ms.pos) < 0.02 && o.lane === ms.lane) {
            if (!inv) {
              o.hit = 1;
              ms.hit = (ms.hit || 0) + 1;
              ms.invUntil = t + 400;
              track("mode_action", { module: "C", a: "hit", n: ms.hit });
              audioSfx("important");
              haptic("heavy");
            } else {
              o.hit = 1;
              track("mode_action", { module: "C", a: "evade" });
            }
          }
        }

        btn("laneDrift", x + 14, y + h - 62, (w - 28 - 14) / 2, 48, "漂移", "primary", () => {
          const run = state.flow.run;
          run.res = run.res || { ink: 2, heat: 0, focus: 2 };
          if ((run.res.focus || 0) <= 0) return toast("专注不足");
          run.res.focus -= 1;
          ms.invUntil = now() + 900;
          ms.focusSpend = (ms.focusSpend || 0) + 1;
          track("mode_action", { module: "C", a: "drift", left: run.res.focus });
          saveState();
        });
        btn("laneCalm", x + 28 + (w - 28 - 14) / 2, y + h - 62, (w - 28 - 14) / 2, 48, "继续", "ghost", () => finishTurnMode(cur, (ms.hit || 0) <= 1));

        hot2(
          "laneArea",
          trackX,
          trackY,
          trackW,
          trackH,
          "whisper",
          "light",
          () => {
            const dx = ui.mx - ui.downX;
            if (ui.moved && Math.abs(dx) > 60) {
              ms.lane = clamp(ms.lane + (dx < 0 ? 1 : -1), 0, 2);
              track("mode_action", { module: "C", a: "lane", lane: ms.lane });
              saveState();
            }
          },
          () => {
            ms.speed = clamp((ms.speed || 0.018) * 0.70, 0.010, 0.022);
            track("mode_action", { module: "C", a: "brake" });
            saveState();
          }
        );
      }

      function vnRole(moduleId) {
        if (moduleId === "A") return "cat";
        if (moduleId === "B") return "classmate";
        return "director";
      }

      function drawVNBackdrop(moduleId, pad, top, w, h) {
        const x = pad + 14;
        const y = top + 60;
        const innerW = w - 28;
        const innerH = h - 140;
        rrPath(x, y, innerW, innerH, 16);
        const g = ctx.createLinearGradient(0, y, 0, y + innerH);
        if (moduleId === "A") {
          g.addColorStop(0, "rgba(34,211,238,0.10)");
          g.addColorStop(1, "rgba(0,0,0,0.18)");
        } else if (moduleId === "B") {
          g.addColorStop(0, "rgba(250,204,21,0.12)");
          g.addColorStop(1, "rgba(0,0,0,0.18)");
        } else {
          g.addColorStop(0, "rgba(139,92,246,0.16)");
          g.addColorStop(1, "rgba(0,0,0,0.18)");
        }
        ctx.fillStyle = g;
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.14)";
        ctx.stroke();
      }

      function drawVNPortrait(kind, pad, top) {
        const x = pad + 28;
        const y = top + 92;
        const s = 110;
        rrPath(x, y, s, s, 18);
        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.12)";
        ctx.stroke();
        ctx.save();
        ctx.translate(x + s / 2, y + s / 2 + 6);
        if (kind === "cat") {
          ctx.fillStyle = "rgba(255,255,255,0.82)";
          ctx.beginPath();
          ctx.arc(0, 0, 28, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(-18, -24);
          ctx.lineTo(-34, -44);
          ctx.lineTo(-6, -34);
          ctx.closePath();
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(18, -24);
          ctx.lineTo(34, -44);
          ctx.lineTo(6, -34);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = "rgba(0,0,0,0.55)";
          ctx.beginPath();
          ctx.arc(-10, -6, 4, 0, Math.PI * 2);
          ctx.arc(10, -6, 4, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "rgba(0,0,0,0.35)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(-14, 6);
          ctx.lineTo(-32, 10);
          ctx.moveTo(-14, 10);
          ctx.lineTo(-30, 18);
          ctx.moveTo(14, 6);
          ctx.lineTo(32, 10);
          ctx.moveTo(14, 10);
          ctx.lineTo(30, 18);
          ctx.stroke();
        } else if (kind === "classmate") {
          ctx.fillStyle = "rgba(255,255,255,0.82)";
          ctx.beginPath();
          ctx.arc(0, -4, 26, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "rgba(250,204,21,0.22)";
          ctx.beginPath();
          ctx.arc(0, -18, 30, Math.PI, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "rgba(0,0,0,0.55)";
          ctx.beginPath();
          ctx.arc(-9, -10, 3.5, 0, Math.PI * 2);
          ctx.arc(9, -10, 3.5, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.strokeStyle = "rgba(139,92,246,0.65)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(0, 0, 30, 0, Math.PI * 2);
          ctx.stroke();
          ctx.strokeStyle = "rgba(255,255,255,0.22)";
          for (let i = 0; i < 6; i++) {
            ctx.beginPath();
            ctx.moveTo(0, 0);
            const a = (i / 6) * Math.PI * 2;
            ctx.lineTo(Math.cos(a) * 34, Math.sin(a) * 34);
            ctx.stroke();
          }
          ctx.fillStyle = "rgba(255,255,255,0.62)";
          ctx.font = `800 12px ${fontSans}`;
          const t = "导演";
          const tw = ctx.measureText(t).width;
          ctx.fillText(t, -tw / 2, 54);
        }
        ctx.restore();
      }

      function drawTurnStoryVN(cur, pad, top, w, h) {
        const x = pad + 14;
        const y = top + 60;
        const innerW = w - 28;
        const innerH = h - 140;
        const moduleId = cur.moduleId;
        if (!cur.vnLines) {
          cur.vnLines = cur.turn.narration.split("\n");
          cur.vnCursor = 1;
          saveState();
        }

        drawVNBackdrop(moduleId, pad, top, w, h);
        drawVNPortrait(vnRole(moduleId), pad, top);

        const boxH = 156;
        rrPath(x + 14, y + innerH - boxH - 14, innerW - 28, boxH, 18);
        ctx.fillStyle = "rgba(0,0,0,0.42)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.16)";
        ctx.stroke();

        ctx.fillStyle = "rgba(255,255,255,0.92)";
        ctx.font = `800 13px ${fontSans}`;
        const name = moduleId === "A" ? "猫" : moduleId === "B" ? "同桌" : "导演";
        ctx.fillText(name, x + 28, y + innerH - boxH - 14 + 28);

        ctx.fillStyle = "rgba(255,255,255,0.86)";
        ctx.font = `14px ${fontSans}`;
        const maxLines = clamp(cur.vnCursor || 1, 1, cur.vnLines.length);
        let ty = y + innerH - boxH - 14 + 58;
        for (let i = 0; i < maxLines; i++) {
          ty = wrapText(cur.vnLines[i], x + 28, ty, innerW - 56, 20, "rgba(255,255,255,0.86)");
          ty += 4;
          if (ty > y + innerH - 18) break;
        }

        const done = maxLines >= cur.vnLines.length;
        ctx.fillStyle = "rgba(255,255,255,0.55)";
        ctx.font = `12px ${fontSans}`;
        ctx.fillText(done ? "请选择" : "点击继续", x + innerW - 92, y + innerH - 26);

        btn("vnNext", x, y, innerW, innerH, "", "ghost", () => {
          if (cur.vnCursor < cur.vnLines.length) {
            cur.vnCursor += 1;
            saveState();
          }
        });

        if (done) {
          const choices = cur.turn.choices;
          if (choices.length === 2) {
            btn("chA", x, top + h - 74, (innerW - 14) / 2, 56, choices[0].label, "primary", () => finishTurnChoice(choices[0].id));
            btn("chB", x + (innerW - 14) / 2 + 14, top + h - 74, (innerW - 14) / 2, 56, choices[1].label, "ghost", () => finishTurnChoice(choices[1].id));
          } else {
            btn("chA", x, top + h - 74, (innerW - 28) / 3, 56, choices[0].label, "primary", () => finishTurnChoice(choices[0].id));
            btn("chB", x + (innerW - 28) / 3 + 14, top + h - 74, (innerW - 28) / 3, 56, choices[1].label, "ghost", () => finishTurnChoice(choices[1].id));
            btn("chC", x + ((innerW - 28) / 3) * 2 + 28, top + h - 74, (innerW - 28) / 3, 56, choices[2].label, "ghost", () => finishTurnChoice(choices[2].id));
          }
        } else {
          btn("vnSkip", x, top + h - 74, innerW, 56, "快进到选择", "ghost", () => {
            cur.vnCursor = cur.vnLines.length;
            saveState();
          });
        }
      }

      function drawTurnInput(cur, pad, top, w, h) {
        ensureTurnUI(cur);
        refreshTurnInputFromUI(cur);

        const x = pad + 14;
        const y0 = top + 14;
        const innerW = w - 28;
        const innerH = h - 28;

        const bgKey = cur.moduleId === "A" ? "bar" : cur.moduleId === "B" ? "letter" : "road";
        const fakeDrawer = { bgKey, bgFrom: bgKey, bgT0: now() };
        drawDrawerBg(fakeDrawer, pad, top, w, h);

        const stageX = x;
        const stageY = top + 14;
        rrPath(stageX, stageY, innerW, innerH, 18);
        ctx.fillStyle = "rgba(0,0,0,0.10)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.10)";
        ctx.stroke();

        drawModuleHUD(cur.moduleId, stageX + 12, stageY + 12, Math.min(260, innerW * 0.46));

        const dm = drawerMeta(cur.moduleId);
        if (!dm.seen) {
          ctx.fillStyle = "rgba(0,0,0,0.58)";
          ctx.fillRect(0, 0, aw, ah);
          const cardW = Math.min(innerW, 560);
          const cardH = 220;
          const cx = stageX + (innerW - cardW) / 2;
          const cy = stageY + (innerH - cardH) / 2;
          rrPath(cx, cy, cardW, cardH, 18);
          ctx.fillStyle = "rgba(0,0,0,0.42)";
          ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,0.16)";
          ctx.stroke();
          ctx.fillStyle = "rgba(255,255,255,0.92)";
          ctx.font = `800 ${Math.round(16 * uiScale)}px ${fontSans}`;
          ctx.fillText(`抽屉${cur.moduleId} · 新手引导`, cx + 14, cy + 30);
          ctx.fillStyle = "rgba(255,255,255,0.72)";
          ctx.font = `${Math.round(12 * uiScale)}px ${fontSans}`;
          const tips =
            cur.moduleId === "A"
              ? "点词片组成一句话，打开半价留言会把这句话存进回声池。\n点击生成进入剧情，再做一次选择。"
              : cur.moduleId === "B"
                ? "点词片组成一句；切到“五字改命”会自动压缩成5字。\n寄出/塞回/烧掉会走向不同结局。"
                : "点词片组成指令；逃亡消耗燃料，称王有概率。\n专注可在高等级时提升称王成功率。";
          wrapText(tips, cx + 14, cy + 58, cardW - 28, Math.round(18 * uiScale), "rgba(255,255,255,0.72)");
          btn("tutorOk", cx + 14, cy + cardH - 70, cardW - 28, 56, "我知道了", "primary", () => {
            dm.seen = true;
            saveState();
          });
          hot("tutorMask", 0, 0, aw, ah, () => {
            dm.seen = true;
            saveState();
          });
          return;
        }

        const portraitW = innerW * 0.60;
        const portraitH = innerH * 0.72;
        const px = stageX + 14;
        const py = stageY + 18;
        const vn = { charId: cur.moduleId === "A" ? "cat" : cur.moduleId === "B" ? "classmate" : "director", charEmotion: styleFromFracture() === "glitch" ? "glitch" : "calm", charInT: 1, done: true, shown: 0, lineText: "" };
        drawVNPortrait2_5D(vn, px, py, portraitW, portraitH);

        const panelX = stageX + portraitW + 28;
        const panelW = innerW - (portraitW + 42);
        const panelY = stageY + 18;
        const panelH = innerH - 36;
        rrPath(panelX, panelY, panelW, panelH, 18);
        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.12)";
        ctx.stroke();

        ctx.fillStyle = "rgba(255,255,255,0.90)";
        ctx.font = `800 ${Math.round(14 * uiScale)}px ${fontSans}`;
        const title = cur.moduleId === "A" ? "把烦恼拆成几片" : cur.moduleId === "B" ? "把那句写出来" : "给世界一条指令";
        ctx.fillText(title, panelX + 14, panelY + 28);
        ctx.fillStyle = "rgba(255,255,255,0.62)";
        ctx.font = `${Math.round(12 * uiScale)}px ${fontSans}`;
        ctx.fillText("点选词片组成一句，点击立绘触发反应", panelX + 14, panelY + 50);
        if (cur.moduleId === "A") {
          btn("leaveToggle", panelX + panelW - 140, panelY + 14, 126, 40, cur.ui.leaveOn ? "半价留言：开" : "半价留言：关", cur.ui.leaveOn ? "primary" : "ghost", () => {
            cur.ui.leaveOn = !cur.ui.leaveOn;
            refreshTurnInputFromUI(cur);
            saveState();
          });
        }
        hot("turnHelp", panelX + 10, panelY + 34, panelW - 20, 20, () => {
          state.flow.scene = "help";
          saveState();
        });

        const chips = cur.ui.chips;
        const picked = cur.ui.picked;
        const t = now() / 1000;
        const cols = 2;
        const cw = (panelW - 14 * 2 - 12) / cols;
        const ch = 52;
        let cy = panelY + 72;
        for (let i = 0; i < chips.length; i++) {
          const r = (i / cols) | 0;
          const c2 = i % cols;
          const bx = panelX + 14 + c2 * (cw + 12);
          const by = cy + r * (ch + 10);
          const bob = Math.sin(t * 2.1 + i * 0.7) * 1.8;
          const isOn = picked.includes(chips[i].id);
          rrPath(bx, by + bob, cw, ch, 16);
          ctx.fillStyle = isOn ? "rgba(34,211,238,0.14)" : "rgba(255,255,255,0.06)";
          ctx.fill();
          ctx.strokeStyle = isOn ? "rgba(34,211,238,0.55)" : "rgba(255,255,255,0.12)";
          ctx.stroke();
          ctx.fillStyle = "rgba(255,255,255,0.90)";
          ctx.font = `800 ${Math.round(14 * uiScale)}px ${fontSans}`;
          const tw = ctx.measureText(chips[i].t).width;
          ctx.fillText(chips[i].t, bx + (cw - tw) / 2, by + bob + ch * 0.64);
          hot(
            `chip${chips[i].id}`,
            bx,
            by + bob,
            cw,
            ch,
            () => {
              const has = picked.includes(chips[i].id);
              if (has) cur.ui.picked = picked.filter((x) => x !== chips[i].id);
              else {
                if (picked.length >= 4) cur.ui.picked = picked.slice(1).concat([chips[i].id]);
                else cur.ui.picked = picked.concat([chips[i].id]);
              }
              refreshTurnInputFromUI(cur);
              addRipple(px + portraitW * 0.66, py + portraitH * 0.58, "rgba(255,214,255,0.20)");
            },
            () => {
              state.flow.kbTarget = "turnInput";
              openKeyboard(cur.input || "", cur.moduleId === "B" && cur.bMode === "edit5" ? 5 : 80);
            }
          );
        }

        const bubbleX = panelX + 14;
        const bubbleY = panelY + panelH - 178;
        const bubbleW = panelW - 28;
        const bubbleH = 120;
        drawBubble(bubbleX, bubbleY, bubbleW, bubbleH, bubbleX + bubbleW * 0.18);
        ctx.fillStyle = "rgba(255,255,255,0.92)";
        ctx.font = `800 ${Math.round(13 * uiScale)}px ${fontSans}`;
        const who = cur.moduleId === "A" ? "猫" : cur.moduleId === "B" ? "同桌" : "导演";
        ctx.fillText(who, bubbleX + 18, bubbleY + 30);
        ctx.fillStyle = "rgba(255,255,255,0.86)";
        ctx.font = `${Math.round(16 * uiScale)}px ${fontSans}`;
        wrapTextStroke(cur.input || "", bubbleX + 18, bubbleY + 64, bubbleW - 36, Math.round(26 * uiScale), "#f3f3f3", "#2a2a2a");
        ctx.fillStyle = "rgba(255,255,255,0.55)";
        ctx.font = `${Math.round(12 * uiScale)}px ${fontSans}`;
        ctx.fillText("长按词片可自定义输入", bubbleX + 18, bubbleY + bubbleH - 16);

        if (cur.moduleId === "A") {
          const sy = panelY + panelH - 46;
          const bw = (panelW - 28) / 3;
          btn("sugar3", panelX + 14, sy, bw - 10, 42, "三分糖", cur.sugar === "三分糖" ? "primary" : "ghost", () => {
            cur.sugar = "三分糖";
            cur.ui.sug = cur.sugar;
          });
          btn("sugar5", panelX + 14 + bw, sy, bw - 10, 42, "五分糖", cur.sugar === "五分糖" ? "primary" : "ghost", () => {
            cur.sugar = "五分糖";
            cur.ui.sug = cur.sugar;
          });
          btn("sugar0", panelX + 14 + bw * 2, sy, bw - 10, 42, "无糖", cur.sugar === "无糖" ? "primary" : "ghost", () => {
            cur.sugar = "无糖";
            cur.ui.sug = cur.sugar;
          });
        }
        if (cur.moduleId === "B") {
          const sy = panelY + panelH - 46;
          const bw = (panelW - 28) / 2;
          btn("bSay", panelX + 14, sy, bw - 10, 42, "写一句", cur.bMode === "say" ? "primary" : "ghost", () => {
            cur.bMode = "say";
            cur.ui.mode = cur.bMode;
            refreshTurnInputFromUI(cur);
          });
          btn("b5", panelX + 14 + bw, sy, bw - 10, 42, "5字改命", cur.bMode === "edit5" ? "primary" : "ghost", () => {
            cur.bMode = "edit5";
            cur.ui.mode = cur.bMode;
            refreshTurnInputFromUI(cur);
          });
        }

        btn("toStory", x, top + h - 74, innerW, 56, "生成本回合（动画）", "primary", () => {
          cur.turn = buildTurn(cur.moduleId, cur.input, { sugar: cur.sugar, bMode: cur.bMode, leaveText: cur.leaveText });
          cur.phase = "story";
          cur.story = null;
          saveState();
        });
      }

      function drawTurnStory(cur, pad, top, w, h) {
        const x = pad + 14;
        const innerW = w - 28;
        const innerH = h - 28;
        const stageX = x;
        const stageY = top + 14;
        rrPath(stageX, stageY, innerW, innerH, 18);
        ctx.fillStyle = "rgba(0,0,0,0.12)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.10)";
        ctx.stroke();

        drawModuleHUD(cur.moduleId, stageX + 12, stageY + 12, Math.min(260, innerW * 0.46));

        const bgKey = cur.moduleId === "A" ? "bar" : cur.moduleId === "B" ? "letter" : "road";
        const fakeDrawer = { bgKey, bgFrom: bgKey, bgT0: now() };
        drawDrawerBg(fakeDrawer, pad, top, w, h);

        if (!cur.story) {
          const lines = (cur.turn && cur.turn.narration ? cur.turn.narration : "").split("\n");
          cur.story = { lines, idx: 0, shown: 0, done: false, lastAt: now(), burstAt: 0 };
        }
        const st = cur.story;
        const t = now();
        const dt = clamp((t - (st.lastAt || t)) / 1000, 0, 0.05);
        st.lastAt = t;
        const spd = clamp(state.settings.vnTextSpeed || 40, 10, 120);
        const curLine = st.lines[st.idx] || "";
        if (!st.done) {
          const prev = Math.floor(st.shown);
          st.shown = clamp(st.shown + dt * spd, 0, curLine.length);
          const next = Math.floor(st.shown);
          if (state.settings.vnTypeSfx && next > prev && next % 2 === 0) audioSfx("type");
          st.done = st.shown >= curLine.length - 0.001;
        }

        const portraitW = innerW * 0.62;
        const portraitH = innerH * 0.78;
        const px = stageX + 14;
        const py = stageY + 18;
        const emo = cur.turn.style === "glitch" ? "glitch" : cur.turn.style === "calm" ? "calm" : "hype";
        const vn = { charId: cur.moduleId === "A" ? "cat" : cur.moduleId === "B" ? "classmate" : "director", charEmotion: emo, charInT: 1, done: st.done, shown: st.shown, lineText: curLine };
        drawVNPortrait2_5D(vn, px, py, portraitW, portraitH);

        const propX = stageX + innerW * 0.56;
        const propY = stageY + innerH * 0.30;
        drawTurnProp(cur.moduleId, propX, propY, 160, emo);

        const bubbleW = innerW - (portraitW + 42);
        const bubbleX = stageX + portraitW + 28;
        const bubbleY = stageY + 44;
        const bubbleH = 220;
        drawBubble(bubbleX, bubbleY, bubbleW, bubbleH, bubbleX + bubbleW * 0.22);
        ctx.fillStyle = "rgba(255,255,255,0.92)";
        ctx.font = `800 ${Math.round(13 * uiScale)}px ${fontSans}`;
        const who = cur.moduleId === "A" ? "猫" : cur.moduleId === "B" ? "同桌" : "导演";
        ctx.fillText(who, bubbleX + 18, bubbleY + 30);
        ctx.fillStyle = "rgba(255,255,255,0.88)";
        ctx.font = `${Math.round(16 * uiScale)}px ${fontSans}`;
        const shownText = curLine.slice(0, Math.floor(st.shown));
        wrapTextStroke(shownText, bubbleX + 18, bubbleY + 66, bubbleW - 36, Math.round(26 * uiScale), "#f3f3f3", "#2a2a2a");
        ctx.fillStyle = "rgba(255,255,255,0.55)";
        ctx.font = `${Math.round(12 * uiScale)}px ${fontSans}`;
        const tip = st.done ? (st.idx < st.lines.length - 1 ? "点击继续" : "请选择") : "点击跳过";
        ctx.fillText(tip, bubbleX + 18, bubbleY + bubbleH - 18);

        if (cur.turn && cur.turn.variant) {
          const w1 = chip(bubbleX + 18, bubbleY - 30, cur.turn.variant.name, "rgba(255,255,255,0.78)", "rgba(0,0,0,0.18)", "rgba(255,255,255,0.12)");
          hot("varInfo", bubbleX + 18, bubbleY - 30, w1, 24, () => toast(cur.turn.variant.desc || ""));
        }
        if (cur.turn && cur.turn.objective) {
          const o = cur.turn.objective;
          const txt = `${o.ok ? "✓" : "○"} ${o.name}`;
          const w2 = chip(bubbleX + 28 + (cur.turn && cur.turn.variant ? ctx.measureText(cur.turn.variant.name).width + 34 : 0), bubbleY - 30, txt, "rgba(255,255,255,0.78)", "rgba(0,0,0,0.18)", "rgba(255,255,255,0.12)");
          hot("objInfo", bubbleX + 28, bubbleY - 30, w2, 24, () => toast(o.reward || ""));
        }

        hot("storyTap", stageX, stageY, innerW, innerH, () => {
          if (!st.done) {
            st.shown = curLine.length;
            st.done = true;
            return;
          }
          if (st.idx < st.lines.length - 1) {
            st.idx += 1;
            st.shown = 0;
            st.done = false;
            addRipple(px + portraitW * 0.55, py + portraitH * 0.45, "rgba(34,211,238,0.18)");
            return;
          }
        });

        const atEnd = st.idx >= st.lines.length - 1 && st.done;
        const choices = cur.turn.choices;
        if (atEnd) {
          if (choices.length === 2) {
            drawChoiceCard("chA", stageX + 14, stageY + innerH - 132, (innerW - 42) / 2, 108, choices[0], "primary", () => finishTurnChoice(choices[0].id));
            drawChoiceCard("chB", stageX + 28 + (innerW - 42) / 2, stageY + innerH - 132, (innerW - 42) / 2, 108, choices[1], "ghost", () => finishTurnChoice(choices[1].id));
          } else {
            const bw = (innerW - 56) / 3;
            drawChoiceCard("chA", stageX + 14, stageY + innerH - 132, bw, 108, choices[0], "primary", () => finishTurnChoice(choices[0].id));
            drawChoiceCard("chB", stageX + 28 + bw, stageY + innerH - 132, bw, 108, choices[1], "ghost", () => finishTurnChoice(choices[1].id));
            drawChoiceCard("chC", stageX + 42 + bw * 2, stageY + innerH - 132, bw, 108, choices[2], "ghost", () => finishTurnChoice(choices[2].id));
          }
        }
      }

      function drawChoiceCard(id, x, y, w, h, choice, style, onClick) {
        const hovered = hit({ x, y, w, h });
        const pressed = ui.down && ui.downId === id;
        const s = pressed ? 0.98 : hovered ? 1.02 : 1;
        ctx.save();
        ctx.translate(x + w / 2, y + h / 2);
        ctx.scale(s, s);
        ctx.translate(-(x + w / 2), -(y + h / 2));
        rrPath(x, y, w, h, 18);
        ctx.fillStyle = style === "primary" ? "rgba(139,92,246,0.20)" : "rgba(255,255,255,0.06)";
        ctx.shadowColor = "rgba(0,0,0,0.45)";
        ctx.shadowBlur = 18;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = style === "primary" ? "rgba(139,92,246,0.55)" : "rgba(255,255,255,0.14)";
        ctx.stroke();
        ctx.fillStyle = "rgba(255,255,255,0.92)";
        ctx.font = `800 ${Math.round(14 * uiScale)}px ${fontSans}`;
        wrapText(choice.label, x + 14, y + 30, w - 28, Math.round(18 * uiScale), "rgba(255,255,255,0.92)");
        ctx.fillStyle = "rgba(255,255,255,0.58)";
        ctx.font = `${Math.round(12 * uiScale)}px ${fontSans}`;
        wrapText(choice.hint || "", x + 14, y + 58, w - 28, Math.round(16 * uiScale), "rgba(255,255,255,0.58)");
        ctx.restore();
        hot(id, x, y, w, h, () => {
          if (navigator.vibrate) navigator.vibrate(16);
          addRipple(x + w * 0.5, y + h * 0.45, "rgba(139,92,246,0.22)");
          if (onClick) onClick();
        });
      }

      function drawTurnProp(moduleId, x, y, s, emo) {
        const t = now() / 1000;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(Math.sin(t * 0.9) * 0.08);
        const glow = emo === "glitch" ? "rgba(255,77,109,0.22)" : "rgba(34,211,238,0.18)";
        ctx.shadowColor = glow;
        ctx.shadowBlur = 22;
        if (moduleId === "A") {
          rrPath(-s * 0.35, -s * 0.20, s * 0.70, s * 0.46, 18);
          ctx.fillStyle = "rgba(255,255,255,0.08)";
          ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,0.16)";
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(0, -s * 0.05, s * 0.20, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(250,204,21,0.14)";
          ctx.fill();
        } else if (moduleId === "B") {
          rrPath(-s * 0.38, -s * 0.22, s * 0.76, s * 0.48, 16);
          ctx.fillStyle = "rgba(255,255,255,0.06)";
          ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,0.16)";
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-s * 0.38, -s * 0.22);
          ctx.lineTo(0, 0);
          ctx.lineTo(s * 0.38, -s * 0.22);
          ctx.stroke();
          ctx.fillStyle = "rgba(255,77,109,0.18)";
          ctx.beginPath();
          ctx.arc(0, s * 0.12, s * 0.06, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.strokeStyle = "rgba(255,255,255,0.18)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(-s * 0.40, s * 0.10);
          ctx.lineTo(s * 0.40, s * 0.10);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-s * 0.24, -s * 0.12);
          ctx.lineTo(0, s * 0.14);
          ctx.lineTo(s * 0.24, -s * 0.12);
          ctx.stroke();
          ctx.lineWidth = 1;
        }
        ctx.restore();
      }

      function drawModuleHUD(moduleId, x, y, w) {
        const m = drawerMeta(moduleId);
        const lv = drawerLevel(moduleId);
        const prev = DRAWER_XP_TABLE[Math.max(0, lv - 1)] || 0;
        const next = DRAWER_XP_TABLE[Math.min(DRAWER_XP_TABLE.length - 1, lv)] || prev + 6;
        const t = clamp(((m.xp || 0) - prev) / Math.max(1, next - prev), 0, 1);
        rrPath(x, y, w, 66, 16);
        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.12)";
        ctx.stroke();
        ctx.fillStyle = "rgba(255,255,255,0.90)";
        ctx.font = `800 ${Math.round(12 * uiScale)}px ${fontSans}`;
        ctx.fillText(`抽屉${moduleId} · Lv.${lv}`, x + 12, y + 22);
        rrPath(x + 12, y + 30, w - 24, 10, 999);
        ctx.fillStyle = "rgba(255,255,255,0.10)";
        ctx.fill();
        rrPath(x + 12, y + 30, (w - 24) * t, 10, 999);
        ctx.fillStyle = moduleId === "A" ? "rgba(250,204,21,0.45)" : moduleId === "B" ? "rgba(255,77,109,0.35)" : "rgba(34,211,238,0.45)";
        ctx.fill();

        const run = state.flow.run;
        const res = (run && run.res) || { ink: 0, heat: 0, focus: 0 };
        ctx.fillStyle = "rgba(255,255,255,0.62)";
        ctx.font = `${Math.round(11 * uiScale)}px ${fontSans}`;

      function drawChapterTree() {
        const pad = 14;
        const top = insetTop;
        const w = aw - pad * 2;
        const h = ah - top - insetBottom;
        rrPath(pad, top, w, h, 18);
        ctx.fillStyle = "rgba(255,255,255,0.04)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.12)";
        ctx.stroke();
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.font = `800 16px ${fontSans}`;
        ctx.fillText("章节树 / 收藏册", pad + 14, top + 30);
        const x = pad + 14;
        const innerW = w - 28;
        const ch = state.flow.chapter;
        const unlocked = (ch && ch.unlocked) || { N0: true, N1: true };
        const nodes = [
          { id: "N0", t: "工位23:59", px: 0.12, py: 0.2 },
          { id: "N1", t: "镜子", px: 0.32, py: 0.1 },
          { id: "N2", t: "抽屉A", px: 0.2, py: 0.42 },
          { id: "N3", t: "抽屉C", px: 0.5, py: 0.42 },
          { id: "N4", t: "抽屉B", px: 0.8, py: 0.42 },
          { id: "N8", t: "逆风王", px: 0.5, py: 0.7 },
          { id: "X1", t: "镜中镜", px: 0.8, py: 0.72 },
        ];
        const edges = [
          ["N0", "N1"],
          ["N1", "N2"],
          ["N1", "N3"],
          ["N1", "N4"],
          ["N3", "N8"],
          ["N4", "X1"],
        ];
        const ox = x;
        const oy = top + 60;
        const gw = innerW;
        const gh = h - 300;
        for (let i = 0; i < edges.length; i++) {
          const a = nodes.find((n) => n.id === edges[i][0]);
          const b = nodes.find((n) => n.id === edges[i][1]);
          const ax = ox + a.px * gw;
          const ay = oy + a.py * gh;
          const bx = ox + b.px * gw;
          const by = oy + b.py * gh;
          ctx.strokeStyle = "rgba(255,255,255,0.10)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(ax, ay);
          ctx.lineTo(bx, by);
          ctx.stroke();
        }
        for (let i = 0; i < nodes.length; i++) {
          const n = nodes[i];

      function vn2DevValidateLocal() {
        const cache = vn2GetCache();
        const byNode = cache.byNode;
        const chapters = Array.isArray(cache.cfg.chapters) ? cache.cfg.chapters : [];
        const errors = [];
        const warnings = [];
        for (let i = 0; i < chapters.length; i++) {
          const ch = chapters[i];
          if (!byNode[ch.entryNodeId]) errors.push(`章节${ch.chapterId} entryNodeId不存在：${ch.entryNodeId}`);
        }
        for (let i = 0; i < cache.cfg.choices.length; i++) {
          const c = cache.cfg.choices[i];
          if (!byNode[c.nodeId]) errors.push(`choice缺少node：${c.choiceId}`);
          if (!byNode[c.jumpToNodeId]) errors.push(`choice跳转不存在：${c.choiceId}`);
        }
        for (let i = 0; i < chapters.length; i++) {
          const ch = chapters[i];
          const q = [ch.entryNodeId];
          const seen = {};
          let endN = 0;
          while (q.length) {
            const id = q.shift();
            if (seen[id]) continue;
            seen[id] = 1;
            const n = byNode[id];
            if (!n) continue;
            if (n.type === "ending") endN++;
            const cl = cache.choicesByNode[id] || [];
            for (let k = 0; k < cl.length; k++) q.push(cl[k].jumpToNodeId);
            if (n.next) q.push(n.next);
          }
          if (endN < 5) warnings.push(`章节${ch.chapterId} 结局数<5：${endN}`);
        }
        return { errors, warnings };
      }

      const vnGesture = { touches: new Map(), armed: false, startY: 0, lastAt: 0 };

        if (vnGesture.touches.size === 2) {
          const ys = Array.from(vnGesture.touches.values());
          vnGesture.startY = (ys[0] + ys[1]) * 0.5;
          vnGesture.armed = true;
        }
      }
      function vnGestureHandle(deltaY) {
        const t = now();
        if (t - vnGesture.lastAt < 380) return;
        const inVN = state.flow.scene === "vnPlayer" || state.flow.scene === "vnHistory" || state.flow.mode === "vn" || state.flow.scene === "vn2Player";
        if (!inVN) return;
        const vn = state.flow.scene === "vn2Player" ? state.vn2.runtime : state.flow.vn;
        if (!vn) return;
        if (deltaY < -90) {
          if (state.flow.scene !== "vn2Player") state.flow.scene = "vnHistory";
          vnGesture.lastAt = t;
          vnGesture.armed = false;
          saveState();
        } else if (deltaY > 90) {
          vn.hideBox = !vn.hideBox;
          state.settings.vnHideBox = vn.hideBox;
          vnGesture.lastAt = t;
          vnGesture.armed = false;
          saveState();
        }
      }
      c.addEventListener("pointerdown", (e) => {
        const p = pointerPos(e);
        ui.down = true;
        ui.downAt = now();
        ui.mx = p.x;
        ui.my = p.y;
        ui.downX = p.x;
        ui.downY = p.y;
        ui.moved = false;
        ui.downId = "";
        if (e.pointerType === "touch") {
          vnGesture.touches.set(e.pointerId, e.clientY);
          vnGestureMaybeStart();
        }
        for (let i = ui.items.length - 1; i >= 0; i--) {
          const it = ui.items[i];
          if (hit(it.r)) {
            ui.downId = it.id;
            break;
          }
        }
        if (state.settings.audioOn) audioInit()?.ac.resume();

            const ys = Array.from(vnGesture.touches.values());

            vnGestureHandle(avg - vnGesture.startY);

        if (ui.downId === "ugcScrollArea") {
          state.flow.ugcScroll = clamp((state.flow.ugcScroll || 0) - dy, 0, 520);

        if (ui.downId === "vn2EndScroll") {

        if (ui.downId === "mood") {

          const t = clamp((ui.mx - sx) / sw, 0, 1);
          state.settings.typeVol = Math.round(t * 100);
          audioApplyVolumes();
          saveState();
        }
      });
      c.addEventListener("pointerup", (e) => {
        const held = now() - ui.downAt;
        const id = ui.downId;
        ui.down = false;
        ui.downId = "";
        if (e && e.pointerType === "touch") {
          vnGesture.touches.delete(e.pointerId);

          }
          return;
        }
        if (id === "drag_inv_edge" || id === "drag_right_edge" || id === "drag_quick_edge") {
          ensureDrawers();
          const ds = state.flow.drawers.items;
          const d = id === "drag_inv_edge" ? ds.inv : id === "drag_right_edge" ? ds.right : ds.quick;
          d.target = d.p > 0.5 ? 1 : 0;
          saveState();
          return;
        }
        const it = ui.items.find((x) => x.id === id);
        if (!it) return;
        if (it.type === "btn") {
          addRipple(ui.mx, ui.my, "rgba(34,211,238,0.22)");

      window.addEventListener("keydown", (e) => {

      function drawToast() {
        const msg = state.flow.toast;

        ctx.font = `12px ${fontSans}`;

      }

      function addRipple(x, y, color) {
        state.flow.ripples = state.flow.ripples || [];
        state.flow.ripples.push({ x, y, t: now(), c: color || "rgba(255,255,255,0.18)" });
        if (state.flow.ripples.length > 18) state.flow.ripples = state.flow.ripples.slice(state.flow.ripples.length - 18);
      }
      function drawRipples() {
        const list = state.flow.ripples || [];
        if (!list.length) return;
        const t = now();
        const keep = [];
        for (let i = 0; i < list.length; i++) {
          const r = list[i];
          const age = (t - r.t) / 240;
          if (age >= 1) continue;
          const k = 1 - age;
          const rad = 10 + age * 58;
          ctx.save();
          ctx.globalAlpha = 0.55 * k;
          ctx.strokeStyle = r.c;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(r.x, r.y, rad, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
          keep.push(r);
        }
        state.flow.ripples = keep;
      }

      function frame() {
        try {
          const t0 = now();
          if (!perf.lastAt) perf.lastAt = t0;
          if (!perf.lastFpsAt) perf.lastFpsAt = t0;
          perf.frames++;
          const span = t0 - perf.lastFpsAt;
          if (span >= 1000) {
            perf.fps = (perf.frames * 1000) / span;
            perf.frames = 0;
            perf.lastFpsAt = t0;
          }
          perf.lastAt = t0;
          flushSaveState();
          uiBegin();
          ensureTelemetry();
          if (!state.flow._scenePrev) state.flow._scenePrev = state.flow.scene;
          if (state.flow.scene !== state.flow._scenePrev) {
            track("scene_enter", { from: state.flow._scenePrev, to: state.flow.scene });
            state.flow._scenePrev = state.flow.scene;
          }
          ctx.textAlign = "left";
          ctx.textBaseline = "alphabetic";
          drawBackground();
          drawTopBar();
          if (fatalError) {
            ctx.fillStyle = "rgba(0,0,0,0.65)";
            ctx.fillRect(0, 0, aw, ah);
            ctx.fillStyle = "rgba(255,255,255,0.92)";
            ctx.font = `800 16px ${fontSans}`;
            ctx.fillText(ERROR_TEXT, 18, 64);
            btn("errReset", 18, 90, aw - 36, 56, "重置并重启", "danger", () => resetState());
            drawToast();
            requestAnimationFrame(frame);
            return;
          }
          const s = state.flow.scene;
          if (s === "hub") drawHub();
          else if (s === "turn") {
            const run = state.flow.run;
            if (run && run.current && run.current.phase === "input" && run.current.turn === null && run.current.moduleId) {
              if (!run.current.turn && run.current.phase === "input") {
                if (run.current.auto === undefined) run.current.auto = 1;
              }
            }
            const run2 = state.flow.run;
            if (run2 && run2.current && run2.current.phase === "story" && !run2.current.turn) {
              run2.current.turn = buildTurn(run2.current.moduleId, run2.current.input, { sugar: run2.current.sugar, bMode: run2.current.bMode, leaveText: run2.current.leaveText });
              saveState();
            }
            drawTurn();
          } else if (s === "runSummary") drawRunSummary();
          else if (s === "settings") drawSettings();
          else if (s === "vote") drawVote();
          else if (s === "chapterTree") drawChapterTree();
          else if (s === "vnPlayer") drawVNPlayer();
          else if (s === "vnHistory") drawVNHistory();
          else if (s === "vn2Home") drawVN2Home();
          else if (s === "vn2Player") drawVN2Player();
          else if (s === "vn2Saves") drawVN2Saves();
          else if (s === "vn2Endings") drawVN2Endings();
          else if (s === "vn2Dev") drawVN2Dev();
          else if (s === "chapterSelect") drawChapterSelect();
          else if (s === "achievements") drawAchievements();
          else if (s === "help") drawHelp();
          else if (s === "analytics") drawAnalytics();
          else if (s === "challengeHome") drawChallengeHome();
          else if (s === "battle") drawBattle();
          else if (s === "skills") drawSkills();
          else if (s === "puzzle") drawPuzzle();
          else if (s === "ugcFeed") drawUGCFeed();
          else if (s === "ugcEdit") drawUGCEdit();
          else if (s === "ugcImport") drawUGCImport();
          else if (s === "boss") drawBoss();
          else if (s === "fail") drawFail("fail");
          else if (s === "aFail") drawFail("aFail");
          else if (s === "mirrorEgg") drawMirrorEgg();
          drawRipples();
          drawGlobalDrawers();
          drawToast();
          requestAnimationFrame(frame);
        } catch {
          fatalError = true;
          requestAnimationFrame(frame);
        }
      }

      state.dailySign = getDailySign(now());
      state.weekThemeKey = getWeekTheme(now()).key;

      function smokeGameplay() {
        const r = { total: 0, passed: 0, failed: 0, items: [] };
        const test = (name, fn) => {
          r.total += 1;
          try {
            fn();
            r.passed += 1;
            r.items.push({ name, ok: true });
          } catch (e) {
            r.failed += 1;
            r.items.push({ name, ok: false, error: e && e.stack ? e.stack : String(e) });
          }
        };
        const assert = (c, m) => {
          if (!c) throw new Error(m);
        };
        test("buildTurn: A/B/C 都能生成 variant/objective", () => {
          const ta = buildTurn("A", "我有点累", { sugar: "三分糖", bMode: "say", leaveText: "我有点累" });
          const tb = buildTurn("B", "谢谢", { sugar: "三分糖", bMode: "edit5", leaveText: "" });
          const tc = buildTurn("C", "发疯", { sugar: "三分糖", bMode: "say", leaveText: "" });
          assert(ta.variant && ta.objective, "A 缺少 variant/objective");
          assert(tb.variant && tb.objective, "B 缺少 variant/objective");
          assert(tc.variant && tc.objective, "C 缺少 variant/objective");
          assert(ta.choices.length >= 2 && ta.choices.length <= 3, "A choices 数量异常");
          assert(tb.choices.length >= 2 && tb.choices.length <= 3, "B choices 数量异常");
          assert(tc.choices.length >= 2 && tc.choices.length <= 3, "C choices 数量异常");
        });
        test("Puzzle: startPuzzle 进入 intro 并可切换", () => {
          startPuzzle("p1");
          assert(state.flow.scene === "puzzle", "未进入 puzzle 场景");
          assert(state.flow.puzzle && state.flow.puzzle.phase === "intro", "puzzle phase 应为 intro");
        });
        test("Turn: A/B/C 进入 mode 阶段", () => {
          state.flow.scene = "hub";
          ensureRun("fast");
          openTurn("A");
          assert(state.flow.scene === "turn", "未进入 turn 场景");
          assert(state.flow.run && state.flow.run.current && state.flow.run.current.phase === "mode", "turn phase 应为 mode");
          openTurn("B");
          assert(state.flow.run.current.moduleId === "B", "未切换到 B");
          openTurn("C");
          assert(state.flow.run.current.moduleId === "C", "未切换到 C");
        });
        test("Perf: telemetrySummary 缓存命中", () => {
          ensureTelemetry();
          state.telemetry.events = [];
          state.telemetry._v = 0;
          track("x", {});
          const s1 = telemetrySummary();
          const s2 = telemetrySummary();
          assert(s1 === s2, "summary 应返回同一对象（缓存）");
        });
        test("Perf: skillStat 缓存 + 失效", () => {
          ensureSkills();
          state.skills.points = 99;
          state.skills.spent = {};
          state.skills._v = 0;
          const a0 = skillStat("comboWin");
          unlockSkill("mind_1");
          const a1 = skillStat("comboWin");
          assert(a1 > a0, "解锁后 comboWin 应增加");
          resetSkills();
          const a2 = skillStat("comboWin");
          assert(a2 === 0, "重置后 comboWin 应为 0");
        });
        test("Perf: equipStats 缓存 + 失效", () => {
          state.inv = { items: [], equip: { weapon: null, charm: null, coat: null }, _v: 0 };
          invAddItem({ uid: "u1", id: "w1", name: "退格短刃", slot: "weapon", rar: "bronze", p: 6, aff: [], ts: now() });
          state.inv.equip.weapon = "u1";
          state.inv._v += 1;
          const e1 = equipStats();
          const e2 = equipStats();
          assert(e1 === e2, "equipStats 应缓存命中");
          state.inv.equip.weapon = null;
          state.inv._v += 1;
          const e3 = equipStats();
          assert(e3 !== e2, "装备变化后缓存应失效");
        });
        return r;
      }

      function perfBench() {
        const t0 = performance.now();
        ensureTelemetry();
        for (let i = 0; i < 2000; i++) telemetrySummary();
        const t1 = performance.now();
        ensureSkills();
        for (let i = 0; i < 20000; i++) skillStat("comboWin");
        const t2 = performance.now();
        state.inv = state.inv || { items: [], equip: { weapon: null, charm: null, coat: null }, _v: 0 };
        for (let i = 0; i < 2000; i++) equipStats();
        const t3 = performance.now();
        return { telemetrySummary_ms: +(t1 - t0).toFixed(2), skillStat_ms: +(t2 - t1).toFixed(2), equipStats_ms: +(t3 - t2).toFixed(2) };
      }

      window.__debug = { smokeGameplay, perfBench };
      saveState();
      audioBgm("hub");
      requestAnimationFrame(frame);
    </script>
  </body>
</html>
