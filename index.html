      let saveLastAt = 0;
      let savePending = false;
      function saveState() {
        const t = now();
        if (t - saveLastAt < 250) {
          savePending = true;
          return;
        }
        saveLastAt = t;
        savePending = false;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }
      function flushSaveState() {
        if (!savePending) return;
        const t = now();
        if (t - saveLastAt < 250) return;
        saveState();
      }

      let state = loadState();

      function purgeHistory() {
        const cut = now() - DEDUPE_DAYS * DAY_MS;
        state.storyHist = (state.storyHist || []).filter((x) => x && x.ts >= cut);
      }

      const DRAWER_XP_TABLE = [0, 4, 10, 18, 28, 40];
      function drawerMeta(moduleId) {
        state.drawerMeta = state.drawerMeta || { A: { lv: 1, xp: 0, seen: false }, B: { lv: 1, xp: 0, seen: false }, C: { lv: 1, xp: 0, seen: false } };
        return state.drawerMeta[moduleId] || (state.drawerMeta[moduleId] = { lv: 1, xp: 0, seen: false });
      }
      function drawerLevel(moduleId) {
        return clamp((drawerMeta(moduleId).lv || 1) | 0, 1, 6);
      }
      function gainDrawerXp(moduleId, add) {
        const m = drawerMeta(moduleId);
        m.xp = (m.xp || 0) + (add || 0);
        let lv = m.lv || 1;
        while (lv < DRAWER_XP_TABLE.length && m.xp >= DRAWER_XP_TABLE[lv]) lv += 1;
        if (lv !== m.lv) {
          m.lv = lv;
          toast(`抽屉${moduleId} 等级提升：Lv.${lv}`);
          audioSfx("crown");
        }
      }

      function ensureDrawers() {
        const f = state.flow;
        if (f.drawers && typeof f.drawers === "object") return;
        f.drawers = {
          active: "",
          rightTab: "tasks",
          swipeDx: 0,
          items: {
            inv: { id: "inv", side: "left", p: 0, target: 0, w: 0 },
            right: { id: "right", side: "right", p: 0, target: 0, w: 0 },
            quick: { id: "quick", side: "bottom", p: 0, target: 0, h: 0 },
          },

      }

      function anyDrawerOpen() {
        ensureDrawers();
        const ds = state.flow.drawers.items;
        for (const k in ds) if (ds[k] && ds[k].p > 0.01) return true;
        return false;
      }

      function openDrawer(id) {
        ensureDrawers();
        const ds = state.flow.drawers.items;
        for (const k in ds) if (ds[k]) ds[k].target = 0;
        if (ds[id]) ds[id].target = 1;
        state.flow.drawers.active = id;
        saveState();
      }
      function openRightTab(tab) {
        ensureDrawers();
        state.flow.drawers.rightTab = tab;
        openDrawer("right");
      }
      function closeDrawer(id) {
        ensureDrawers();
        const ds = state.flow.drawers.items;
        if (id) {
          if (ds[id]) ds[id].target = 0;
        } else {
          for (const k in ds) if (ds[k]) ds[k].target = 0;
        }
        if (state.flow.drawers.active === id) state.flow.drawers.active = "";
        saveState();
      }

      function drawerDims(d) {
        if (d.side === "bottom") {
          d.h = clamp(Math.round(ah * 0.42), 240, 420);
        } else {
          d.w = clamp(Math.round(aw * 0.78), 280, 430);
        }
      }

      function drawGlobalDrawers() {
        ensureDrawers();
        const ds = state.flow.drawers.items;
        for (const k in ds) drawerDims(ds[k]);

        for (const k in ds) {
          const d = ds[k];
          d.p = lerp(d.p, d.target, 0.14);
          if (Math.abs(d.p - d.target) < 0.002) d.p = d.target;
        }

        const scrimP = Math.max(ds.inv.p, ds.right.p, ds.quick.p);
        if (scrimP > 0.01) {
          ctx.fillStyle = `rgba(0,0,0,${0.55 * scrimP})`;
          ctx.fillRect(0, 0, aw, ah);
          hot("drawerScrim", 0, 0, aw, ah, () => closeDrawer(), () => closeDrawer());
        }

        drawOneDrawer(ds.inv);
        drawOneDrawer(ds.right);
        drawBottomDrawer(ds.quick);

        if (ds.inv.p < 0.01) hot("drag_inv_edge", 0, insetTop, 14, ah - insetTop - insetBottom, () => openDrawer("inv"));
        if (ds.right.p < 0.01) {
          hot("drag_right_edge", aw - 14, insetTop, 14, ah - insetTop - insetBottom, () => openRightTab("tasks"));

        if (ds.quick.p < 0.01) hot("drag_quick_edge", 0, ah - insetBottom - 14, aw, 14, () => openDrawer("quick"));

          bp.type = "bandpass";
          bp.frequency.value = type === "shutter" ? 2200 : 1200;
          bp.Q.value = type === "shutter" ? 12 : 8;
          const g = a.ac.createGain();
          g.gain.value = 0;
          n.connect(bp);
          bp.connect(g);
          g.connect(outBus);
          rampParam(g.gain, type === "shutter" ? 0.12 : 0.10, t, 0.006);
          rampParam(g.gain, 0.0001, t + 0.14, 0.10);
          n.start(t);
          n.stop(t + 0.22);
          return;
        }

        if (type === "hoof") {
          const o = a.ac.createOscillator();
          const g = a.ac.createGain();
          const lp = a.ac.createBiquadFilter();
          lp.type = "lowpass";
          lp.frequency.value = 260;
          o.type = "sine";
          o.frequency.setValueAtTime(110, t);
          o.frequency.exponentialRampToValueAtTime(62, t + 0.12);
          g.gain.value = 0;
          o.connect(lp);
          lp.connect(g);
          g.connect(outBus);
          rampParam(g.gain, 0.18, t, 0.004);
          rampParam(g.gain, 0.0001, t + 0.16, 0.12);
          o.start(t);
          o.stop(t + 0.22);
          return;
        }

        if (type === "crown") {
          const o = a.ac.createOscillator();
          const g = a.ac.createGain();
          o.type = "triangle";
          o.frequency.setValueAtTime(660, t);
          o.frequency.exponentialRampToValueAtTime(990, t + 0.10);
          g.gain.value = 0;
          o.connect(g);
          g.connect(outBus);
          rampParam(g.gain, 0.14, t, 0.006);
          rampParam(g.gain, 0.0001, t + 0.20, 0.16);
          o.start(t);
          o.stop(t + 0.26);
          return;
        }

        const o = a.ac.createOscillator();
        const g = a.ac.createGain();
        o.type = "sine";
        o.frequency.setValueAtTime(320, t);
        g.gain.value = 0;
        o.connect(g);
        g.connect(outBus);
        rampParam(g.gain, 0.10, t, 0.006);
        rampParam(g.gain, 0.0001, t + 0.12, 0.10);
        o.start(t);
        o.stop(t + 0.18);
      }

        if (!("BroadcastChannel" in window)) return null;
        bc = new BroadcastChannel(VOTE_CHANNEL);

          const m = ev.data;

          if (m.type === "vote_cast") onVoteCast(m.voteId, m.option);

      function openVote(reason) {
        const vote = {

        if (vote.reason === "chapter" && state.flow.chapter) {

        } else {
          vote.topic = pick(["交付还是发疯", "寄出还是塞回", "走高速还是进隧道"]);
        }
        vote.options =
          vote.topic === "交付还是发疯"
            ? ["继续交付", "当场发疯"]
            : vote.topic === "寄出还是塞回"
              ? ["寄出", "塞回抽屉"]

      }
      function onVoteOpen(vote) {
        if (!vote || !vote.id) return;
        state.flow.vote = vote;
        state.flow.scene = "vote";
        saveState();
      }
      function onVoteCast(voteId, option) {
        const v = state.flow.vote;
        if (!v || v.id !== voteId) return;
        v.counts[option] = (v.counts[option] || 0) + 1;
        saveState();
      }
      function onVoteResult(voteId, winner) {
        const v = state.flow.vote;
        if (!v || v.id !== voteId) return;
        v.winner = winner;
        applyVoteOutcome(v.topic, winner);
        audioSfx("crown");
        saveState();
      }
      function castVote(option) {
        const v = state.flow.vote;
        if (!v || v.voted) return;
        v.voted = true;
        v.counts[option] = (v.counts[option] || 0) + 1;
        state.achievements = state.achievements || { unlocked: {}, stats: {} };
        state.achievements.stats = state.achievements.stats || {};
        state.achievements.stats.votes = (state.achievements.stats.votes || 0) + 1;
        unlockAchievement("ach_vote");
        bcInit()?.postMessage({ type: "vote_cast", voteId: v.id, option });
        saveState();
      }
      function finalizeVote() {
        const v = state.flow.vote;
        if (!v || v.winner !== undefined) return;
        if (!bcInit()) {
          const seed = hash32(v.id + "|crowd|" + String(state.settings.mood) + "|" + String(state.mirrorFracture) + "|" + String(state.stats.headwindCharge));
          const r = mulberry32(seed);
          const crowd = 7 + (seed % 9);
          const bias = v.topic === "交付还是发疯" ? 0.5 + (state.mirrorFracture - 4) * 0.06 : v.topic === "寄出还是塞回" ? 0.5 + (state.stats.headwindCharge - 2) * 0.06 : 0.5 + (state.settings.mood - 50) * 0.004;
          let c0 = 0;
          let c1 = 0;
          for (let i = 0; i < crowd; i++) {
            if (r() < clamp(bias, 0.2, 0.8)) c0++;
            else c1++;
          }
          v.counts[0] += c0;
          v.counts[1] += c1;
        }
        const base = hash32(v.id + "|" + String(v.counts[0]) + "|" + String(v.counts[1]));
        const winner = v.counts[0] === v.counts[1] ? (base & 1) : v.counts[0] > v.counts[1] ? 0 : 1;
        v.winner = winner;
        bcInit()?.postMessage({ type: "vote_result", voteId: v.id, winner });
        applyVoteOutcome(v.topic, winner);
        audioSfx("crown");
        saveState();
      }
      function applyVoteOutcome(topic, winner) {
        if (topic === "交付还是发疯") {
          state.mirrorFracture = clamp(state.mirrorFracture + (winner === 0 ? -1 : 1), 0, 9);

        const nAff = rar === "platinum" ? 3 : rar === "gold" ? 2 : rar === "silver" ? 2 : 1;
        const pool = affixPool(base.slot);
        const aff = [];
        const used = {};
        for (let i = 0; i < nAff; i++) {
          const a = pool[(r() * pool.length) | 0];
          if (used[a.id]) continue;

          const v = a.min + ((r() * (a.max - a.min + 1)) | 0);

        const p = base.base + (rar === "platinum" ? 6 : rar === "gold" ? 4 : rar === "silver" ? 2 : 0);

        if ((state.skills.points || 0) < (s.cost || 1)) return false;

        for (let i = 0; i < req.length; i++) if (!skillHas(req[i])) return false;
        return true;

      function calcScore(moduleId) {

          const uniq = state.flow.mode === "chapter" && ch ? Object.keys(ch.endings || {}).length : Object.keys(state.endings || {}).length;
          return { name: "意难平指数", value: Math.round(uniq * 18 + state.shards.hongdou * 6 + clamp(state.stats.bConsecutivePutBack * 8, 0, 40)) };
        }
        return { name: "爽感分", value: Math.round(state.stats.mileage * 18 + state.stats.headwindCharge * 10 + (state.titles.includes("逆风王") ? 35 : 0) - f * 6) };

      function calcWinHint(moduleId) {

      function finishTurnChoice(choiceId) {
        const run = state.flow.run;
        const cur = run.current;
        const turn = cur.turn;
        if (!turn) return;
        run.res = run.res || { ink: 2, heat: 0, focus: 2 };
        const res = run.res;
        const vid = (turn.variant && turn.variant.id) || "";

        if (cur.ugcId) {
          const it = (state.ugc.items || []).find((x) => x.id === cur.ugcId);
          const tcost = now() - (state.flow.ugcPlay ? state.flow.ugcPlay.startAt : now());
          if (it) {
            it.totalTime = (it.totalTime || 0) + tcost;
            if (choiceId === "A" || choiceId === "C") {
              it.finishes = (it.finishes || 0) + 1;
              if (choiceId === "C") it.shares = (it.shares || 0) + 1;
              const rs = it.rewards || [];
              for (let i = 0; i < rs.length; i++) {
                if (rs[i] === "hongdou") state.shards.hongdou += 1;
                if (rs[i] === "sugar") state.shards.sugar += 1;
                if (rs[i] === "hoofprint") state.shards.hoofprint += 1;

            } else {
              it.penalty = (it.penalty || 0) + 1;

          run.turns.push({ moduleId: "UGC", choiceId, seed: turn.shareCard.seed, ts: now() });
          state.stats.lastSeed = turn.shareCard.seed;

          saveState();
          return;
        }

        if (turn.moduleId === "A") {
          if (choiceId === "A") {
            state.shards.sugar += cur.sugar === "五分糖" ? 2 : 1;
            state.mirrorFracture = clamp(state.mirrorFracture - 1, 0, 9);
            state.stats.aRunSugar += 1;
            state.stats.aNoHalfPriceStreak = 0;
            state.stats.headwindCharge = clamp(state.stats.headwindCharge + 1, 0, 9);
            const leave = (cur.leaveText || "").trim();
            if (leave) {
              addEcho(leave, cur.sugar, turn.shareCard.seed);
              state.stats.aEchoGain += 1;
            }
            audioSfx("stamp");
          } else if (choiceId === "C") {
            const r = mulberry32(hash32(turn.shareCard.seed + "|rush|" + String(state.mirrorFracture)));
            const drift = r() < 0.55 ? -1 : 1;
            state.shards.sugar += 2;
            state.mirrorFracture = clamp(state.mirrorFracture + drift, 0, 9);
            res.heat = clamp((res.heat || 0) + 1, 0, 6);
            state.stats.aRunSugar += 1;
            state.stats.aNoHalfPriceStreak = 0;
            audioSfx("shutter");
          } else {
            state.mirrorFracture = clamp(state.mirrorFracture + 1, 0, 9);
            state.stats.aNoHalfPriceStreak += 1;
          }
          if (vid === "A_balance") {
            if (cur.sugar === "无糖") state.mirrorFracture = clamp(state.mirrorFracture + 1, 0, 9);
            if (cur.sugar === "五分糖") state.mirrorFracture = clamp(state.mirrorFracture - 1, 0, 9);
          }
          if (vid === "A_memory" && (cur.leaveText || "").trim() && (choiceId === "A" || choiceId === "C")) {
            state.shards.sugar += 1;
            res.heat = clamp((res.heat || 0) + 1, 0, 6);
          }
          if (state.flow.mode === "chapter" && state.flow.chapter) {
            const ch = state.flow.chapter;
            ch.flags = ch.flags || { a: 0, b: 0, c: 0 };
            ch.flags.a += choiceId === "A" ? 2 : 1;
          }
          drawerMeta("A").seen = true;
          gainDrawerXp("A", choiceId === "B" ? 1 : 2);
        }

        if (turn.moduleId === "B") {

          if (choiceId === "A") {

            state.mirrorFracture = clamp(state.mirrorFracture - (inkBoost ? 2 : 1), 0, 9);

            state.stats.bConsecutivePutBack = 0;
            audioSfx("stamp");
            unlockEnding(`send_${tone}`);
          } else if (choiceId === "B") {
            state.mirrorFracture = clamp(state.mirrorFracture + 1, 0, 9);
            state.stats.bConsecutivePutBack += 1;
            unlockEnding(`putback_${tone}`);
          } else {
            state.mirrorFracture = clamp(state.mirrorFracture - 1, 0, 9);
            state.stats.bConsecutivePutBack = 0;
            unlockEnding(`burn_${tone}`);
          }
          unlockNode("N4");
          if (state.stats.bConsecutivePutBack >= 3 && state.mirrorFracture >= 7) {
            state.flow.scene = "mirrorEgg";
            unlockNode("X1");
            unlockAchievement("ach_mirror");
            saveState();
            return;
          }
          if (state.flow.mode === "chapter" && state.flow.chapter) {
            const ch = state.flow.chapter;
            ch.flags = ch.flags || { a: 0, b: 0, c: 0 };
            ch.flags.b += choiceId === "A" ? 2 : choiceId === "B" ? 1 : 3;
            ch.flags.bLast = choiceId;
          }
          drawerMeta("B").seen = true;
          gainDrawerXp("B", choiceId === "B" ? 1 : 2);
        }

        if (turn.moduleId === "C") {
          if (choiceId === "A") {
            state.shards.hoofprint += 1;

            state.stats.cFailStreak = 0;

          } else if (choiceId === "C") {
            state.stats.fuel = clamp(state.stats.fuel + 2, 0, 9);

            audioSfx("stamp");
          } else {
            const r = mulberry32(hash32(turn.shareCard.seed + "|king|" + String(state.stats.headwindCharge) + "|" + String(state.shards.hoofprint)));
            let base = 0.3 + state.stats.headwindCharge * 0.08 + state.shards.hoofprint * 0.02 - state.mirrorFracture * 0.02;
            if (vid === "C_drift" && (res.focus || 0) > 0) {

            ch.flags = ch.flags || { a: 0, b: 0, c: 0 };
            ch.flags.c += choiceId === "A" ? 1 : 2;

          drawerMeta("C").seen = true;
          gainDrawerXp("C", choiceId === "A" ? 2 : 2);

        if (turn.objective && turn.objective.ok) {

          if (turn.objective.id === "obj_5" && choiceId === "A") state.shards.hongdou += 1;
          if (turn.objective.id === "obj_theme" && choiceId === "A") state.shards.hoofprint += 1;

        if (state.flow.mode === "chapter" && state.flow.chapter) {

        saveState();
      }

      function ugcRank(it) {
        const plays = Math.max(1, it.plays || 0);
        const finishRate = (it.finishes || 0) / plays;
        const shareRate = (it.shares || 0) / plays;
        const likeRate = (it.likes || 0) / plays;
        const replayRate = (it.replays || 0) / plays;
        const avgTime = (it.totalTime || 0) / plays;
        const avgTimeN = clamp(avgTime / 90000, 0, 1);
        const penalty = clamp((it.penalty || 0) / 10, 0, 1);
        const crashRate = clamp((it.crashes || 0) / plays, 0, 1);
        const dupRate = clamp(it.dupRate || 0, 0, 1);
        const base = 0.35 * finishRate + 0.25 * shareRate + 0.2 * likeRate + 0.1 * replayRate + 0.1 * avgTimeN;
        it.finishRate = finishRate;
        it.shareRate = shareRate;
        it.likeRate = likeRate;
        it.rankScore = base * (1 - penalty) * (1 - crashRate) * (1 - dupRate);
      }
      function ugcDefaultDraft() {
        return { id: genId("u"), tpl: "roast", title: "无题关卡", opening: "23:59，灯还亮着。", twist: "镜子问：你快乐吗。", branch: "裂纹把问题改成：你真的要继续吗。", gate: "fracture", gateValue: 7, choiceCount: 2, rewards: ["hongdou"], bgm: "A", tags: ["UGC", state.weekThemeKey], createdAt: now(), plays: 0, finishes: 0, likes: 0, shares: 0, replays: 0, totalTime: 0, penalty: 0, crashes: 0, dupRate: 0 };

        const raw = JSON.stringify({ v: 2, id: it.id, tpl: it.tpl, title: it.title, opening: it.opening, twist: it.twist, branch: it.branch, gate: it.gate, gateValue: it.gateValue, choiceCount: it.choiceCount, rewards: it.rewards, bgm: it.bgm, tags: it.tags });
        const b = btoa(unescape(encodeURIComponent(raw))).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
        return "UGC1:" + b;
      }
      function ugcImport(text) {
        const t = (text || "").trim();
        if (!t.startsWith("UGC1:")) return null;
        const b = t.slice(5).replace(/-/g, "+").replace(/_/g, "/");
        const pad = b.length % 4 ? "=".repeat(4 - (b.length % 4)) : "";
        const raw = decodeURIComponent(escape(atob(b + pad)));
        const obj = safeParse(raw, null);
        if (!obj || (obj.v !== 1 && obj.v !== 2)) return null;
        const it = ugcDefaultDraft();
        it.id = obj.id || it.id;
        it.tpl = obj.tpl || it.tpl;
        it.title = obj.title || it.title;
        it.opening = obj.opening || it.opening;
        it.twist = obj.twist || it.twist;
        it.branch = obj.branch || it.branch;
        it.gate = obj.gate || it.gate;
        it.gateValue = typeof obj.gateValue === "number" ? obj.gateValue : it.gateValue;
        it.choiceCount = obj.choiceCount === 3 ? 3 : 2;
        it.rewards = Array.isArray(obj.rewards) ? obj.rewards.slice(0, 2) : it.rewards;
        it.bgm = obj.bgm || it.bgm;
        it.tags = Array.isArray(obj.tags) ? obj.tags.slice(0, 6) : it.tags;
        return it;
      }

        const w = mapFx && mapFx.weather ? mapFx.weather : "clear";

        if (w === "storm" && elemId === "electro") return 1.12;

        if (w === "fog" && elemId === "dark") return 1.10;
        return 1;
      }

      function drawBattle() {
        const b = state.flow.battle;
        const ch = state.flow.challenge;
        if (!b) {
          openChallengeHome();
          return;
        }
        const pad = 14;
        const top = insetTop;
        const w = aw - pad * 2;
        const h = ah - top - insetBottom;

        drawDrawerBg({ bgKey, bgFrom: bgKey, bgT0: t }, pad, top, w, h);
        drawHorrorFX(0.12 + state.mirrorFracture * 0.02, "battle|" + String(b.startedAt));

        const weather = b.mapFx && b.mapFx.weather ? b.mapFx.weather : "clear";
        const part = b.mapFx && b.mapFx.part ? b.mapFx.part : vn2DayPart();
        ctx.fillStyle = "rgba(255,255,255,0.88)";
        ctx.font = `900 ${Math.round(14 * uiScale)}px ${fontSans}`;
        ctx.fillText(`挑战战斗 · ${map.name}`, x + 14, top + 38);
        ctx.fillStyle = "rgba(255,255,255,0.62)";
        ctx.font = `${Math.round(12 * uiScale)}px ${fontSans}`;
        ctx.fillText(`${part === "morning" ? "清晨" : part === "afternoon" ? "下午" : "夜晚"} · 天气 ${weather}`, x + 14, top + 60);

        if (!b.lastTickAt) b.lastTickAt = t;
        const dt = clamp((t - b.lastTickAt) / 1000, 0, 0.05);
        b.lastTickAt = t;
        b.status = b.status && typeof b.status === "object" ? b.status : { enemy: {}, player: {} };
        b.status.enemy = b.status.enemy && typeof b.status.enemy === "object" ? b.status.enemy : {};
        b.status.player = b.status.player && typeof b.status.player === "object" ? b.status.player : {};

        const es = equipStats();
        const comboWindow = 1.2 + ((state.stats.modeLast && state.stats.modeLast.A && state.stats.modeLast.A.best) || 0) * 0.02 + skillStat("comboWin") + (es.comboWin || 0);
        if (b.combo && b.combo.lastAt && t - b.combo.lastAt > comboWindow * 1000) {
          b.combo.n = 0;
          b.combo.mult = 1;
        }
        if (!b.enemyNextAt) b.enemyNextAt = t + 1400;
        if (!b.endedAt && t >= b.enemyNextAt) {
          const slow = b.status.enemy.slowUntil && t < b.status.enemy.slowUntil ? 1 : 0;
          b.enemyNextAt = t + Math.round(1800 * (slow ? 1.35 : 1));
          let dmg = b.enemy.atk;
          dmg = Math.max(1, dmg - skillStat("drFlat") - (es.drFlat || 0));
          if (b.player.shield > 0) {
            const block = Math.min(b.player.shield, dmg);
            b.player.shield -= block;
            dmg -= block;
          }
          if (dmg > 0) b.player.hp = clamp(b.player.hp - dmg, 0, b.player.hpMax);
          track("battle_hit", { dmg });
          if (b.player.hp <= 0) {
            b.endedAt = now();
            b.win = false;
            track("battle_death", { mapId: b.mapId, step: ch ? ch.step : 0, durMs: now() - (b.startedAt || now()) });
            track("battle_end", { win: 0 });
          }
          saveState();
        }

        if (!b.endedAt) {
          const dotKeys = ["burn", "shock"];
          for (let i = 0; i < dotKeys.length; i++) {
            const k = dotKeys[i];
            const st = b.status.enemy[k];
            if (!st) continue;
            if (st.ticksLeft <= 0 || (st.until && t > st.until)) {
              delete b.status.enemy[k];
              continue;
            }
            if (!st.nextAt) st.nextAt = t + 700;
            if (t >= st.nextAt) {
              st.nextAt = t + 900;
              st.ticksLeft -= 1;
              const d = Math.max(1, Math.round(st.dmg || 2));
              b.enemy.hp = clamp(b.enemy.hp - d, 0, b.enemy.hpMax);
              track("battle_dot", { id: k, dmg: d });
              if (b.enemy.hp <= 0) {
                b.endedAt = now();
                b.win = true;
                track("battle_end", { win: 1, via: "dot" });
              }
              saveState();
            }
          }
        }

        const enemyHpP = clamp(b.enemy.hp / b.enemy.hpMax, 0, 1);
        rrPath(x + 14, top + 78, innerW - 28, 14, 999);
        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.fill();
        rrPath(x + 14, top + 78, (innerW - 28) * enemyHpP, 14, 999);
        ctx.fillStyle = "rgba(255,77,109,0.55)";
        ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,0.86)";
        ctx.font = `800 ${Math.round(12 * uiScale)}px ${fontSans}`;
        ctx.fillText(`${b.enemy.name}  ${Math.ceil(b.enemy.hp)}/${b.enemy.hpMax}`, x + 14, top + 112);
        {
          const tags = [];
          if (b.status.enemy.brittleUntil && t < b.status.enemy.brittleUntil) tags.push("易碎");
          if (b.status.enemy.slowUntil && t < b.status.enemy.slowUntil) tags.push("泥泞");
          if (b.status.enemy.burn && b.status.enemy.burn.ticksLeft > 0) tags.push("灼烧");
          if (b.status.enemy.shock && b.status.enemy.shock.ticksLeft > 0) tags.push("感电");
          if (tags.length) {
            ctx.fillStyle = "rgba(255,255,255,0.52)";

            ctx.fillText(tags.join(" · "), x + 14, top + 132);

        }

        const hpP = clamp(b.player.hp / b.player.hpMax, 0, 1);
        rrPath(x + 14, top + 122, innerW - 28, 12, 999);
        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.fill();
        rrPath(x + 14, top + 122, (innerW - 28) * hpP, 12, 999);
        ctx.fillStyle = "rgba(34,211,238,0.45)";
        ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,0.62)";
        ctx.fillText(`你  ${Math.ceil(b.player.hp)}/${b.player.hpMax}  护盾 ${Math.ceil(b.player.shield)}`, x + 14, top + 150);

        ctx.fillStyle = "rgba(255,255,255,0.70)";
        ctx.fillText(`连击 x${b.combo.mult.toFixed(1)}  (${b.combo.n || 0})`, x + innerW - 150, top + 150);

        const gridY = top + 168;
        const gridH = innerH - 330;
        rrPath(x + 14, gridY, innerW - 28, gridH, 18);
        ctx.fillStyle = "rgba(0,0,0,0.18)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.10)";
        ctx.stroke();
        ctx.fillStyle = "rgba(255,255,255,0.62)";
        ctx.font = `${Math.round(12 * uiScale)}px ${fontSans}`;
        wrapText("提示：连续点击维持连击；切换元素触发反应。\n夜晚的“暗/光”更容易爆发，雨天“水/电”更强。", x + 26, gridY + 28, innerW - 52, Math.round(18 * uiScale), "rgba(255,255,255,0.62)");

        const btnY = top + innerH - 144;
        const bw = (innerW - 28 - 14) / 2;
        btn("battleAtk", x + 14, btnY, bw, 56, "攻击", "primary", () => {
          if (b.endedAt) return;
          const elem = b.elemPick || "fire";
          const base = 8;
          const wmul = battleWeatherMult(b.mapFx, elem);
          const inCombo = b.combo.lastAt && t - b.combo.lastAt < 1200;
          if (inCombo) b.combo.n = (b.combo.n || 0) + 1;
          else b.combo.n = 1;
          b.combo.lastAt = t;
          b.combo.mult = clamp(1 + Math.floor(b.combo.n / 5) * 0.2, 1, 2.2 + skillStat("comboCap"));
          let dmg = base * b.combo.mult * wmul * (1 + skillStat("dmg") + (es.dmg || 0));
          const pair = b.lastElem ? `${b.lastElem}+${elem}` : "";
          const rx = pair && REACTIONS[pair] ? REACTIONS[pair] : null;
          if (rx) {
            dmg *= rx.dmg * (1 + skillStat("rxDmg"));
            if (b.status.enemy.brittleUntil && t < b.status.enemy.brittleUntil) dmg *= 1.15;
            b.log.unshift({ t: now(), text: `反应：${rx.name}` });
            if (rx.fx) audioSfx(rx.fx === "shake" ? "important" : rx.fx === "flash" ? "shutter" : "ui");
            if (rx.dot) {
              const id = rx.id === "burn" ? "burn" : rx.id === "shock" ? "shock" : rx.id;
              const per = Math.max(1, Math.round(base * 0.22 * b.combo.mult));
              b.status.enemy[id] = { ticksLeft: rx.dot, dmg: per, nextAt: now() + 700, until: now() + 900 * (rx.dot + 1) };
            }
            if (rx.debuff === "brittle") b.status.enemy.brittleUntil = now() + 4200;
            if (rx.slow) b.status.enemy.slowUntil = now() + 4200;
            if (rx.heal) b.player.hp = clamp(b.player.hp + rx.heal, 0, b.player.hpMax);
          } else {
            audioSfx("click");
          }
          if (elem === "earth" || elem === "metal") b.player.shield = clamp((b.player.shield || 0) + 6 + skillStat("shieldPlus"), 0, 24);
          if (elem === "wood") b.player.hp = clamp(b.player.hp + (2 + skillStat("healFlat")) * (1 + skillStat("healMult")), 0, b.player.hpMax);
          b.enemy.hp = clamp(b.enemy.hp - dmg, 0, b.enemy.hpMax);
          b.lastElem = elem;
          track("battle_attack", { elem, dmg: Math.round(dmg), combo: b.combo.n });
          if (b.enemy.hp <= 0) {
            b.endedAt = now();
            b.win = true;
            track("battle_end", { win: 1 });
            state.skills.points = (state.skills.points || 0) + 1;
            const loot = rollItem(String(ch ? ch.seed : now()) + "|loot|" + String(b.endedAt));
            invAddItem(loot);
            if (ch) {
              const bonus = Math.round((200 + Math.round(b.combo.n * 6) + Math.round((b.player.hp / b.player.hpMax) * 120)) * (1 + skillStat("score")));

              ch.step += 1;

              const m = mapById(ch.mapId);
              const canHidden = m && m.hiddenCond ? vn2EvalCond(m.hiddenCond) : false;
              if (!ch.hiddenTaken && canHidden) {
                ch.hiddenTaken = 1;

                invAddItem(rollItem(String(ch.seed) + "|hiddenloot|" + String(b.endedAt)));
                track("map_hidden", { mapId: ch.mapId });
              }
              saveState();
              if (ch.kind === "daily" && ch.step >= 3) ch.endedAt = now();
              if (ch.kind === "weekly" && ch.step >= 5) ch.endedAt = now();
            }
          }
          saveState();
        });
        btn("battleElem", x + 28 + bw, btnY, bw, 56, `元素：${(ELEMENTS.find((e) => e.id === (b.elemPick || "")) || ELEMENTS[0]).name}`, "ghost", () => {

        const rowY = top + innerH - 210;

        for (let i = 0; i < ELEMENTS.length; i++) {

          ctx.fillStyle = sel ? e0.c.replace("0.85", "0.22").replace("0.90", "0.22").replace("0.92", "0.22").replace("0.70", "0.22") : "rgba(255,255,255,0.06)";

      function puzzleNode(def, id) {
        const ns = def.graph.nodes;
        for (let i = 0; i < ns.length; i++) if (ns[i].id === id) return ns[i];
        return ns[0];
      }

      function puzzleEdgeActive(def, rt, e, rot, lift, key) {
        if (e.rot && !e.rot.includes(rot)) return false;
        if (typeof e.lift === "number" && e.lift !== lift) return false;
        if (e.gate && !(key && key[e.gate])) return false;
        return true;
      }

      function puzzleAdj(def, rot, lift, key) {
        const m = {};
        const es = def.graph.edges;
        for (let i = 0; i < es.length; i++) {
          const e = es[i];
          if (!puzzleEdgeActive(def, null, e, rot, lift, key)) continue;
          m[e.a] = m[e.a] || [];
          m[e.b] = m[e.b] || [];
          m[e.a].push({ to: e.b, illusion: !!e.illusion });
          m[e.b].push({ to: e.a, illusion: !!e.illusion });
        }
        return m;
      }

      function isoProject(x, y, z, rot) {
        let xx = x;
        let yy = y;
        if (rot === 1) {
          xx = y;
          yy = -x;
        } else if (rot === 2) {
          xx = -x;
          yy = -y;
        } else if (rot === 3) {
          xx = -y;
          yy = x;
        }
        const sx = (xx - yy) * 0.866;
        const sy = (xx + yy) * 0.5 - z * 0.9;
        return { sx, sy };
      }

      function drawPuzzle() {
        const rt = state.flow.puzzle;
        if (!rt) {
          gotoHub();
          return;
        }
        const def = puzzleDef(rt.id);
        const pad = 14;
        const top = insetTop;
        const w = aw - pad * 2;
        const h = ah - top - insetBottom;
        const x0 = pad + 14;
        const y0 = top + 14;
        const innerW = w - 28;
        const innerH = h - 28;
        rrPath(pad, top, w, h, 18);
        ctx.fillStyle = "rgba(255,255,255,0.03)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.10)";
        ctx.stroke();

        const t = now();
        const cam = rt.cam;
        cam.x = lerp(cam.x, cam.tx, 0.08);
        cam.y = lerp(cam.y, cam.ty, 0.08);
        cam.zoom = lerp(cam.zoom, cam.tz, 0.08);

        const centerX = x0 + innerW * 0.50;
        const centerY = y0 + innerH * 0.52;
        const unit = Math.min(innerW, innerH) * 0.16 * cam.zoom;

        const bgKey = def.id === "p1" ? "corridor" : def.id === "p2" ? "corridor" : def.id === "p3" ? "corridor" : "mirror_council";
        drawDrawerBg({ bgKey, bgFrom: bgKey, bgT0: t }, pad, top, w, h);
        drawHorrorFX(0.12 + state.mirrorFracture * 0.02, def.id + "|" + rt.rot + "|" + rt.player);

        const nodes = def.graph.nodes;
        const edges = def.graph.edges;
        const adj = puzzleAdj(def, rt.rot, rt.lift, rt.key);

        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.translate(-cam.x * unit, -cam.y * unit);

        for (let i = 0; i < edges.length; i++) {
          const e = edges[i];
          if (!puzzleEdgeActive(def, rt, e, rt.rot, rt.lift, rt.key)) continue;
          const a = puzzleNode(def, e.a);
          const b = puzzleNode(def, e.b);
          const pa = isoProject(a.x, a.y, a.z + (a.kind === "platform" ? rt.lift : 0), rt.rot);
          const pb = isoProject(b.x, b.y, b.z + (b.kind === "platform" ? rt.lift : 0), rt.rot);
          ctx.beginPath();
          ctx.moveTo(pa.sx * unit, pa.sy * unit);
          ctx.lineTo(pb.sx * unit, pb.sy * unit);
          ctx.strokeStyle = e.illusion ? "rgba(255,214,255,0.28)" : "rgba(255,255,255,0.20)";
          ctx.lineWidth = e.illusion ? 3 : 4;
          ctx.stroke();
        }

        const mx = ui.mx;
        const my = ui.my;
        let hoverNode = null;
        for (let i = 0; i < nodes.length; i++) {
          const n = nodes[i];
          const z = n.z + (n.kind === "platform" ? rt.lift : 0);
          const p = isoProject(n.x, n.y, z, rt.rot);
          const sx = centerX + p.sx * unit - cam.x * unit;
          const sy = centerY + p.sy * unit - cam.y * unit;
          const r = 18;
          if (Math.abs(mx - sx) + Math.abs(my - sy) < r * 1.6) hoverNode = n;
        }

        for (let i = 0; i < nodes.length; i++) {
          const n = nodes[i];
          const z = n.z + (n.kind === "platform" ? rt.lift : 0);
          const p = isoProject(n.x, n.y, z, rt.rot);
          const sx = p.sx * unit;
          const sy = p.sy * unit;
          const isPlayer = rt.player === n.id;
          const isGoal = n.kind === "goal";
          const reachable = !!(adj[rt.player] && adj[rt.player].some((x) => x.to === n.id));
          const on = hoverNode && hoverNode.id === n.id;
          ctx.beginPath();
          ctx.arc(sx, sy, isPlayer ? 16 : 12, 0, Math.PI * 2);
          let fill = "rgba(255,255,255,0.10)";
          if (n.kind === "key") fill = "rgba(34,211,238,0.16)";
          if (isGoal) fill = "rgba(139,92,246,0.18)";
          if (reachable) fill = "rgba(250,204,21,0.14)";
          if (isPlayer) fill = "rgba(255,255,255,0.22)";
          ctx.fillStyle = fill;
          ctx.fill();
          ctx.strokeStyle = on ? "rgba(255,255,255,0.55)" : reachable ? "rgba(250,204,21,0.45)" : "rgba(255,255,255,0.16)";
          ctx.lineWidth = on ? 3 : 2;
          ctx.stroke();
          if (n.shape === "triangle") {
            ctx.beginPath();
            ctx.moveTo(sx, sy - 8);
            ctx.lineTo(sx - 7, sy + 6);
            ctx.lineTo(sx + 7, sy + 6);
            ctx.closePath();
            ctx.strokeStyle = "rgba(255,255,255,0.28)";
            ctx.stroke();
          }
          hot(
            `pz_${n.id}`,
            centerX + sx - cam.x * unit - 22,
            centerY + sy - cam.y * unit - 22,
            44,
            44,
            () => {
              if (rt.phase === "intro") {
                rt.phase = "play";
                rt.firstTap = now();
                rt.startedAt = now();
                saveState();
              }
              if (rt.moving) return;
              if (!reachable) {
                rt.showPanel = true;
                if (!rt.startedAt) rt.startedAt = now();
                saveState();
                audioSfx("ui");
                return;
              }
              rt.moving = { from: rt.player, to: n.id, t0: now(), dur: 280 };
              audioSfx("ui");
              if (navigator.vibrate) navigator.vibrate(10);
              saveState();
            }
          );
        }

        if (rt.moving) {
          const mv = rt.moving;
          const k = easeOutCubic((t - mv.t0) / mv.dur);
          if (k >= 1) {
            rt.player = mv.to;
            rt.moving = null;
            const nn = puzzleNode(def, rt.player);
            if (nn.kind === "key" && nn.color) rt.key[nn.color] = true;
            if (nn.kind === "goal") {
              rt.solvedAt = now();
              state.puzzle.progress[def.id] = { cleared: true, ts: now() };
              if (def.id === "p1") state.puzzle.unlocked.p2 = true;
              if (def.id === "p2") state.puzzle.unlocked.p3 = true;
              const dur = rt.solvedAt - rt.startedAt;
              state.puzzle.stats[def.id].clears += 1;
              state.puzzle.stats[def.id].totalTimeMs += dur;
              state.puzzle.stats[def.id].hintClicks += rt.hints;
              track("puzzle_clear", { id: def.id, durMs: dur, hints: rt.hints });
              saveState();
            }
          }
        }

        ctx.restore();

        if (rt.phase === "intro") {
          if (!rt.introOnce) {
            rt.introOnce = 1;
            audioSfx("whisper");
            if (navigator.vibrate) navigator.vibrate(8);
            saveState();
          }
          const p = clamp((t - rt.introAt) / 2600, 0, 1);
          const k = easeOutQuint(p);
          rt.cam.tx = lerp(def.graph.cam.x + 0.4, def.graph.cam.x, k);
          rt.cam.ty = lerp(def.graph.cam.y - 0.25, def.graph.cam.y, k);
          rt.cam.tz = lerp(1.25, 1.05, k);
          ctx.save();
          ctx.globalCompositeOperation = "multiply";
          ctx.fillStyle = "rgba(0,0,0,0.30)";
          ctx.fillRect(0, 0, aw, ah);
          ctx.restore();
          hot("pzIntroTap", 0, 0, aw, ah, () => {
            rt.phase = "play";
            rt.firstTap = now();
            rt.showPanel = true;
            rt.startedAt = now();
            saveState();
          });
          return;
        }

        if (rt.solvedAt) {
          const dur = rt.solvedAt - rt.startedAt;
          ctx.fillStyle = "rgba(0,0,0,0.55)";
          ctx.fillRect(0, 0, aw, ah);
          const cardW = Math.min(innerW, 520);
          const cardH = 260;
          const cx = x0 + (innerW - cardW) / 2;
          const cy = y0 + (innerH - cardH) / 2;
          rrPath(cx, cy, cardW, cardH, 18);
          ctx.fillStyle = "rgba(255,255,255,0.06)";
          ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,0.14)";
          ctx.stroke();
          ctx.fillStyle = "rgba(255,255,255,0.92)";
          ctx.font = `800 ${Math.round(16 * uiScale)}px ${fontSans}`;
          ctx.fillText("通关！", cx + 14, cy + 30);
          ctx.fillStyle = "rgba(255,255,255,0.72)";
          ctx.font = `${Math.round(12 * uiScale)}px ${fontSans}`;
          ctx.fillText(`${def.name} · 用时 ${(dur / 1000).toFixed(1)}s · 提示 ${rt.hints} 次`, cx + 14, cy + 54);
          const st = state.puzzle.stats[def.id];
          const rate = st.plays ? Math.round((st.clears / st.plays) * 100) : 0;
          const avg = st.clears ? Math.round(st.totalTimeMs / st.clears / 1000) : 0;
          const hintRate = st.plays ? Math.round((st.hintClicks / st.plays) * 100) : 0;
          wrapText(`指标（本机存档统计）\n· 首次通关率：${rate}%（目标≥60%）\n· 平均解谜：${avg}s（目标90~180s）\n· 提示点击率：${hintRate}%（目标≤30%）`, cx + 14, cy + 82, cardW - 28, Math.round(18 * uiScale), "rgba(255,255,255,0.72)");
          btn("pzNext", cx + 14, cy + cardH - 70, (cardW - 42) / 2, 56, "下一关", "primary", () => {
            const next = def.id === "p1" ? "p2" : def.id === "p2" ? "p3" : "p1";
            if (!state.puzzle.unlocked[next]) {
              toast("下一关未解锁");
              return;
            }
            startPuzzle(next);
          });
          btn("pzBack", cx + 28 + (cardW - 42) / 2, cy + cardH - 70, (cardW - 42) / 2, 56, "返回抽屉", "ghost", () => {
            state.flow.puzzle = null;
            gotoHub();
          });
          return;
        }

        if (rt.showPanel) {
          ctx.fillStyle = "rgba(0,0,0,0.35)";
          ctx.fillRect(0, 0, aw, ah);
          const panelW = Math.min(innerW, 560);
          const panelH = 170;
          const px = x0 + (innerW - panelW) / 2;
          const py = y0 + innerH - panelH - 10;
          rrPath(px, py, panelW, panelH, 18);
          ctx.fillStyle = "rgba(0,0,0,0.38)";
          ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,0.16)";
          ctx.stroke();
          ctx.fillStyle = "rgba(255,255,255,0.90)";
          ctx.font = `800 ${Math.round(14 * uiScale)}px ${fontSans}`;
          ctx.fillText(def.name, px + 14, py + 28);
          ctx.fillStyle = "rgba(255,255,255,0.66)";
          ctx.font = `${Math.round(12 * uiScale)}px ${fontSans}`;
          ctx.fillText(def.goal, px + 14, py + 50);

          const bw = (panelW - 56) / 3;
          btn("pzRotL", px + 14, py + 64, bw, 56, "左旋", "primary", () => {
            rt.rot = (rt.rot + 3) % 4;
            addRipple(px + 14 + bw * 0.5, py + 92, "rgba(34,211,238,0.18)");
            audioSfx("whisper");
            saveState();
          });
          btn("pzRotR", px + 28 + bw, py + 64, bw, 56, "右旋", "primary", () => {
            rt.rot = (rt.rot + 1) % 4;
            addRipple(px + 28 + bw + bw * 0.5, py + 92, "rgba(34,211,238,0.18)");
            audioSfx("whisper");
            saveState();
          });
          if (def.mech.lift) {
            btn("pzLift", px + 42 + bw * 2, py + 64, bw, 56, rt.lift ? "降下" : "升起", "ghost", () => {
              rt.lift = rt.lift ? 0 : 1;
              audioSfx("stamp");
              if (navigator.vibrate) navigator.vibrate(14);
              saveState();
            });
          } else {
            btn("pzLift", px + 42 + bw * 2, py + 64, bw, 56, "升降", "ghost", () => toast("本关不需要升降"));
          }
          btn("pzHint", px + 14, py + 124, bw, 40, "提示", "ghost", () => {
            rt.hintAt = now();
            rt.hints += 1;
            track("puzzle_hint", { id: def.id, n: rt.hints });
            saveState();
          });
          btn("pzExit", px + 28 + bw, py + 124, bw, 40, "退出", "ghost", () => {
            state.flow.puzzle = null;
            gotoHub();
          });
          btn("pzHide", px + 42 + bw * 2, py + 124, bw, 40, "收起", "ghost", () => {
            rt.showPanel = false;
            saveState();
          });

          if (rt.hintAt && now() - rt.hintAt < 1800) {
            ctx.fillStyle = "rgba(250,204,21,0.22)";
            ctx.font = `${Math.round(12 * uiScale)}px ${fontSans}`;
            ctx.fillText("提示：先试试旋转，让亮色边连接到终点。", px + 14, py - 10);
          }
        } else {
          ctx.fillStyle = "rgba(255,255,255,0.62)";
          ctx.font = `${Math.round(12 * uiScale)}px ${fontSans}`;
          ctx.fillText("点可达节点移动；需要旋转/升降时点右下角面板", x0, y0 + innerH - 14);
          btn("pzShowBtn", x0 + innerW - 128, y0 + innerH - 56, 114, 42, "面板", "primary", () => {
            rt.showPanel = true;
            if (!rt.startedAt) rt.startedAt = now();
            saveState();
          });
        }
      }

      function drawHub() {
        const pad = 14;
        const top = insetTop;
        const w = aw - pad * 2;
        const h = ah - top - insetBottom;
        const x = pad + 14;
        const innerW = w - 28;

        state.flow.drawer = state.flow.drawer || { focus: -1, stage: "idle", t0: 0, dur: 650, moduleId: "A", talk: null, bgKey: "desk_rain", bgFrom: "desk_rain", bgT0: 0 };
        const d = state.flow.drawer;
        const t = now();
        const p = d.stage === "opening" ? easeOutBack((t - d.t0) / d.dur) : d.stage === "closing" ? 1 - easeOutCubic((t - d.t0) / d.dur) : d.stage === "open" ? 1 : 0;
        if (d.stage === "opening" && t - d.t0 >= d.dur) {
          d.stage = "open";
          d.talk = null;
          d.bgFrom = d.bgKey;
          d.bgT0 = t;
          saveState();
        }
        if (d.stage === "closing" && t - d.t0 >= d.dur) {
          d.stage = "idle";
          d.focus = -1;
          d.talk = null;
          saveState();
        }

        rrPath(pad, top, w, h, 18);
        ctx.fillStyle = "rgba(255,255,255,0.03)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.10)";
        ctx.stroke();

        drawDrawerBg(d, pad, top, w, h);

        if (d.stage === "idle") {
          ctx.fillStyle = "rgba(255,255,255,0.82)";
          ctx.font = `800 ${Math.round(14 * uiScale)}px ${fontSans}`;
          ctx.fillText("23:59 的赛博抽屉", x, top + 30);
          ctx.fillStyle = "rgba(255,255,255,0.62)";
          ctx.font = `${Math.round(12 * uiScale)}px ${fontSans}`;
          const hint = "点击抽屉抽出 · 单手友好 · 进入后可Run/Chapter/UGC";
          ctx.fillText(hint, x, top + 52);
          hot("hubHint", x - 6, top + 38, innerW, 22, () => {
            state.flow.scene = "help";
            saveState();
          });
        }

        const trayH = Math.min(560, h - 210);
        const trayY = top + 74;
        const dw = Math.min(innerW, 520);
        const dx = x + (innerW - dw) / 2;
        const dh = Math.floor(trayH / 3) - 12;
        const gap = 16;

        const items = [
          { moduleId: "A", title: "猫的地下酒吧", tag: "治愈/回流" },
          { moduleId: "B", title: "未寄出的信", tag: "叙事/分支" },
          { moduleId: "C", title: "工位逃亡录", tag: "爽感/挑战" },
        ];

        for (let i = 0; i < 3; i++) {
          const r = { x: dx, y: trayY + i * (dh + gap), w: dw, h: dh };
          const isFocus = d.focus === i;
          const z = d.stage === "idle" ? 0 : isFocus ? lerp(0, 0.30, p) : lerp(0, -0.10, p);
          const blur = d.stage !== "idle" && !isFocus ? 0.16 : 0;
          drawDrawerCard(r, z, blur, items[i], isFocus);
          if (d.stage === "idle") {
            hot(`drawerPick${i}`, r.x, r.y, r.w, r.h, () => {
              if (navigator.vibrate) navigator.vibrate(16);
              addRipple(r.x + r.w * 0.78, r.y + r.h * 0.52, "rgba(34,211,238,0.20)");
              d.focus = i;
              d.stage = "opening";
              d.t0 = now();
              d.dur = 650;
              d.moduleId = items[i].moduleId;
              d.bgFrom = d.bgKey;
              d.bgKey = items[i].moduleId === "A" ? "bar" : items[i].moduleId === "B" ? "letter" : "road";
              d.bgT0 = now();
              saveState();
              audioBgm(items[i].moduleId);
            });
          }
        }

        if (d.stage === "idle") {
          const quickY = trayY + trayH + 18;
          btn("drawerChapter", dx, quickY, dw, 56, "章节剧情（15min+）", "primary", () => startChapter());
          btn("drawerPuzzle", dx, quickY + 70, dw, 56, "解谜关卡（镜面建筑）", "primary", () => {
            startPuzzle("p1");
          });
          btn("drawerDaily", dx, quickY + 140, dw, 56, "每日/每周挑战（战斗+掉落）", "primary", () => openChallengeHome());
          btn("drawerUGC", dx, quickY + 210, dw, 56, "UGC创意工坊", "ghost", () => {
            state.flow.scene = "ugcFeed";
            state.flow.ugcDraft = ugcDefaultDraft();
            saveState();
          });
          btn("drawerTree", dx, quickY + 280, dw, 56, "章节树/收藏册", "ghost", () => {
            state.flow.scene = "chapterTree";
            saveState();
          });
          btn("drawerSettings", dx, quickY + 350, dw, 56, "设置", "ghost", () => {
            state.flow.scene = "settings";
            saveState();
          });
          btn("drawerAch", dx, quickY + 420, dw, 56, "成就", "ghost", () => {
            state.flow.scene = "achievements";
            saveState();
          });
        }

        if (d.stage !== "idle") {
          ctx.fillStyle = "rgba(0,0,0,0.55)";
          ctx.fillRect(0, 0, aw, ah);
          hot("hubMask", 0, 0, aw, ah, () => {}, () => {});
        }
        if (d.stage === "open") drawDrawerOpenOverlay(d, pad, top, w, h);
      }

      function drawDrawerBg(d, pad, top, w, h) {
        const t = now();
        const mix = clamp((t - (d.bgT0 || t)) / 600, 0, 1);
        const a = drawerBgColors(d.bgFrom || d.bgKey);
        const b = drawerBgColors(d.bgKey);
        const g = ctx.createLinearGradient(0, top, 0, top + h);
        g.addColorStop(0, mixColor(a[0], b[0], mix));
        g.addColorStop(0.42, mixColor(a[1], b[1], mix));
        g.addColorStop(0.72, mixColor(a[2], b[2], mix));
        g.addColorStop(1, mixColor(a[3], b[3], mix));
        rrPath(pad, top, w, h, 18);
        ctx.fillStyle = g;
        ctx.fill();
        const n = state.settings.perfMode ? 14 : 26;
        for (let i = 0; i < n; i++) {
          const r = 28 + (i % 7) * 10;
          const x = pad + 24 + ((i * 67 + (t / 18) * 0.8) % (w - 48));
          const y = top + 40 + (((i * 109 + (t / 30) * 0.6) % (h - 80)) | 0);
          const gg = ctx.createRadialGradient(x, y, 0, x, y, r);
          gg.addColorStop(0, "rgba(255,255,255,0.045)");
          gg.addColorStop(1, "rgba(255,255,255,0)");
          ctx.fillStyle = gg;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fill();
        }

        drawStoryMirror3D(pad, top, w, h);
      }

      function drawStoryMirror3D(pad, top, w, h) {
        const mx = clamp((ui.mx - (pad + 14)) / Math.max(1, w - 28), 0, 1);
        const my = clamp((ui.my - (top + 14)) / Math.max(1, h - 28), 0, 1);
        const tx = (mx - 0.5) * 2;
        const ty = (my - 0.5) * 2;
        const cx = pad + w * 0.82;
        const cy = top + h * 0.30;
        const ww = Math.min(220, w * 0.34);
        const hh = ww * 1.25;
        const tilt = 10;
        const dx = tx * tilt;
        const dy = ty * tilt;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate((tx * 0.08 - ty * 0.04));
        const x = -ww / 2;
        const y = -hh / 2;
        rrPath(x, y, ww, hh, 18);
        ctx.fillStyle = "rgba(0,0,0,0.18)";
        ctx.shadowColor = "rgba(0,0,0,0.45)";
        ctx.shadowBlur = state.settings.perfMode ? 16 : 26;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = "rgba(255,255,255,0.14)";
        ctx.stroke();
        rrPath(x + 10, y + 10, ww - 20, hh - 20, 14);
        const g = ctx.createLinearGradient(x, y, x + ww, y + hh);
        g.addColorStop(0, "rgba(34,211,238,0.10)");
        g.addColorStop(0.5, "rgba(255,255,255,0.04)");
        g.addColorStop(1, "rgba(139,92,246,0.10)");
        ctx.fillStyle = g;
        ctx.fill();

        ctx.save();
        ctx.globalCompositeOperation = "screen";
        const hl = ctx.createLinearGradient(x + dx, y + dy, x + ww + dx, y + hh + dy);
        hl.addColorStop(0, "rgba(255,255,255,0)");
        hl.addColorStop(0.5, "rgba(255,255,255,0.16)");
        hl.addColorStop(1, "rgba(255,255,255,0)");
        rrPath(x + 10, y + 10, ww - 20, hh - 20, 14);
        ctx.fillStyle = hl;
        ctx.fill();
        ctx.restore();

        ctx.fillStyle = "rgba(255,255,255,0.62)";
        ctx.font = `800 ${Math.round(12 * uiScale)}px ${fontSans}`;
        const t = "镜面";
        const tw = ctx.measureText(t).width;
        ctx.fillText(t, -tw / 2, hh / 2 + 18);
        ctx.restore();
      }

      function drawerBgColors(key) {
        if (key === "bar") return ["#06121a", "#0b1d24", "#0b0f1c", "#07090f"];
        if (key === "letter") return ["#17120a", "#1b1420", "#0b0f1c", "#07090f"];
        if (key === "road") return ["#0b0a18", "#121a30", "#1a0f2a", "#07090f"];
        if (key === "mirror_council") return ["#04050a", "#121a30", "#1a0f2a", "#07090f"];
        if (key === "corridor") return ["#03040a", "#0b1022", "#090616", "#07090f"];
        return ["#07090f", "#0c1020", "#07121a", "#0b0f1c"];
      }

      function drawHorrorFX(intensity, seed) {
        const p = clamp(intensity || 0, 0, 1);
        if (p <= 0.01) return;
        const r = mulberry32(hash32(String(seed || 0) + "|" + String((now() / 120) | 0)));
        const g = ctx.createRadialGradient(aw * 0.5, ah * 0.55, Math.min(aw, ah) * 0.10, aw * 0.5, ah * 0.55, Math.max(aw, ah) * 0.75);
        g.addColorStop(0, `rgba(0,0,0,${0.00})`);
        g.addColorStop(1, `rgba(0,0,0,${0.55 * p})`);
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, aw, ah);

        ctx.save();
        ctx.globalAlpha = 0.14 * p;
        const lines = 8 + ((p * 10) | 0);
        for (let i = 0; i < lines; i++) {
          const y = (r() * ah) | 0;
          const h = 1 + ((r() * 2) | 0);
          ctx.fillStyle = `rgba(255,255,255,${0.10 + r() * 0.12})`;
          ctx.fillRect(0, y, aw, h);
        }
        const specks = 120 + ((p * 260) | 0);
        for (let i = 0; i < specks; i++) {
          const x = (r() * aw) | 0;
          const y = (r() * ah) | 0;
          ctx.fillStyle = `rgba(255,255,255,${0.04 + r() * 0.08})`;
          ctx.fillRect(x, y, 1, 1);
        }
        ctx.restore();
      }

      function drawDrawerCard(r, z, blur, it, isFocus) {
        const a = getDrawerAssets();
        const s = 1 + z;
        const cx = r.x + r.w / 2;
        const cy = r.y + r.h / 2;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.scale(s, s);
        ctx.translate(-cx, -cy);

        ctx.save();
        ctx.shadowColor = isFocus ? "rgba(0,0,0,0.55)" : "rgba(0,0,0,0.38)";
        ctx.shadowBlur = 22 + z * 44;
        rrPath(r.x, r.y, r.w, r.h, 18);
        ctx.fillStyle = a.wood;
        ctx.fill();
        ctx.restore();

        const g = ctx.createLinearGradient(r.x, r.y, r.x + r.w, r.y + r.h);
        g.addColorStop(0, "rgba(255,255,255,0.08)");
        g.addColorStop(0.35, "rgba(255,255,255,0.02)");
        g.addColorStop(1, "rgba(0,0,0,0.12)");
        rrPath(r.x, r.y, r.w, r.h, 18);
        ctx.fillStyle = g;
        ctx.fill();

        ctx.strokeStyle = isFocus ? "rgba(255,255,255,0.34)" : "rgba(255,255,255,0.20)";
        ctx.lineWidth = 1;
        rrPath(r.x, r.y, r.w, r.h, 18);
        ctx.stroke();
        ctx.save();
        ctx.globalAlpha = 0.55;
        ctx.shadowColor = "rgba(255,255,255,0.26)";
        ctx.shadowBlur = 18;
        ctx.strokeStyle = "rgba(255,255,255,0.18)";
        rrPath(r.x + 1, r.y + 1, r.w - 2, r.h - 2, 18);
        ctx.stroke();
        ctx.restore();

        const hx = r.x + r.w * 0.08;
        const hy = r.y + r.h * 0.52;
        const hw = r.w * 0.16;
        const hh = 22;
        const hg = ctx.createLinearGradient(hx, hy, hx + hw, hy);
        hg.addColorStop(0, "rgba(255,255,255,0.18)");
        hg.addColorStop(0.5, "rgba(255,255,255,0.55)");
        hg.addColorStop(1, "rgba(0,0,0,0.25)");
        rrPath(hx, hy - hh / 2, hw, hh, 999);
        ctx.fillStyle = hg;
        ctx.fill();
        ctx.strokeStyle = "rgba(0,0,0,0.22)";
        ctx.stroke();

        ctx.fillStyle = "rgba(255,255,255,0.90)";
        ctx.font = `900 18px ${fontSans}`;
        ctx.fillText(`抽屉${it.moduleId}`, r.x + r.w * 0.30, r.y + r.h * 0.44);
        ctx.fillStyle = "rgba(255,255,255,0.82)";
        ctx.font = `700 16px ${fontSans}`;
        ctx.fillText(it.title, r.x + r.w * 0.30, r.y + r.h * 0.70);
        ctx.fillStyle = "rgba(255,255,255,0.55)";
        ctx.font = `12px ${fontSans}`;
        ctx.fillText(it.tag, r.x + r.w * 0.30, r.y + r.h * 0.86);

        if (blur > 0) {
          rrPath(r.x, r.y, r.w, r.h, 18);
          ctx.fillStyle = `rgba(0,0,0,${0.10 + blur})`;
          ctx.fill();
        }

        ctx.restore();
      }

      function drawerTalkFor(moduleId) {
        if (moduleId === "A") return { char: "猫", id: "cat", lines: ["来都来了，先坐下。", "给我一句烦恼，我给你一张处方签。", "第二杯半价不是优惠，是借口。"], options: ["开一局", "连玩Run", "返回"] };
        if (moduleId === "B") return { char: "同桌", id: "classmate", lines: ["你那封信，还没寄出吧。", "你可以写一句当年没说出口的话。", "也可以用五字改命。"], options: ["开一局", "连玩Run", "返回"] };
        return { char: "导演", id: "director", lines: ["上马。", "把PPT踩成山海。", "你只需要说一句发疯指令。"], options: ["开一局", "连玩Run", "返回"] };
      }

      function drawDrawerOpenOverlay(d, pad, top, w, h) {
        const t = now();
        const x = pad + 14;
        const innerW = w - 28;
        const innerH = h - 28;
        const ox = x;
        const oy = top + 14;

        rrPath(ox, oy, innerW, innerH, 18);
        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.fill();

        const boxW = Math.min(innerW, 640);
        const boxX = ox + (innerW - boxW) / 2;
        const boxH = Math.min(innerH, 520);
        const boxY = oy + (innerH - boxH) / 2;

        const it = { moduleId: d.moduleId, title: d.moduleId === "A" ? "猫的地下酒吧" : d.moduleId === "B" ? "未寄出的信" : "工位逃亡录", tag: "" };
        drawDrawerCard({ x: boxX, y: boxY, w: boxW, h: boxH }, 0.30, 0, it, true);

        if (!d.talk) {
          const tt = drawerTalkFor(d.moduleId);
          d.talk = { id: d.moduleId, idx: 0, shown: 0, done: false, char: tt.char, charId: tt.id, lines: tt.lines, options: tt.options, lastAt: t };
          saveState();
        }
        const talk = d.talk;
        const dt = clamp((t - (talk.lastAt || t)) / 1000, 0, 0.05);
        talk.lastAt = t;
        const speed = clamp(state.settings.vnTextSpeed || 40, 10, 120);
        if (!talk.done) {
          const prev = Math.floor(talk.shown);
          talk.shown = clamp(talk.shown + dt * speed, 0, talk.lines[talk.idx].length);
          const next = Math.floor(talk.shown);
          if (state.settings.vnTypeSfx && next > prev && next % 2 === 0) audioSfx("type");
          talk.done = talk.shown >= talk.lines[talk.idx].length - 0.001;
        }

        const portraitW = boxW * 0.60;
        const portraitH = boxH * 0.58;
        const px = boxX + 18;
        const py = boxY + 22;
        const vn = { charId: talk.charId, charEmotion: "calm", charInT: 1, done: talk.done, shown: talk.shown, lineText: talk.lines[talk.idx] };
        drawVNPortrait2_5D(vn, px, py, portraitW, portraitH);

        const dialogY = boxY + boxH - 220;
        rrPath(boxX + 18, dialogY, boxW - 36, 188, 22);
        ctx.fillStyle = "rgba(0,0,0,0.45)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.60)";
        ctx.stroke();
        ctx.save();
        ctx.globalAlpha = 0.38;
        ctx.shadowColor = "rgba(255,255,255,0.22)";
        ctx.shadowBlur = 18;
        ctx.strokeStyle = "rgba(255,255,255,0.18)";
        rrPath(boxX + 18, dialogY, boxW - 36, 188, 22);
        ctx.stroke();
        ctx.restore();
        ctx.font = `800 18px ${fontSans}`;
        ctx.fillStyle = "rgba(255,255,255,0.92)";
        ctx.strokeStyle = "rgba(0,0,0,0.55)";
        ctx.lineWidth = 4;
        ctx.strokeText(talk.char, boxX + 36, dialogY + 40);
        ctx.fillText(talk.char, boxX + 36, dialogY + 40);
        ctx.font = `${Math.round(28 * uiScale)}px ${fontSans}`;
        const show = talk.lines[talk.idx].slice(0, Math.floor(talk.shown));
        wrapTextStroke(show, boxX + 36, dialogY + 88, boxW - 72, Math.round(46 * uiScale), "#f3f3f3", "#2a2a2a");
        ctx.lineWidth = 1;

        hot("drawerNextLine", boxX + 18, dialogY, boxW - 36, 188, () => {
          if (!talk.done) {
            talk.shown = talk.lines[talk.idx].length;
            talk.done = true;
            return;
          }
          if (talk.idx < talk.lines.length - 1) {
            talk.idx += 1;
            talk.shown = 0;
            talk.done = false;
            return;
          }
        });

        const doneAll = talk.idx >= talk.lines.length - 1 && talk.done;
        if (doneAll) {
          const bw = (boxW - 36 - 28) / 3;
          const by = boxY + boxH + 12;
          btn("drawerPlayFast", boxX + 18, by, bw, 56, "开一局", "primary", () => {
            d.stage = "closing";
            d.t0 = now();
            d.dur = 520;
            saveState();
            startRun("fast", d.moduleId);
          });
          btn("drawerPlayRun", boxX + 18 + bw + 14, by, bw, 56, "连玩Run", "ghost", () => {
            d.stage = "closing";
            d.t0 = now();
            d.dur = 520;
            saveState();
            startRun("run", d.moduleId);
          });
          btn("drawerClose", boxX + 18 + (bw + 14) * 2, by, bw, 56, "返回", "ghost", () => {
            d.stage = "closing";
            d.t0 = now();
            d.dur = 520;
            saveState();
          });
        } else {
          btn("drawerSkip", boxX + 18, boxY + boxH + 12, boxW - 36, 56, "跳到选择", "ghost", () => {
            talk.idx = talk.lines.length - 1;
            talk.shown = talk.lines[talk.idx].length;
            talk.done = true;
          });
        }
      }

      function vnFindChapter(id) {
        for (let i = 0; i < VN_CHAPTERS.length; i++) if (VN_CHAPTERS[i].chapterId === id) return VN_CHAPTERS[i];
        return null;
      }

      function vnBuildLabels(cmds) {
        const map = {};
        for (let i = 0; i < cmds.length; i++) {
          const c = cmds[i];
          if (c && c.op === "label" && c.name) map[c.name] = i;
        }
        return map;
      }

      function startVNChapter(chapterId) {
        const ch = vnFindChapter(chapterId);
        if (!ch) {
          toast("章节不存在");
          return;
        }
        const cmds = Array.isArray(ch.cmds) ? ch.cmds : [];
        state.flow.vn = {
          chapterId: ch.chapterId,
          title: ch.title || ch.chapterId,
          cmds,
          labels: vnBuildLabels(cmds),
          vars: {},
          ip: 0,
          bgKey: "",
          bgFrom: "",
          bgFadeT: 1,
          charId: "mirror",
          charEmotion: "calm",
          charInT: 0,
          lineChar: "",
          lineEmotion: "calm",
          lineText: "",
          shown: 0,
          done: true,
          options: null,
          pickLock: false,
          history: [],
          hideBox: !!state.settings.vnHideBox,
          speed: clamp(state.settings.vnTextSpeed || 40, 10, 120),
          auto: !!state.settings.vnAuto,
          fast: false,
          lastAt: now(),
          nextAutoAt: 0,
          fxSeed: hash32(String(now()) + "|vn|" + chapterId),
          fx: [],
          histScroll: 0,
        };
        state.flow.scene = "vnPlayer";
        saveState();
        vnPrimeFx(state.flow.vn);
        vnRunUntilText(state.flow.vn);
      }

      function vnPrimeFx(vn) {
        vn.fx = vn.fx || [];
        vn.fx.length = 0;
        const n = 42;
        for (let i = 0; i < n; i++) {
          const r = mulberry32((vn.fxSeed + i * 97) >>> 0);
          vn.fx.push({
            x: r(),
            y: r(),
            z: r(),
            s: 0.35 + r() * 0.85,
            v: 0.06 + r() * 0.20,
            a: 0.12 + r() * 0.22,
            t: r() * Math.PI * 2,
            kind: r() < 0.6 ? "bokeh" : "petal",
          });
        }
      }

      function vnRunUntilText(vn) {
        for (let guard = 0; guard < 2000; guard++) {
          const c = vn.cmds[vn.ip];
          if (!c) {
            vn.done = true;
            vn.lineChar = "";
            vn.lineText = "";
            vn.options = null;
            vn.pickLock = false;
            break;
          }
          if (c.op === "label") {
            vn.ip += 1;
            continue;
          }
          if (c.op === "bg") {
            vn.bgFrom = vn.bgKey || c.key || "";
            vn.bgKey = c.key || "";
            vn.bgFadeT = 0;
            vn.ip += 1;
            continue;
          }
          if (c.op === "set") {
            vn.vars = vn.vars || {};
            vn.vars[c.key] = c.value;
            vn.ip += 1;
            continue;
          }
          if (c.op === "bgm") {
            audioBgm(c.key || "hub");
            vn.ip += 1;
            continue;
          }
          if (c.op === "char") {
            vn.charId = c.id || vn.charId;
            vn.charEmotion = c.emotion || vn.charEmotion;
            vn.charInT = 0;
            vn.ip += 1;
            continue;
          }
          if (c.op === "text") {
            vn.lineChar = c.char || "";
            vn.lineEmotion = c.emotion || "calm";
            vn.lineText = String(c.text || "");
            vn.shown = 0;
            vn.done = false;
            vn.options = null;
            vn.pickLock = false;
            vn.ip += 1;
            if (state.settings.voiceOn) {
              const txt = vn.lineText.length > 18 ? vn.lineText.slice(0, 18) : vn.lineText;
              const rate = vn.lineChar === "猫" ? 1.03 : vn.lineChar === "同桌" ? 0.98 : vn.lineChar === "导演" ? 1.06 : 1.0;
              const pitch = vn.lineChar === "猫" ? 1.05 : vn.lineChar === "镜子" ? 0.96 : 1.0;
              speak({ text: txt, rate, pitch });
            }
            break;
          }
          if (c.op === "option") {
            vn.options = Array.isArray(c.options) ? c.options.slice(0, 4) : [];
            vn.pickLock = false;
            vn.ip += 1;
            break;
          }
          if (c.op === "jump") {
            const j = vn.labels[c.label];
            vn.ip = typeof j === "number" ? j + 1 : vn.ip + 1;
            continue;
          }
          if (c.op === "jumpChapter") {
            const to = c.chapterId;
            state.vn.progress = state.vn.progress || {};
            state.vn.progress[vn.chapterId] = { done: true, ts: now() };
            saveState();
            startVNChapter(to);
            return;
          }
          if (c.op === "startModule") {
            const m = c.moduleId;
            state.vn.progress = state.vn.progress || {};
            state.vn.progress[vn.chapterId] = { done: true, ts: now() };
            state.flow.scene = "hub";
            saveState();
            startRun("fast", m);
            return;
          }
          if (c.op === "startChapter") {
            const id = c.chapterId;
            const flags = vn.vars || {};
            state.flow.scene = "hub";
            saveState();
            startChapterById(id, flags);
            return;
          }
          if (c.op === "endToHub") {
            state.vn.progress = state.vn.progress || {};
            state.vn.progress[vn.chapterId] = { done: true, ts: now() };
            saveState();
            gotoHub();
            return;
          }
          vn.ip += 1;
        }
      }

        if (rt.rollback.length > 80) rt.rollback = rt.rollback.slice(rt.rollback.length - 80);
      }
      function vn2Rollback(rt) {
        if (!rt || !rt.rollback || !rt.rollback.length) {
          toast("没有可回溯点");
          return;
        }
        const snap = rt.rollback.pop();
        rt.nodeId = snap.nodeId;
        rt.vars = { ...(snap.vars || {}) };
        rt.bgKey = snap.bgKey;
        rt.bgFrom = snap.bgFrom;
        rt.bgFadeT = snap.bgFadeT;
        rt.charId = snap.charId;
        rt.charEmotion = snap.charEmotion;
        rt.charInT = snap.charInT;
        rt.lineChar = snap.lineChar;
        rt.lineEmotion = snap.lineEmotion;
        rt.lineText = snap.lineText;
        rt.shown = 0;
        rt.done = false;
        rt.options = null;
        rt.pickLock = false;
        rt.nextAutoAt = 0;
        saveState();
        if (navigator.vibrate) navigator.vibrate(10);
      }
      function vn2EnterNode(nodeId, fromChoice) {
        const cache = vn2GetCache();
        const n = cache.byNode[nodeId];
        if (!n) {
          toast("节点不存在");
          gotoHub();
          return;
        }
        const rt = state.vn2.runtime;
        if (!rt) return;
        if (!fromChoice && n.rollbackable) vn2PushRollback(rt);
        rt.nodeId = n.nodeId;
        rt.bgFrom = rt.bgKey || n.bgKey || "desk_rain";
        rt.bgKey = n.bgKey || rt.bgKey || "desk_rain";
        rt.bgFadeT = 0;
        rt.charId = n.charId || rt.charId || "mirror";
        rt.charEmotion = n.charEmotion || n.emotion || rt.charEmotion || "calm";
        rt.charInT = 0;
        rt.lineChar = n.speaker || "";
        rt.lineEmotion = "calm";
        rt.qte = null;
        rt.lineText = vn2RenderText(String(n.text || ""));
        rt.shown = 0;
        rt.done = false;
        rt.options = null;
        rt.pickLock = false;
        rt.hideBox = !!state.settings.vnHideBox;
        rt.speed = clamp(state.settings.vnTextSpeed || 40, 10, 120);
        rt.auto = !!state.settings.vnAuto;
        rt.fast = false;
        rt.nextAutoAt = 0;
        state.vn2.read = state.vn2.read || {};
        state.vn2.read[rt.nodeId] = true;
        if (n.sfxKey) audioSfx(n.sfxKey);
        if (n.bgmKey) audioBgm(n.bgmKey);
        if (n.effectsOnEnter) vn2ApplyEffects(n.effectsOnEnter);
        if (n.type === "qte") {
          rt.qte = { t0: now(), ms: clamp(n.qteMs || 800, 200, 800), successNext: n.successNext, failNext: n.failNext, done: false };
          rt.done = true;
          vnPrimeFx(rt);
          saveState();
          vn2Autosave();
          return;
        }
        if (n.type === "choice") {
          const list = cache.choicesByNode[n.nodeId] || [];
          const out = [];
          for (let i = 0; i < list.length; i++) {
            const c = list[i];
            const pass = vn2EvalCond(c.condition);
            if (!pass && c.hidden) continue;
            out.push({
              choiceId: c.choiceId,
              text: c.text,
              canPick: pass,
              hidden: !!c.hidden,
              reason: pass ? "" : "条件未满足",
              effects: c.effects || "",
              jumpToNodeId: c.jumpToNodeId,
            });
          }
          rt.options = out;
        }
        if (n.type === "ending") {
          const key = `vn_${n.nodeId}`;
          unlockEnding(key);
          if (navigator.vibrate) navigator.vibrate([10, 30, 10]);
          const easterN = Object.keys((state.vn2.meta && state.vn2.meta.easter) || {}).length;
          const endN = Object.keys(state.endings || {}).filter((k) => k.startsWith("vn_")).length;
          if (endN >= 5) unlockAchievement("ach_vn_end5");
          if (endN >= 20) unlockAchievement("ach_vn_end20");
          if (easterN >= 3) unlockAchievement("ach_vn_easter3");
          if (n.next) {
            rt.done = true;
          }
        }
        vnPrimeFx(rt);
        saveState();
        vn2Autosave();
      }

      function vn2RenderText(text) {
        let s = String(text || "");
        const dp = vn2DayPart();
        const dpZh = dp === "morning" ? "清晨" : dp === "afternoon" ? "下午" : "夜晚";
        s = s.replace(/\{\{dp\}\}/g, dpZh);
        s = s.replace(/\{\{fracture\}\}/g, String(state.mirrorFracture));
        s = s.replace(/\{\{mood\}\}/g, String(Math.round(state.settings.mood || 0)));
        s = s.replace(/\{\{if:([a-zA-Z0-9_]+)\?([^|}]*)\|([^}]*)\}\}/g, (_m, flagName, a, b) => {
          let fn = String(flagName || "");
          if (fn.startsWith("flag_")) fn = fn.slice(5);
          return vn2Flag(fn) ? String(a) : String(b);
        });
        return s;
      }
      function vn2StartChapter(chapterId) {
        const cache = vn2GetCache();
        const ch = cache.chaptersById[chapterId];
        if (!ch) {
          toast("章节不存在");
          return;
        }
        if (!vn2EvalCond(ch.unlockCondition)) {
          toast("章节未解锁");
          return;
        }
        const rt = vn2MakeRuntime();
        rt.chapterId = ch.chapterId;
        rt.title = ch.title || ch.chapterId;
        rt.hideBox = !!state.settings.vnHideBox;
        state.vn2.runtime = rt;
        state.flow.scene = "vn2Player";
        saveState();
        vn2EnterNode(ch.entryNodeId, false);
      }
      function vn2SkipOrNext(rt) {
        if (!rt) return;
        if (!rt.done) {
          rt.shown = rt.lineText.length;
          rt.done = true;
          rt.nextAutoAt = 0;
          saveState();
          return;
        }
        if (rt.options && rt.options.length) return;
        if (rt.lineText) {
          rt.history.push({ char: rt.lineChar, text: rt.lineText });
          if (rt.history.length > 80) rt.history = rt.history.slice(rt.history.length - 80);
        }
        const cache = vn2GetCache();
        const n = cache.byNode[rt.nodeId];
        if (n && n.next) vn2EnterNode(n.next, false);
        else {
          state.flow.scene = "vn2Home";
          saveState();
        }
      }
      function vn2PickOption(rt, idx) {
        if (!rt || !rt.options || !rt.options.length) return;
        if (rt.pickLock) return;
        rt.pickLock = true;
        const opt = rt.options[idx];
        if (!opt || !opt.canPick) {
          rt.pickLock = false;
          toast("该选项尚未满足条件");
          return;
        }
        rt.options = null;
        if (opt.effects) vn2ApplyEffects(opt.effects);
        state.vn2.meta = state.vn2.meta || { affinity: { cat: 0, mirror: 0, classmate: 0, director: 0 }, flags: {}, ngPlus: 0, philo: 0, easter: {} };
        state.vn2.meta.lastChoice = opt.choiceId;
        track("vn_choice", { choiceId: opt.choiceId, nodeId: (state.vn2.runtime && state.vn2.runtime.nodeId) || "" });
        addRipple(ui.mx, ui.my, "rgba(124,92,255,0.22)");
        audioSfx("stamp");
        vn2EnterNode(opt.jumpToNodeId, true);
      }

      function vn2ResolveQte(rt, ok) {
        if (!rt || !rt.qte || rt.qte.done) return;
        rt.qte.done = true;
        const next = ok ? rt.qte.successNext : rt.qte.failNext;
        rt.qte = null;
        audioSfx(ok ? "stamp" : "click");
        if (navigator.vibrate) navigator.vibrate(ok ? [10, 20, 10] : 24);
        track(ok ? "vn_qte_ok" : "vn_qte_fail", { nodeId: rt.nodeId || "" });
        if (next) vn2EnterNode(next, true);
        else {
          state.flow.scene = "vn2Home";
          saveState();
        }
      }
      function vn2UpdateQte(rt) {
        if (!rt || !rt.qte || rt.qte.done) return;
        if (now() - rt.qte.t0 > rt.qte.ms) vn2ResolveQte(rt, false);
      }
      function vn2Autosave() {
        const v2 = state.vn2;
        if (!v2 || !v2.runtime) return;
        v2.slots = Array.isArray(v2.slots) ? v2.slots : [null, null, null, null];
        v2.slots[0] = {
          ts: now(),
          kind: "auto",
          chapterId: v2.runtime.chapterId,
          nodeId: v2.runtime.nodeId,
          runtime: {
            chapterId: v2.runtime.chapterId,
            title: v2.runtime.title,
            nodeId: v2.runtime.nodeId,
            vars: { ...(v2.runtime.vars || {}) },
          },
        };
      }
      function vn2SaveSlot(slot) {
        const v2 = state.vn2;
        if (!v2 || !v2.runtime) {
          toast("暂无可存档内容");
          return;
        }
        v2.slots = Array.isArray(v2.slots) ? v2.slots : [null, null, null, null];
        v2.slots[slot] = {
          ts: now(),
          kind: "manual",
          chapterId: v2.runtime.chapterId,
          nodeId: v2.runtime.nodeId,
          runtime: {
            chapterId: v2.runtime.chapterId,
            title: v2.runtime.title,
            nodeId: v2.runtime.nodeId,
            vars: { ...(v2.runtime.vars || {}) },
          },
        };
        toast(`已存到槽位${slot}`);
        saveState();
      }
      function vn2LoadSlot(slot) {
        const v2 = state.vn2;
        v2.slots = Array.isArray(v2.slots) ? v2.slots : [null, null, null, null];
        const s = v2.slots[slot];
        if (!s || !s.runtime) {
          toast("该槽位为空");
          return;
        }
        const rt = vn2MakeRuntime();
        rt.chapterId = s.runtime.chapterId;
        rt.title = s.runtime.title;
        rt.vars = { ...(s.runtime.vars || {}) };
        state.vn2.runtime = rt;
        state.flow.scene = "vn2Player";
        saveState();

      }
